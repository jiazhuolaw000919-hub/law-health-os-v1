<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Profile</title>

<link rel="stylesheet" href="style.css">
<script src="app.js"></script>
<script src="profile.js"></script>
</head>

<body>

<div class="nav">
<a href="profile.html">← Back</a>
</div>

<h2 class="center">➕ Create Profile</h2>

<div class="card">

<input id="name" placeholder="Name"><br><br>

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="age" placeholder="Age"><br>
<input id="height" placeholder="Height cm"><br>
<input id="weight" placeholder="Weight kg"><br><br>

<button onclick="save()">Create</button>

</div>

<script>

function save(){

  let name = document.getElementById("name").value
  let gender = document.getElementById("gender").value
  let age = document.getElementById("age").value
  let height = document.getElementById("height").value
  let weight = document.getElementById("weight").value

  let profile = createProfile(name, gender, age, height, weight)

  alert("Profile created: " + profile.name)

  location.href = "profile.html"
}

</script>

</body>
</html>
