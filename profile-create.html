<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Profile v2 (AI Ready - Phase Safe)</title>

<link rel="stylesheet" href="style.css">
<script src="app.js"></script>
<script src="profile.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

input, select{
width:100%;
margin:5px 0;
padding:8px;
}

.row{
display:flex;
gap:10px;
}

.small{
width:48%;
}
</style>
</head>

<body>

<div class="nav">
<a href="profile.html">← Back</a>
</div>

<h2 class="center">➕ Create Profile (AI v2 Full Identity - Phase Safe)</h2>

<div class="card">

<!-- ================= IDENTITY ================= -->
<h3>1️⃣ Identity</h3>

<input id="name" placeholder="Name / Nickname">

<input id="email" placeholder="Email (optional)">
<input id="phone" placeholder="Phone (optional)">

<div class="row">
<select id="gender" class="small">
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>

<input id="age" class="small" placeholder="Age">
</div>

<input id="country" placeholder="Country">
<input id="language" placeholder="Language">
<input id="occupation" placeholder="Occupation">

<hr>

<!-- ================= BODY ================= -->
<h3>2️⃣ Body Metrics</h3>

<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">
<input id="target_weight" placeholder="Target Weight (kg)">

<input id="body_fat" placeholder="Body Fat % (optional)">
<input id="muscle_mass" placeholder="Muscle Mass (optional)">

<select id="goal">
<option value="fat_loss">Fat Loss</option>
<option value="muscle_gain">Muscle Gain</option>
<option value="maintenance">Maintenance</option>
<option value="health_improvement">Health Improvement</option>
<option value="rehab">Rehab</option>
</select>

<br><br>

<button onclick="saveProfile()">Create Profile</button>

</div>

<script>

/* ================= SAFE BMI ================= */
function calcBMI(h,w){
h = Number(h || 170)
w = Number(w || 70)
return (w / ((h/100)*(h/100))).toFixed(1)
}

/* ================= SAFE PROFILE NORMALIZER ================= */
function normalizeProfile(p){

return {
id: p.id || Date.now().toString(),   // 🔥 FIX: unify ID for Supabase + local sync

/* identity */
name: p.name,
email: p.email || "",
phone: p.phone || "",
gender: p.gender || "other",
age: Number(p.age || 0),
country: p.country || "",
language: p.language || "",
occupation: p.occupation || "",

/* body */
height: Number(p.height || 170),
weight: Number(p.weight || 70),
target_weight: Number(p.target_weight || 70),

body_fat_percentage: Number(p.body_fat_percentage || 0),
muscle_mass: Number(p.muscle_mass || 0),

primary_goal: p.primary_goal || "maintenance",

/* AI derived */
bmi: Number(p.bmi || 0),

/* timestamps (IMPORTANT for Phase C/D sync) */
created_at: p.created_at || new Date().toISOString(),
updated_at: new Date().toISOString()
}
}

/* ================= SAVE ================= */
function saveProfile(){

let name = document.getElementById("name").value.trim()

if(!name){
alert("Name required")
return
}

let rawProfile = {

id: Date.now().toString(),

name,

email: document.getElementById("email").value || "",
phone: document.getElementById("phone").value || "",
gender: document.getElementById("gender").value,
age: document.getElementById("age").value,
country: document.getElementById("country").value,
language: document.getElementById("language").value,
occupation: document.getElementById("occupation").value,

height: document.getElementById("height").value,
weight: document.getElementById("weight").value,
target_weight: document.getElementById("target_weight").value,

body_fat_percentage: document.getElementById("body_fat").value,
muscle_mass: document.getElementById("muscle_mass").value,

primary_goal: document.getElementById("goal").value
}

/* normalize (CRITICAL for cloud sync stability) */
let profile = normalizeProfile(rawProfile)

/* compute BMI AFTER normalization */
profile.bmi = calcBMI(profile.height, profile.weight)

/* ================= LOCAL SAVE ================= */
localStorage.setItem("activeProfile", JSON.stringify(profile))

let all = JSON.parse(localStorage.getItem("profiles") || "[]")

all.push(profile)

localStorage.setItem("profiles", JSON.stringify(all))

/* notify other pages (profile-lite / dashboard sync) */
window.dispatchEvent(new Event("profileUpdated"))

alert("Profile created successfully!")

location.href = "profile.html"
}

</script>

</body>
</html>
