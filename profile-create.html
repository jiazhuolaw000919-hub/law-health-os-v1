<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Profile v3 (Phase A–D Ready) - Fixed Save</title>

<link rel="stylesheet" href="style.css">

<!-- ✅ 必需的脚本 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="supabase.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

input, select{
width:100%;
margin:6px 0;
padding:9px;
border-radius:6px;
border:1px solid #ddd;
}

.row{
display:flex;
gap:10px;
}

.small{width:48%}

.required{
color:red;
font-size:12px;
}

.error{
color:red;
font-size:12px;
margin-top:5px;
}
</style>
</head>

<body>

<div class="nav">
<a href="profile.html">← Back</a>
</div>

<h2 class="center">➕ Create Profile (Phase A–D FULL READY)</h2>

<div class="card">

<!-- ================= IDENTITY ================= -->
<h3>👤 Identity Overview</h3>

<div class="required">* Required fields</div>

<input id="name" placeholder="Name / Nickname *">
<input id="email" placeholder="Email *">
<input id="phone" placeholder="Phone (optional)">

<select id="gender">
<option value="">Gender *</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>

<input id="age" placeholder="Age (optional)">
<input id="country" placeholder="Country (optional)">
<input id="occupation" placeholder="Occupation (optional)">

<hr>

<!-- ================= BODY ================= -->
<h3>⚖ Body Metrics</h3>

<input id="height" placeholder="Height (cm) *">
<input id="weight" placeholder="Weight (kg) *">
<input id="target_weight" placeholder="Target Weight (kg) *">

<input id="body_fat" placeholder="Body Fat % (optional)">
<input id="muscle_mass" placeholder="Muscle Mass (kg) (optional)">

<select id="goal">
<option value="">Primary Goal *</option>
<option value="fat_loss">Fat Loss</option>
<option value="muscle_gain">Muscle Gain</option>
<option value="maintenance">Maintenance</option>
<option value="health_improvement">Health Improvement</option>
<option value="rehab">Rehab</option>
</select>

<br><br>

<div id="errorBox" class="error"></div>

<button onclick="saveProfile()">Create Profile</button>

</div>

<script>

/* ================= SAFE BMI ================= */
function calcBMI(h,w){
h = Number(h || 170)
w = Number(w || 70)
return (w / ((h/100)*(h/100))).toFixed(1)
}

/* ================= VALIDATION ================= */
function validate(data){

let errors = []

if(!data.name) errors.push("Name is required")
if(!data.email) errors.push("Email is required")
if(!data.gender) errors.push("Gender is required")
if(!data.height) errors.push("Height is required")
if(!data.weight) errors.push("Weight is required")
if(!data.target_weight) errors.push("Target weight is required")
if(!data.primary_goal) errors.push("Primary goal is required")

return errors
}

/* ================= SAVE (Fixed) ================= */
async function saveProfile(){

let raw = {

name: document.getElementById("name").value.trim(),
email: document.getElementById("email").value.trim(),
phone: document.getElementById("phone").value.trim(),

gender: document.getElementById("gender").value,
age: document.getElementById("age").value,

country: document.getElementById("country").value,
occupation: document.getElementById("occupation").value,

height: document.getElementById("height").value,
weight: document.getElementById("weight").value,
target_weight: document.getElementById("target_weight").value,

body_fat_percentage: document.getElementById("body_fat").value,
muscle_mass: document.getElementById("muscle_mass").value,

primary_goal: document.getElementById("goal").value
}

/* VALIDATION */
let errors = validate(raw)

if(errors.length > 0){
document.getElementById("errorBox").innerText =
errors.join("\n")
return
}

// Normalize numbers
raw.height = Number(raw.height || 170)
raw.weight = Number(raw.weight || 70)
raw.target_weight = Number(raw.target_weight || 70)
raw.age = Number(raw.age || 0)
raw.body_fat_percentage = Number(raw.body_fat_percentage || 0)
raw.muscle_mass = Number(raw.muscle_mass || 0)

// Calculate BMI
raw.bmi = calcBMI(raw.height, raw.weight)

/* ================= SAVE TO LOCAL & CLOUD ================= */
// Use app.js's createProfile (stores in localStorage, sets active)
const newProfile = window.createProfile(raw)

// Sync to Supabase (if upsertProfile exists)
if (typeof upsertProfile === 'function') {
try {
await upsertProfile(newProfile)
console.log('✅ Profile synced to cloud')
} catch (e) {
console.warn('Cloud sync failed, but local save is fine:', e)
}
}

// Notify all pages of profile change
window.dispatchEvent(new Event("profileSyncUpdate"))

alert("Profile created successfully!")

location.href = "profile.html"
}

</script>

</body>
</html>
