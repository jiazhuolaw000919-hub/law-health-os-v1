<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Calendar v11</title>

<script src="supabase.js"></script>
<script src="ai.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white}

.nav{display:flex;justify-content:space-around;background:#111827;padding:10px}

.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:10px}

.day{
background:#1f2937;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
font-size:12px;
}

.green{background:#22c55e}
.yellow{background:#f59e0b}
.red{background:#ef4444}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Dashboard</a>
<a href="calendar.html">Calendar</a>
</div>

<h3 style="text-align:center">📅 AI Calendar v11</h3>

<div class="grid" id="grid"></div>

<script>

let year = new Date().getFullYear()
let month = new Date().getMonth()

function dateStr(d){
return `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
}

async function render(){

const grid = document.getElementById("grid")
grid.innerHTML = ""

const first = new Date(year,month,1).getDay()
const days = new Date(year,month+1,0).getDate()

for(let i=0;i<first;i++){
grid.innerHTML += `<div></div>`
}

for(let d=1; d<=days; d++){

const date = dateStr(d)

const foods = await getFood(date)

let cal = 0
foods.forEach(f=> cal += f.calories)

let burn = 0
let score = calcScore(cal,burn)

let color =
score>=80?"green":
score>=50?"yellow":"red"

const div = document.createElement("div")
div.className = "day "+color

div.innerHTML = `
${d}<br>
${Math.round(score)}<br>
${cal} kcal<br>
${workoutAdvice(cal)}
`

div.onclick = ()=>{
location.href="day.html?date="+date
}

grid.appendChild(div)
}

}

render()

</script>

</body>
</html>
