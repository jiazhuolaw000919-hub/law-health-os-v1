<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calendar v9.8</title>

<script src="supabase.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f19;
color:white;
}

.nav{
display:flex;
justify-content:space-around;
background:#111827;
padding:12px;
}

.header{
display:flex;
gap:10px;
justify-content:center;
align-items:center;
padding:10px;
flex-wrap:wrap;
}

select,button{
padding:6px 10px;
border-radius:6px;
border:none;
background:#1f2937;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:10px;
}

.day{
background:#1f2937;
padding:10px;
border-radius:10px;
min-height:60px;
text-align:center;
font-size:12px;
cursor:pointer;
}

.empty{
background:transparent;
}

.high{background:#ef4444;}
.mid{background:#f59e0b;}
.low{background:#22c55e;}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Dashboard</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="calendar.html">Calendar</a>
<a href="shop.html">Shop</a>
</div>

<!-- 🟢 YEAR + MONTH SELECTOR -->
<div class="header">

<select id="year"></select>

<select id="month">
<option value="0">Jan</option>
<option value="1">Feb</option>
<option value="2">Mar</option>
<option value="3">Apr</option>
<option value="4">May</option>
<option value="5">Jun</option>
<option value="6">Jul</option>
<option value="7">Aug</option>
<option value="8">Sep</option>
<option value="9">Oct</option>
<option value="10">Nov</option>
<option value="11">Dec</option>
</select>

<button onclick="render()">🔄 Load</button>

</div>

<h3 style="text-align:center;" id="title"></h3>

<div class="grid" id="grid"></div>

<script>

// 🟢 STATE（关键修复点）
let state = {
year: 2026,
month: 6
}

// 🟢 初始化年份
const yearSelect = document.getElementById("year")

for(let y=2020;y<=2035;y++){
const opt=document.createElement("option")
opt.value=y
opt.innerText=y
yearSelect.appendChild(opt)
}

yearSelect.value = state.year

document.getElementById("month").value = state.month

// 🟢 Supabase calories
async function getCalories(date){

try{

const res = await fetch(
SUPABASE_URL+"/rest/v1/food_logs?date=eq."+date,
{
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY
}
}
)

const data = await res.json()

return data.reduce((s,f)=>s+f.calories,0)

}catch(e){
return 0
}

}

// 🟢 render calendar
async function render(){

state.year = parseInt(yearSelect.value)
state.month = parseInt(document.getElementById("month").value)

const grid = document.getElementById("grid")
grid.innerHTML = ""

document.getElementById("title").innerText =
state.year + " / " + (state.month+1)

// 星期起点
const firstDay = new Date(state.year, state.month, 1).getDay()

// 月天数
const days = new Date(state.year, state.month+1, 0).getDate()

// 空格
for(let i=0;i<firstDay;i++){
const div=document.createElement("div")
div.className="day empty"
grid.appendChild(div)
}

// 日期
for(let d=1; d<=days; d++){

const dateStr =
`${state.year}-${String(state.month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`

const cal = await getCalories(dateStr)

const div=document.createElement("div")
div.className="day"

if(cal>2000) div.classList.add("high")
else if(cal>1200) div.classList.add("mid")
else div.classList.add("low")

div.innerHTML = d + "<br>" + cal

div.onclick = () => {
location.href = "day.html?date=" + dateStr
}

grid.appendChild(div)
}

}

render()

</script>

</body>
</html>
