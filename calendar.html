<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Calendar v2.4 FIX</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
</div>

<h2 class="center">📅 AI Health Calendar</h2>

<!-- MONTH CONTROL -->
<div class="card">
<div class="month-bar">

<button class="arrow" onclick="changeMonth(-1)">‹</button>

<div class="selectors">
<select id="monthSelect"></select>
<select id="yearSelect"></select>
</div>

<button class="arrow" onclick="changeMonth(1)">›</button>

</div>
</div>

<!-- MONTH SCORE -->
<div class="card">
<h3>🧠 Monthly Health Score</h3>
<p id="monthlyScore">Loading...</p>
</div>

<!-- CALENDAR -->
<div class="grid" id="grid"></div>

<script>

setActive?.("calendar")

const grid = document.getElementById("grid")
const monthSelect = document.getElementById("monthSelect")
const yearSelect = document.getElementById("yearSelect")

let dateObj = new Date()
let historyCalories = []

// =====================
// INIT DROPDOWNS (ONLY ONCE)
// =====================
function initDropdowns(){

monthSelect.innerHTML = ""
yearSelect.innerHTML = ""

for(let m=0;m<12;m++){
const opt = document.createElement("option")
opt.value = m
opt.textContent = new Date(0,m).toLocaleString('default',{month:'long'})
monthSelect.appendChild(opt)
}

const currentYear = new Date().getFullYear()

for(let y=currentYear-3;y<=currentYear+3;y++){
const opt = document.createElement("option")
opt.value = y
opt.textContent = y
yearSelect.appendChild(opt)
}

monthSelect.value = dateObj.getMonth()
yearSelect.value = dateObj.getFullYear()
}

// =====================
// UTIL
// =====================
function formatDate(y,m,d){
return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
}

function compareTrend(current, previous){
if(previous === 0) return "NO DATA"
let diff = current - previous
if(diff > 300) return "🔴 WORSENING"
if(diff < -300) return "🟢 IMPROVING"
return "🟡 STABLE"
}

function predictBingeRisk(history){
if(history.length < 3) return "LOW"
let last3 = history.slice(-3)
let avg = last3.reduce((a,b)=>a+b,0)/3
if(avg > 2800) return "HIGH"
if(avg > 2400) return "MEDIUM"
return "LOW"
}

// =====================
// MAIN CALENDAR
// =====================
async function loadCalendar(){

grid.innerHTML = ""

const year = parseInt(yearSelect.value || new Date().getFullYear())
const month = parseInt(monthSelect.value || new Date().getMonth())

const first = new Date(year,month,1).getDay()
const days = new Date(year,month+1,0).getDate()

historyCalories = []

// blank cells
for(let i=0;i<first;i++){
grid.innerHTML += "<div></div>"
}

let total = 0
let bingeDays = 0

for(let d=1; d<=days; d++){

const date = formatDate(year,month,d)

let calories = 0

try{
if(typeof getFoodLogs !== "undefined"){
const foods = await getFoodLogs(date) || []
foods.forEach(f=>{
calories += Number(f.calories || 0)
})
}
}catch(e){}

historyCalories.push(calories)

total += calories

if(calories > 2800) bingeDays++

let label = "SAFE"
let color = "green"

if(calories > 3000){
label = "DANGER"
color = "red"
}else if(calories > 2500){
label = "WARNING"
color = "yellow"
}

const div = document.createElement("div")
div.className = "day " + color

div.innerHTML = `
<b>${d}</b><br>
${calories} kcal<br>
<small>${label}</small>
`

div.onclick = ()=>{
location.href = "day.html?date=" + date
}

grid.appendChild(div)
}

// monthly summary
let avg = total / (days || 1)
let lastMonthFake = avg - 200

document.getElementById("monthlyScore").innerText =
`Avg: ${avg.toFixed(0)} kcal | Risk: ${predictBingeRisk(historyCalories)}`

}

// =====================
// MONTH CONTROL
// =====================
function changeMonth(offset){

let m = parseInt(monthSelect.value)
let y = parseInt(yearSelect.value)

m += offset

if(m < 0){ m = 11; y-- }
if(m > 11){ m = 0; y++ }

monthSelect.value = m
yearSelect.value = y

loadCalendar()
}

monthSelect.onchange = loadCalendar
yearSelect.onchange = loadCalendar

// =====================
// START (IMPORTANT ORDER)
// =====================
initDropdowns()
loadCalendar()

</script>

</body>
</html>
