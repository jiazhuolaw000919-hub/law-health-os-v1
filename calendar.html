<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calendar AI v2.3</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
</div>

<h2 class="center">📅 AI Calendar</h2>

<!-- MONTH CONTROL -->
<div class="card center">
<button onclick="changeMonth(-1)">⬅</button>

<select id="monthSelect"></select>
<select id="yearSelect"></select>

<button onclick="changeMonth(1)">➡</button>
</div>

<div class="grid" id="grid"></div>

<script>

if(typeof setActive !== "undefined"){
setActive("calendar")
}

const grid = document.getElementById("grid")

let dateObj = new Date()

const monthSelect = document.getElementById("monthSelect")
const yearSelect = document.getElementById("yearSelect")

// init months
for(let m=0;m<12;m++){
let opt = document.createElement("option")
opt.value = m
opt.text = m+1
monthSelect.appendChild(opt)
}

// init years
let y = new Date().getFullYear()

for(let i=y-3;i<=y+3;i++){
let opt = document.createElement("option")
opt.value = i
opt.text = i
yearSelect.appendChild(opt)
}

monthSelect.value = dateObj.getMonth()
yearSelect.value = dateObj.getFullYear()

function formatDate(y,m,d){
return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
}

// 🔥 SAFE LOAD
async function loadCalendar(){

try{

grid.innerHTML = ""

const year = parseInt(yearSelect.value)
const month = parseInt(monthSelect.value)

const first = new Date(year,month,1).getDay()
const days = new Date(year,month+1,0).getDate()

for(let i=0;i<first;i++){
grid.innerHTML += "<div></div>"
}

let monthlyCalories = 0
let validDays = 0

for(let d=1; d<=days; d++){

const date = formatDate(year,month,d)

let calories = 0

try{
if(typeof getFoodLogs !== "undefined"){
const foods = await getFoodLogs(date)
foods.forEach(f=>{
calories += Number(f.calories || 0)
})
}
}catch(e){}

monthlyCalories += calories
validDays++

let score = 0

try{
score = calculateHealthScore(calories,0)
}catch(e){
score = 0
}

// 🔥 AI heatmap
let color = "red"

if(calories > 2800) color = "red"
else if(score >= 80) color = "green"
else if(score >= 50) color = "yellow"
else color = "red"

const div = document.createElement("div")
div.className = "day " + color

div.innerHTML = `<b>${d}</b><br>${score}`

div.onclick = ()=>{
location.href = "day.html?date=" + date
}

grid.appendChild(div)
}

// 🧠 monthly AI score
let monthlyScore = 0

if(validDays > 0){
monthlyScore = Math.round((monthlyCalories / validDays) / 25)
}

console.log("Monthly AI Score:", monthlyScore)

}catch(err){
console.log("calendar error:",err)
grid.innerHTML = "Calendar failed to load"
}

}

// month switch
function changeMonth(offset){

let m = parseInt(monthSelect.value)
let y = parseInt(yearSelect.value)

m += offset

if(m < 0){
m = 11
y--
}

if(m > 11){
m = 0
y++
}

monthSelect.value = m
yearSelect.value = y

loadCalendar()
}

monthSelect.onchange = loadCalendar
yearSelect.onchange = loadCalendar

loadCalendar()

</script>

</body>
</html>
