<h2 class="center">📅 Calendar</h2>

<div class="grid" id="grid"></div>

<script>

setActive("calendar")

const grid = document.getElementById("grid")

const year = new Date().getFullYear()
const month = new Date().getMonth()

function format(d){
return `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
}

async function load(){

grid.innerHTML = ""

const first = new Date(year,month,1).getDay()
const days = new Date(year,month+1,0).getDate()

for(let i=0;i<first;i++){
grid.innerHTML += "<div></div>"
}

for(let d=1; d<=days; d++){

const date = format(d)

let calories = 0

try{
const foods = await getFoodLogs(date)
foods.forEach(f=>{
calories += Number(f.calories||0)
})
}catch(e){
calories = 0
}

let score = calculateHealthScore(calories,0)

let color = ""

if(calories > 2800) color="red"
else if(score >= 80) color="green"
else if(score >= 50) color="yellow"
else color="red"

const div = document.createElement("div")
div.className = "day "+color

div.innerHTML = `<b>${d}</b><br>${score}`

div.onclick = ()=>{
location.href="day.html?date="+date
}

grid.appendChild(div)
}

}

load()

</script>

</body>
