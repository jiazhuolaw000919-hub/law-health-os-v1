<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calendar</title>

<link rel="stylesheet" href="style.css">

<script src="ai.js"></script>
<script src="app.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>

</div>

<h2 class="center">📅 Calendar</h2>

<div class="grid" id="grid"></div>

<div class="bottom-nav">
<a href="index.html">🏠</a>
<a href="calendar.html">📅</a>
<a href="food.html">🍽</a>
<a href="workout.html">🏋️</a>
<a href="shopping.html">🛒</a>
<a href="report.html">📄</a>
</div>

<script>

setActive("calendar")

// 🧠 防止 undefined crash
if(typeof getFoodLogs !== "function"){
console.log("supabase.js not loaded")
}

const grid=document.getElementById("grid")

const year=new Date().getFullYear()
const month=new Date().getMonth()

function dateStr(d){
return `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
}

async function load(){

if(typeof getFoodLogs !== "function"){
grid.innerHTML="<p class='center'>Loading error</p>"
return
}

const first=new Date(year,month,1).getDay()
const days=new Date(year,month+1,0).getDate()

for(let i=0;i<first;i++){
grid.innerHTML+="<div></div>"
}

for(let d=1; d<=days; d++){

const date=dateStr(d)

let foods=[]
try{
foods = await getFoodLogs(date)
}catch(e){
foods=[]
}

let cal=0
foods.forEach(f=>cal+=Number(f.calories||0))

let score=calculateHealthScore(cal,0)

let color=""

if(score>=80) color="green"
else if(score>=50) color="yellow"
else color="red"

const div=document.createElement("div")
div.className="day "+color

div.innerHTML=`
<b>${d}</b><br>
${score}
`

div.onclick=()=>{
location.href="day.html?date="+date
}

grid.appendChild(div)
}

}

load()

</script>

</body>
</html>
