<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calendar v11.3</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="supabase.js"></script>
<script src="ai.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Dashboard</a>
<a href="calendar.html">Calendar</a>
</div>

<h2 style="text-align:center">📅 AI Calendar v11.3</h2>

<div id="grid" class="grid"></div>

<script>

let year = new Date().getFullYear()
let month = new Date().getMonth()

function dateStr(d){
return `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
}

async function render(){

showLoading("grid")

const grid = document.getElementById("grid")
grid.innerHTML = ""

const first = new Date(year,month,1).getDay()
const days = new Date(year,month+1,0).getDate()

for(let i=0;i<first;i++){
grid.innerHTML += `<div></div>`
}

for(let d=1; d<=days; d++){

const date = dateStr(d)

const foods = await safeFetch(()=>getFood(date)) || []

let cal = 0
foods.forEach(f=> cal += f.calories || 0)

let score = calcScore(cal,0)

let color =
score>=80?"green":
score>=50?"yellow":"red"

const div = document.createElement("div")
div.className="day "+color

div.innerHTML=`
<b>${d}</b><br>
${Math.round(score)}<br>
${cal} kcal<br>
${workoutAdvice(cal)}
`

div.onclick=()=>{
location.href="day.html?date="+date
}

grid.appendChild(div)
}

}

render()

</script>

</body>
</html>
