<body>

<div class="nav">

<h2 style="text-align:center">Calendar</h2>

<div class="grid" id="grid"></div>

<div class="bottom-nav">
<a href="index.html">🏠</a>
<a href="calendar.html">📅</a>
<a href="food.html">🍽</a>
<a href="workout.html">🏋️</a>
<a href="shopping.html">🛒</a>
<a href="report.html">📄</a>
</div>

<script>
setActive("cal")

let year=new Date().getFullYear()
let month=new Date().getMonth()

function dateStr(d){
return `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
}

async function render(){

const grid=document.getElementById("grid")
grid.innerHTML=""

const first=new Date(year,month,1).getDay()
const days=new Date(year,month+1,0).getDate()

for(let i=0;i<first;i++) grid.innerHTML+="<div></div>"

for(let d=1;d<=days;d++){

const date=dateStr(d)
const foods=await getFood(date)

let cal=0
foods.forEach(f=>cal+=f.calories||0)

let score=calcScore(cal,0)

let color=score>80?"green":score>50?"yellow":"red"

const div=document.createElement("div")
div.className="day "+color

div.innerHTML=`${d}<br>${Math.round(score)}<br>${cal}`

div.onclick=()=>location.href="day.html?date="+date

grid.appendChild(div)
}

}

render()
</script>

</body>
</html>
