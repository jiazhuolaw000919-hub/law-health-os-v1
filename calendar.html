<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Calendar v3</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>

<style>
/* ===== v3 heatmap enhancement ===== */

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:14px;
}

.day{
background:#fff;
border-radius:10px;
padding:10px;
min-height:70px;
font-size:12px;
cursor:pointer;
box-shadow:0 1px 3px rgba(0,0,0,.05);
transition:0.2s;
}

.day:hover{
transform:scale(1.05);
}

/* heat levels */
.low{ background:#dcfce7; }
.mid{ background:#fef9c3; }
.high{ background:#fee2e2; }
.veryhigh{ background:#fecaca; }

.month-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 14px;
}

.arrow{
background:#111827;
color:white;
border:none;
border-radius:8px;
padding:6px 10px;
cursor:pointer;
}

.selectors{
display:flex;
gap:8px;
}

select{
padding:6px;
border-radius:8px;
border:1px solid #ddd;
}
</style>

</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📅 AI Calendar v3</h2>

<!-- MONTH CONTROL -->
<div class="card">

<div class="month-bar">
<button class="arrow" onclick="changeMonth(-1)">‹</button>

<div class="selectors">
<select id="monthSelect"></select>
<select id="yearSelect"></select>
</div>

<button class="arrow" onclick="changeMonth(1)">›</button>
</div>

</div>

<!-- SUMMARY -->
<div class="card">
<h3>🧠 Monthly AI Summary</h3>
<p id="summary">Loading...</p>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div id="modal" style="
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
">

<div style="
background:white;
padding:20px;
border-radius:12px;
width:300px;
">

<h3 id="modalDate"></h3>
<p id="modalCalories"></p>

<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

setActive?.("calendar")

const grid = document.getElementById("grid")
const monthSelect = document.getElementById("monthSelect")
const yearSelect = document.getElementById("yearSelect")

let dateObj = new Date()
let cache = {}

function formatDate(y,m,d){
return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
}

// ================= INIT DROPDOWN =================
function init(){

monthSelect.innerHTML = ""
yearSelect.innerHTML = ""

for(let m=0;m<12;m++){
let opt = document.createElement("option")
opt.value = m
opt.textContent = new Date(0,m).toLocaleString('default',{month:'long'})
monthSelect.appendChild(opt)
}

let y = new Date().getFullYear()
for(let i=y-3;i<=y+3;i++){
let opt = document.createElement("option")
opt.value = i
opt.textContent = i
yearSelect.appendChild(opt)
}

monthSelect.value = dateObj.getMonth()
yearSelect.value = dateObj.getFullYear()
}

// ================= COLOR LOGIC =================
function getHeatClass(cal){

if(cal > 3000) return "veryhigh"
if(cal > 2500) return "high"
if(cal > 2000) return "mid"
return "low"
}

// ================= LOAD =================
async function load(){

grid.innerHTML = ""

let year = +yearSelect.value
let month = +monthSelect.value

let first = new Date(year,month,1).getDay()
let days = new Date(year,month+1,0).getDate()

let total = 0
let data = []

for(let i=0;i<first;i++){
grid.innerHTML += "<div></div>"
}

for(let d=1; d<=days; d++){

let date = formatDate(year,month,d)

let foods = []
let cal = 0

try{
foods = await getFoodLogs(date) || []
foods.forEach(f=> cal += +f.calories)
}catch(e){}

data.push(cal)
total += cal

let div = document.createElement("div")
div.className = "day " + getHeatClass(cal)

div.innerHTML = `
<b>${d}</b><br>
${cal} kcal
`

div.onclick = ()=>{
openModal(date,cal)
}

grid.appendChild(div)
}

let avg = total / days || 0

document.getElementById("summary").innerText =
`Avg: ${avg.toFixed(0)} kcal | Days: ${days}`

}

// ================= MONTH CONTROL =================
function changeMonth(v){

let m = +monthSelect.value
let y = +yearSelect.value

m += v

if(m < 0){ m = 11; y-- }
if(m > 11){ m = 0; y++ }

monthSelect.value = m
yearSelect.value = y

load()
}

monthSelect.onchange = load
yearSelect.onchange = load

// ================= MODAL =================
function openModal(date,cal){

document.getElementById("modal").style.display = "flex"
document.getElementById("modalDate").innerText = date
document.getElementById("modalCalories").innerText = cal + " kcal"
}

function closeModal(){
document.getElementById("modal").style.display = "none"
}

// ================= START =================
init()
load()

</script>

</body>
</html>
