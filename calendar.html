<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Calendar v3.5</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>

<style>
.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:14px;
}

.day{
background:#fff;
border-radius:10px;
padding:10px;
min-height:70px;
font-size:12px;
cursor:pointer;
box-shadow:0 1px 3px rgba(0,0,0,.05);
transition:0.2s;
}

.day:hover{
transform:scale(1.05);
}

/* ===== v3.5 GRADIENT HEAT ===== */
.l1{ background:#dcfce7; }
.l2{ background:#bbf7d0; }
.l3{ background:#fef9c3; }
.l4{ background:#fde68a; }
.l5{ background:#fecaca; }

.month-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 14px;
}

.arrow{
background:#111827;
color:white;
border:none;
border-radius:8px;
padding:6px 10px;
cursor:pointer;
}

.selectors{
display:flex;
gap:8px;
}

select{
padding:6px;
border-radius:8px;
border:1px solid #ddd;
}

.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

</style>

</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📅 AI Calendar v3.5</h2>

<div class="card">
<div class="month-bar">

<button class="arrow" onclick="changeMonth(-1)">‹</button>

<div class="selectors">
<select id="monthSelect"></select>
<select id="yearSelect"></select>
</div>

<button class="arrow" onclick="changeMonth(1)">›</button>

</div>
</div>

<div class="card">
<h3>🧠 AI Summary</h3>
<p id="summary">Loading...</p>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">
<div style="background:white;padding:20px;border-radius:12px;width:300px;">
<h3 id="modalDate"></h3>
<p id="modalCalories"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

setActive?.("calendar")

const grid = document.getElementById("grid")
const monthSelect = document.getElementById("monthSelect")
const yearSelect = document.getElementById("yearSelect")

let dateObj = new Date()

// ================= INIT =================
function init(){

monthSelect.innerHTML = ""
yearSelect.innerHTML = ""

for(let m=0;m<12;m++){
let opt = document.createElement("option")
opt.value = m
opt.textContent = new Date(0,m).toLocaleString('default',{month:'long'})
monthSelect.appendChild(opt)
}

let y = new Date().getFullYear()
for(let i=y-3;i<=y+3;i++){
let opt = document.createElement("option")
opt.value = i
opt.textContent = i
yearSelect.appendChild(opt)
}

monthSelect.value = dateObj.getMonth()
yearSelect.value = dateObj.getFullYear()
}

// ================= SAFE DATA =================
async function safeCalories(date){
try{
if(typeof getFoodLogs === "undefined") return 0
const logs = await getFoodLogs(date) || []
return logs.reduce((sum,f)=> sum + Number(f.calories||0), 0)
}catch(e){
return 0
}
}

// ================= HEAT MAP (v3.5) =================
function getLevel(cal){

if(cal < 1500) return "l1"
if(cal < 2200) return "l2"
if(cal < 2700) return "l3"
if(cal < 3200) return "l4"
return "l5"
}

// ================= STREAK LOGIC =================
function calcStreak(dailyData){

let streak = 0

for(let i=dailyData.length-1;i>=0;i--){
if(dailyData[i] > 0) streak++
else break
}

return streak
}

// ================= AI RISK SCORE =================
function getRisk(avg, max){

let score = (avg + max) / 2

if(score > 3000) return "HIGH RISK"
if(score > 2500) return "MEDIUM"
return "LOW"
}

// ================= LOAD =================
async function load(){

grid.innerHTML = ""

let year = +yearSelect.value
let month = +monthSelect.value

if(!year || month === undefined) return

let first = new Date(year,month,1).getDay()
let days = new Date(year,month+1,0).getDate()

let total = 0
let max = 0
let arr = []

for(let i=0;i<first;i++){
grid.innerHTML += "<div></div>"
}

for(let d=1; d<=days; d++){

let date = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`

let cal = await safeCalories(date)

arr.push(cal)

total += cal
if(cal > max) max = cal

let div = document.createElement("div")
div.className = "day " + getLevel(cal)

div.innerHTML = `
<b>${d}</b><br>
${cal} kcal
`

div.onclick = ()=>openModal(date,cal)

grid.appendChild(div)
}

let avg = total / days || 0

let streak = calcStreak(arr)
let risk = getRisk(avg,max)

document.getElementById("summary").innerHTML =
`
Avg: ${avg.toFixed(0)} kcal<br>
Max: ${max} kcal<br>
🔥 Streak: ${streak} days<br>
🧠 Risk: ${risk}
`
}

// ================= MONTH =================
function changeMonth(v){

let m = +monthSelect.value
let y = +yearSelect.value

m += v

if(m < 0){ m = 11; y-- }
if(m > 11){ m = 0; y++ }

monthSelect.value = m
yearSelect.value = y

load()
}

monthSelect.onchange = load
yearSelect.onchange = load

// ================= MODAL =================
function openModal(date,cal){
document.getElementById("modal").style.display = "flex"
document.getElementById("modalDate").innerText = date
document.getElementById("modalCalories").innerText = cal + " kcal"
}

function closeModal(){
document.getElementById("modal").style.display = "none"
}

// ================= START =================
init()
load()

</script>

</body>
</html>
