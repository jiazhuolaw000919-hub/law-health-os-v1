<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Calendar v2.4</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
</div>

<h2 class="center">📅 AI Health Calendar</h2>

<!-- MONTH CONTROL -->
<div class="card center">
<button onclick="changeMonth(-1)">⬅</button>

<select id="monthSelect"></select>
<select id="yearSelect"></select>

<button onclick="changeMonth(1)">➡</button>
</div>

<!-- 🧠 MONTH SCORE UI -->
<div class="card">
<h3>🧠 Monthly Health Score</h3>
<p id="monthlyScore">Loading...</p>
</div>

<div class="grid" id="grid"></div>

<script>

if(typeof setActive !== "undefined"){
setActive("calendar")
}

const grid = document.getElementById("grid")

let dateObj = new Date()

const monthSelect = document.getElementById("monthSelect")
const yearSelect = document.getElementById("yearSelect")

// init months
for(let m=0;m<12;m++){
let opt = document.createElement("option")
opt.value = m
opt.text = m+1
monthSelect.appendChild(opt)
}

// init years
let y = new Date().getFullYear()

for(let i=y-3;i<=y+3;i++){
let opt = document.createElement("option")
opt.value = i
opt.text = i
yearSelect.appendChild(opt)
}

monthSelect.value = dateObj.getMonth()
yearSelect.value = dateObj.getFullYear()

function formatDate(y,m,d){
return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
}

// 🧠 AI DAILY LABEL
function getAICategory(calories){

if(calories > 3000) return "danger"
if(calories > 2400) return "warning"
return "safe"
}

// 🔥 LOAD CALENDAR
async function loadCalendar(){

try{

grid.innerHTML = ""

const year = parseInt(yearSelect.value)
const month = parseInt(monthSelect.value)

const first = new Date(year,month,1).getDay()
const days = new Date(year,month+1,0).getDate()

for(let i=0;i<first;i++){
grid.innerHTML += "<div></div>"
}

let totalCalories = 0
let dayCount = 0
let bingeDays = 0

for(let d=1; d<=days; d++){

const date = formatDate(year,month,d)

let calories = 0

try{
if(typeof getFoodLogs !== "undefined"){
const foods = await getFoodLogs(date)
foods.forEach(f=>{
calories += Number(f.calories || 0)
})
}
}catch(e){}

totalCalories += calories
dayCount++

if(calories > 2800) bingeDays++

let score = 0

try{
score = calculateHealthScore(calories,0)
}catch(e){
score = 0
}

// 🧠 AI CATEGORY
const category = getAICategory(calories)

let color = "green"
let label = "SAFE"

if(category === "danger"){
color = "red"
label = "DANGER"
}
else if(category === "warning"){
color = "yellow"
label = "WARNING"
}

// 📅 DAY BLOCK
const div = document.createElement("div")
div.className = "day " + color

div.innerHTML = `
<b>${d}</b><br>
${score}<br>
<small>${label}</small>
`

div.onclick = ()=>{
location.href = "day.html?date=" + date
}

grid.appendChild(div)
}

// 🧠 MONTH SCORE
let avgCalories = dayCount ? totalCalories / dayCount : 0

let monthlyScore =
avgCalories < 2000 ? 90 :
avgCalories < 2400 ? 75 :
avgCalories < 2800 ? 60 : 40

document.getElementById("monthlyScore").innerText =
`Score: ${monthlyScore} | Binge Days: ${bingeDays}`

}catch(err){
console.log(err)
grid.innerHTML = "Calendar failed to load"
}

}

// MONTH CONTROL
function changeMonth(offset){

let m = parseInt(monthSelect.value)
let y = parseInt(yearSelect.value)

m += offset

if(m < 0){
m = 11
y--
}

if(m > 11){
m = 0
y++
}

monthSelect.value = m
yearSelect.value = y

loadCalendar()
}

monthSelect.onchange = loadCalendar
yearSelect.onchange = loadCalendar

loadCalendar()

</script>

</body>
</html>
