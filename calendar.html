<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calendar v9.6</title>

<script src="supabase.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white;}

.nav{
display:flex;
justify-content:space-around;
background:#111827;
padding:12px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:10px;
}

.day{
background:#1f2937;
padding:12px;
border-radius:10px;
text-align:center;
cursor:pointer;
min-height:60px;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Dashboard</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="calendar.html">Calendar</a>
<a href="shop.html">Shop</a>
</div>

<h3 style="text-align:center;">📅 Calendar</h3>

<div class="grid" id="grid"></div>

<script>

// 🟢 STEP 1：先画UI（不会空白）
const grid = document.getElementById("grid")

const dates = []
for(let i=0;i<30;i++){
const d = new Date()
d.setDate(d.getDate()-i)
dates.push(d.toISOString().split("T")[0])
}

// 先渲染格子（保证一定显示）
dates.forEach(date=>{

const div = document.createElement("div")
div.className="day"
div.innerHTML = date + "<br>loading..."

div.onclick = ()=> {
window.location.href="day.html?date="+date
}

grid.appendChild(div)
})

// 🟡 STEP 2：再慢慢加载数据
async function load(){

for(let i=0;i<grid.children.length;i++){

const date = dates[i]

try{

const res = await fetch(
SUPABASE_URL+"/rest/v1/food_logs?date=eq."+date,
{
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY
}
}
)

const data = await res.json()

let total = 0
data.forEach(d=> total += d.calories)

grid.children[i].innerHTML =
date+"<br>"+total+" kcal"

}catch(e){
grid.children[i].innerHTML =
date+"<br>0 kcal"
}

}

}

load()

</script>

</body>
</html>
