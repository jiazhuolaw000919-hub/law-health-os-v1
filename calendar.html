<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Calendar v11.1</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>

<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>

<style>
.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:14px;
}

.day{
background:#fff;
border-radius:10px;
padding:10px;
min-height:70px;
font-size:12px;
cursor:pointer;
box-shadow:0 1px 3px rgba(0,0,0,.05);
transition:0.2s;
}

.day:hover{ transform:scale(1.05); }

.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

.month-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 14px;
}

.arrow{
background:#111827;
color:white;
border:none;
border-radius:8px;
padding:6px 10px;
cursor:pointer;
}

select{
padding:6px;
border-radius:8px;
border:1px solid #ddd;
}
</style>

</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📅 AI Calendar v11.1</h2>

<!-- PROFILE -->
<div class="card">
<p id="time">Loading time...</p>
<p id="profile">Loading profile...</p>
<p id="bmi">BMI: --</p>
</div>

<!-- SUMMARY -->
<div class="card">
<h3>🧠 AI Summary</h3>
<p id="summary">Loading...</p>
</div>

<!-- CALENDAR -->
<div class="card">
<div class="month-bar">
<button class="arrow" onclick="changeMonth(-1)">‹</button>

<div>
<select id="monthSelect"></select>
<select id="yearSelect"></select>
</div>

<button class="arrow" onclick="changeMonth(1)">›</button>
</div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">

<div style="background:white;padding:20px;border-radius:12px;width:320px;max-height:70vh;overflow:auto;">

<h3 id="modalDate"></h3>
<p id="modalCalories"></p>

<div id="foodList"></div>

<p id="miniAI" style="margin-top:10px;font-weight:bold;"></p>

<br>

<button onclick="openDayPage()">📄 View Full Day Page</button>
<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

const grid = document.getElementById("grid")
const monthSelect = document.getElementById("monthSelect")
const yearSelect = document.getElementById("yearSelect")

let dateObj = new Date()

/* ================= PROFILE (STANDARDIZED) ================= */
function getActiveProfile(){
try{
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
height:170,
weight:70
}
}catch(e){
return {id:"guest",name:"Guest",height:170,weight:70}
}
}

/* ================= BMI ================= */
function calcBMI(h,w){
h = Number(h || 170)
w = Number(w || 70)
return (w / ((h/100)*(h/100))).toFixed(1)
}

/* ================= TIME ================= */
function updateTime(){
document.getElementById("time").innerText =
"🕒 " + new Date().toLocaleString()
}

/* ================= FOOD LOG STANDARD LAYER ================= */
async function safeFoodLogs(date){

try{
if(typeof getFoodLogs === "undefined") return []

const profile = getActiveProfile()
const logs = await getFoodLogs(date)

return (logs || []).filter(f =>
!f.userId || f.userId === profile.id
)

}catch(e){
return []
}
}

/* ================= CALORIE ENGINE (STANDARD SOURCE) ================= */
async function getCalories(date){

const foods = await safeFoodLogs(date)

return foods.reduce((sum,f)=>{
return sum + Number(f.calories || 0)
},0)
}

/* ================= INIT ================= */
function init(){

monthSelect.innerHTML = ""
yearSelect.innerHTML = ""

for(let m=0;m<12;m++){
let opt = document.createElement("option")
opt.value = m
opt.textContent = new Date(0,m).toLocaleString('default',{month:'long'})
monthSelect.appendChild(opt)
}

let y = new Date().getFullYear()
for(let i=y-3;i<=y+3;i++){
let opt = document.createElement("option")
opt.value = i
opt.textContent = i
yearSelect.appendChild(opt)
}

monthSelect.value = dateObj.getMonth()
yearSelect.value = dateObj.getFullYear()

const profile = getActiveProfile()

document.getElementById("profile").innerText =
`👤 ${profile.name} (${profile.id})`

document.getElementById("bmi").innerText =
`⚖ BMI: ${calcBMI(profile.height, profile.weight)}`
}

/* ================= LOAD GRID ================= */
async function load(){

grid.innerHTML = ""

let year = +yearSelect.value
let month = +monthSelect.value

let first = new Date(year,month,1).getDay()
let days = new Date(year,month+1,0).getDate()

let total = 0
let max = 0

for(let i=0;i<first;i++){
grid.innerHTML += "<div></div>"
}

for(let d=1; d<=days; d++){

let date = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`

let cal = await getCalories(date)

total += cal
if(cal > max) max = cal

let div = document.createElement("div")
div.className = "day"
div.innerHTML = `<b>${d}</b><br>${cal} kcal`
div.onclick = ()=>openModal(date,cal)

grid.appendChild(div)
}

/* ================= AI SUMMARY ================= */
let avg = total / days || 0

let profile = getActiveProfile()
let bmi = calcBMI(profile.height, profile.weight)

let aiText =
avg > 2500 && bmi > 25 ? "⚠ High calorie + overweight risk pattern"
: avg > 2200 ? "📊 High calorie intake trend"
: "✅ Balanced intake"

document.getElementById("summary").innerText =
`Avg: ${avg.toFixed(0)} kcal | Max: ${max} kcal\n${aiText}`
}

/* ================= MODAL ================= */
async function openModal(date,cal){

document.getElementById("modal").style.display = "flex"
document.getElementById("modalDate").innerText = date
document.getElementById("modalCalories").innerText = cal + " kcal"

const list = document.getElementById("foodList")
const miniAI = document.getElementById("miniAI")

list.innerHTML = "Loading..."
miniAI.innerText = ""

const foods = await safeFoodLogs(date)

if(!foods.length){
list.innerHTML = "<p>No food logged</p>"
return
}

list.innerHTML = foods.map(f =>
`<p>🍽 ${f.food} - ${f.calories} kcal</p>`
).join("")

let total = foods.reduce((s,f)=>s + Number(f.calories||0),0)

miniAI.innerText =
total > 2500 ? "🔴 High risk day"
: total > 2000 ? "🟡 Moderate intake"
: "🟢 Healthy balance"
}

/* ================= DAY PAGE LINK ================= */
function openDayPage(){
const date = document.getElementById("modalDate").innerText
window.location.href = `day.html?date=${date}`
}

/* ================= CONTROL ================= */
function changeMonth(v){

let m = +monthSelect.value
let y = +yearSelect.value

m += v

if(m < 0){ m = 11; y-- }
if(m > 11){ m = 0; y++ }

monthSelect.value = m
yearSelect.value = y

load()
}

monthSelect.onchange = load
yearSelect.onchange = load

function closeModal(){
document.getElementById("modal").style.display = "none"
}

/* ================= BOOT ================= */
setInterval(updateTime,1000)
updateTime()

document.addEventListener("DOMContentLoaded",()=>{
init()
setTimeout(load,200)
})

</script>

</body>
</html>
