<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Calendar v12.3 (Mon–Sun + Sleep)</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="supabase.js"></script>

<style>
.cheat{ position:absolute; top:6px; right:8px; font-size:16px; color:#ef4444; font-weight:bold; }
.warn{ position:absolute; top:6px; left:8px; font-size:14px; }
.skeleton { background: linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 6px; }
@keyframes shimmer { 0% {background-position:-200% 0} 100% {background-position:200% 0} }
.skeleton-text{ height:16px; width:140px; margin:5px 0; }
#modal > div { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 360px; text-align: left; }
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="calendar.html" class="active">Calendar</a>
  <a href="food.html">Food</a>
  <a href="workout.html">Workout</a>
  <a href="shopping.html">Shop</a>
  <a href="report.html">Report</a>
  <a href="profile.html">Profile</a>
</div>

<h2 class="center">📅 AI Calendar v12.3 (Mon–Sun)</h2>

<div class="card">
  <p id="time"></p>
  <div id="profileSkeleton" class="skeleton skeleton-text"></div>
  <p id="profile" style="display:none">Loading profile...</p>
  <p id="bmi"></p>
</div>

<div class="card">
  <h3>🧠 AI Weekly Intelligence</h3>
  <p id="summary">Loading...</p>
  <div id="riskSummary"></div>
</div>

<div class="card">
  <div class="month-bar">
    <button onclick="load()">‹</button>
    <select id="monthSelect"></select>
    <select id="yearSelect"></select>
    <button onclick="load()">›</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div id="modal">
  <div>
    <h3 id="modalDate"></h3>
    <p id="modalCalories"></p>
    <p id="modalProtein"></p>
    <p id="modalCarbs"></p>
    <p id="modalFat"></p>
    <div id="mealBreakdown"></div>
    <p id="miniAI"></p>
    <br>
    <button onclick="openDayPage()">📄 View Full Day</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

var grid = document.getElementById("grid");
var monthSelect = document.getElementById("monthSelect");
var yearSelect = document.getElementById("yearSelect");

function fallbackProfile(){
  return { id:"guest", name:"Guest", height:170, weight:70 };
}

function getActiveProfile(){
  try{
    var raw = localStorage.getItem("activeProfile");
    if(!raw || raw==="undefined" || raw==="null") return fallbackProfile();
    var p = JSON.parse(raw);
    return p?.id ? p : fallbackProfile();
  }catch(e){ return fallbackProfile(); }
}

function renderProfile(){
  var sk = document.getElementById("profileSkeleton");
  var el = document.getElementById("profile");
  var p = getActiveProfile();
  if(sk) sk.style.display = "none";
  if(el){ el.style.display = "block"; el.innerText = "👤 Active: " + (p.name || "Guest"); }
  var bmiEl = document.getElementById("bmi");
  if(bmiEl){ var bmi = (p.weight / ((p.height/100)*(p.height/100))).toFixed(1); bmiEl.innerText = "BMI: " + bmi; }
}

window.addEventListener("profileSyncUpdate", renderProfile);
window.addEventListener("focus", renderProfile);

async function safeFoodLogs(date){
  try{
    if(typeof getFoodLogs !== "function") return [];
    var p = getActiveProfile();
    var logs = await getFoodLogs(date) || [];
    return logs.filter(function(f) { return !f.userId || f.userId === p.id; });
  }catch(e){ return []; }
}

function getSleepForDate(date){
  var profile = getActiveProfile();
  var key = "sleep_" + profile.id;
  var logs = JSON.parse(localStorage.getItem(key) || "[]");
  var match = logs.find(function(l) { return l.date === date; });
  if (!match) return 0;
  var bed = new Date(match.bedTime);
  var wake = new Date(match.wakeTime);
  var hrs = (wake - bed) / 3600000;
  if (hrs < 0) hrs += 24;
  return hrs;
}

async function getDailyMacro(date){
  var foods = await safeFoodLogs(date);
  var calories=0, protein=0, carbs=0, fat=0;
  foods.forEach(function(f){
    calories += Number(f.calories||0);
    protein += Number(f.protein||0);
    carbs += Number(f.carbs||0);
    fat += Number(f.fat||0);
  });

  var sleepHrs = getSleepForDate(date);

  return { calories, protein, carbs, fat, sleep: sleepHrs, score: 50, risk: "LOW" };
}

function isCheatDay(calories, risk){
  return calories >= 3200 || (risk==="HIGH" && calories >= 2800);
}

async function buildWeeklySummary(){
  var total=0, max=0, macroP=0, macroC=0, macroF=0;
  for(var i=0;i<7;i++){
    var d=new Date(); d.setDate(d.getDate()-i);
    var date=d.toISOString().split("T")[0];
    var data = await getDailyMacro(date);
    total += data.calories; macroP += data.protein; macroC += data.carbs; macroF += data.fat;
    if(data.calories>max) max=data.calories;
  }
  var avg = total/7;
  var p = getActiveProfile();
  var bmi = (p.weight/((p.height/100)*(p.height/100))).toFixed(1);
  var risk = (bmi>28 || avg>2500) ? "HIGH" : avg>2200 ? "MEDIUM" : "LOW";
  var color = risk==="HIGH"?"red":risk==="MEDIUM"?"yellow":"green";
  document.getElementById("summary").innerText = "Avg " + avg.toFixed(0) + " kcal | Max " + max + " kcal";
  document.getElementById("riskSummary").innerHTML = '<span class="badge ' + color + '">' + risk + ' RISK</span><p>Protein: ' + macroP + 'g | Carbs: ' + macroC + 'g | Fat: ' + macroF + 'g</p>';
}

async function load(){
  grid.innerHTML = "";

  var y = Number(yearSelect.value || new Date().getFullYear());
  var m = Number(monthSelect.value || new Date().getMonth());
  var first = new Date(y,m,1).getDay();
  var days = new Date(y,m+1,0).getDate();

  var mondayOffset = first === 0 ? 6 : first - 1;
  for(var i=0; i<mondayOffset; i++){
    grid.innerHTML += "<div></div>";
  }

  var tasks = [];
  for(var d=1; d<=days; d++){
    var date = y + "-" + String(m+1).padStart(2,'0') + "-" + String(d).padStart(2,'0');
    tasks.push(renderDay(date, d));
  }
  await Promise.all(tasks);
}

async function renderDay(date, d){
  try{
    var data = await getDailyMacro(date);
    var cheat = isCheatDay(data.calories, data.risk);
    var icon = cheat ? "❗" : data.risk==="HIGH" ? "⚠" : data.risk==="MEDIUM" ? "▲" : "";

    var div = document.createElement("div");
    div.className = "day";

    var sleepLine = data.sleep > 0 ? "<br>😴 " + data.sleep.toFixed(1) + "h" : "";

    div.innerHTML = '<div class="warn">' + icon + '</div><b>' + d + '</b><br>' +
      data.calories + ' kcal' + sleepLine + '<br>' +
      '<span class="badge ' + (data.risk==="HIGH"?"red":data.risk==="MEDIUM"?"yellow":"green") + '">' + data.risk + '</span>';

    if(cheat){
      var mark = document.createElement("div");
      mark.className = "cheat";
      mark.innerText = "!";
      div.appendChild(mark);
    }

    div.onclick = function(){ openModal(date, data); };
    grid.appendChild(div);
  }catch(e){ console.log(e); }
}

function openModal(date, data){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalDate").innerText = date;
  document.getElementById("modalCalories").innerText = "Calories: " + data.calories;
  document.getElementById("modalProtein").innerText = "Protein: " + data.protein + "g";
  document.getElementById("modalCarbs").innerText = "Carbs: " + data.carbs + "g";
  document.getElementById("modalFat").innerText = "Fat: " + data.fat + "g";
  document.getElementById("mealBreakdown").innerHTML = "<p>AI Score: " + data.score + "/100</p><p>Risk: " + data.risk + "</p>";
  document.getElementById("miniAI").innerText = data.score>80?"🟢 Excellent":data.score>60?"🟡 Balanced":"🔴 Needs improvement";
}

function closeModal(){ document.getElementById("modal").style.display = "none"; }

function openDayPage(){
  var date = document.getElementById("modalDate").innerText;
  window.location.href = "day.html?date=" + date;
}

function init(){
  monthSelect.innerHTML = "";
  yearSelect.innerHTML = "";
  for(var i=0;i<12;i++){ monthSelect.innerHTML += '<option value="' + i + '">' + (i+1) + '</option>'; }
  var y = new Date().getFullYear();
  for(var i=y-3;i<=y+3;i++){ yearSelect.innerHTML += '<option value="' + i + '">' + i + '</option>'; }
  monthSelect.value = new Date().getMonth();
  yearSelect.value = y;
}

function updateTime(){
  document.getElementById("time").innerText = "🕒 " + new Date().toLocaleString();
}

setInterval(updateTime, 1000);

window.addEventListener("DOMContentLoaded", function(){
  init();
  renderProfile();
  buildWeeklySummary();
  load();
  setTimeout(renderProfile, 300);
  setTimeout(renderProfile, 1500);
});

window.openModal = openModal;
window.closeModal = closeModal;
window.openDayPage = openDayPage;
</script>

</body>
</html>
