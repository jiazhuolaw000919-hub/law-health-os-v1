<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Calendar v3 FIX</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>

<style>
.month-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
max-width:500px;
margin:auto;
}

.arrow{
width:32px;
height:32px;
border-radius:8px;
font-size:18px;
display:flex;
align-items:center;
justify-content:center;
}

.selectors{
display:flex;
gap:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
padding:12px;
}

.day{
background:white;
border-radius:10px;
padding:10px;
min-height:70px;
text-align:center;
font-size:12px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
</div>

<h2 class="center">📅 AI Calendar v3</h2>

<!-- CONTROL -->
<div class="card">

<div class="month-bar">

<button class="arrow" onclick="changeMonth(-1)">‹</button>

<div class="selectors">
<select id="monthSelect"></select>
<select id="yearSelect"></select>
</div>

<button class="arrow" onclick="changeMonth(1)">›</button>

</div>

</div>

<!-- SCORE -->
<div class="card">
<h3>🧠 Monthly Health Score</h3>
<p id="monthlyScore">Loading...</p>
</div>

<div class="grid" id="grid"></div>

<script>

const grid = document.getElementById("grid")
const monthSelect = document.getElementById("monthSelect")
const yearSelect = document.getElementById("yearSelect")

let dateObj = new Date()
let historyCalories = []

// INIT DROPDOWN
function initDropdowns(){

monthSelect.innerHTML = ""
yearSelect.innerHTML = ""

for(let m=0;m<12;m++){
let opt = document.createElement("option")
opt.value = m
opt.innerText = new Date(0,m).toLocaleString('default',{month:'long'})
monthSelect.appendChild(opt)
}

let y = new Date().getFullYear()

for(let i=y-3;i<=y+3;i++){
let opt = document.createElement("option")
opt.value = i
opt.innerText = i
yearSelect.appendChild(opt)
}

monthSelect.value = dateObj.getMonth()
yearSelect.value = dateObj.getFullYear()
}

// FORMAT DATE
function formatDate(y,m,d){
return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
}

// LOAD CALENDAR
async function loadCalendar(){

grid.innerHTML = ""

let year = parseInt(yearSelect.value)
let month = parseInt(monthSelect.value)

let first = new Date(year,month,1).getDay()
let days = new Date(year,month+1,0).getDate()

historyCalories = []

for(let i=0;i<first;i++){
grid.innerHTML += "<div></div>"
}

for(let d=1; d<=days; d++){

let date = formatDate(year,month,d)

let calories = 0

if(typeof getFoodLogs !== "undefined"){
let foods = await getFoodLogs(date) || []
foods.forEach(f=>calories += Number(f.calories||0))
}

historyCalories.push(calories)

let color = "green"
if(calories > 3000) color = "red"
else if(calories > 2500) color = "yellow"

let div = document.createElement("div")
div.className = "day " + color

div.innerHTML = `<b>${d}</b><br>${calories}`

div.onclick = () => {
location.href = "day.html?date=" + date
}

grid.appendChild(div)
}

document.getElementById("monthlyScore").innerText =
Math.round(historyCalories.reduce((a,b)=>a+b,0)/days)

}

// CHANGE MONTH
function changeMonth(offset){

let m = parseInt(monthSelect.value)
let y = parseInt(yearSelect.value)

m += offset

if(m < 0){m=11;y--}
if(m > 11){m=0;y++}

monthSelect.value = m
yearSelect.value = y

loadCalendar()
}

monthSelect.onchange = loadCalendar
yearSelect.onchange = loadCalendar

// INIT ORDER (IMPORTANT)
initDropdowns()
loadCalendar()

</script>

</body>
</html>
