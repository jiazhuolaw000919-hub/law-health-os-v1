<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Calendar v2.4</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
</div>

<h2 class="center">📅 AI Health Calendar</h2>

<!-- MONTH CONTROL -->
<div class="card center">
<button onclick="changeMonth(-1)">⬅</button>

<select id="monthSelect"></select>
<select id="yearSelect"></select>

<button onclick="changeMonth(1)">➡</button>
</div>

<!-- 🧠 MONTH SCORE UI -->
<div class="card">
<h3>🧠 Monthly Health Score</h3>
<p id="monthlyScore">Loading...</p>
</div>

<div class="grid" id="grid"></div>

<script>

if(typeof setActive !== "undefined"){
setActive("calendar")
}

const grid = document.getElementById("grid")

let dateObj = new Date()

const monthSelect = document.getElementById("monthSelect")
const yearSelect = document.getElementById("yearSelect")

// AI MODEL STATE
let historyCalories = []

function formatDate(y,m,d){
return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
}

// 🧠 AI: binge prediction model (simple trend-based)
function predictBingeRisk(history){

if(history.length < 3) return "LOW"

let last3 = history.slice(-3)

let avg = last3.reduce((a,b)=>a+b,0)/3

if(avg > 2800) return "HIGH"
if(avg > 2400) return "MEDIUM"
return "LOW"
}

// 📈 trend compare (month vs previous)
function compareTrend(current, previous){

if(previous === 0) return "NO DATA"

let diff = current - previous

if(diff > 300) return "🔴 WORSENING"
if(diff < -300) return "🟢 IMPROVING"
return "🟡 STABLE"
}

// 🧠 AI daily suggestion
function getSuggestion(calories){

if(calories > 3000){
return "🔥 Reduce carbs + 30min walk"
}

if(calories > 2500){
return "⚠️ Light dinner recommended"
}

return "✅ Keep routine"
}

// 🔥 MAIN LOAD
async function loadCalendar(){

try{

grid.innerHTML = ""

const year = parseInt(yearSelect.value)
const month = parseInt(monthSelect.value)

const first = new Date(year,month,1).getDay()
const days = new Date(year,month+1,0).getDate()

historyCalories = []

for(let i=0;i<first;i++){
grid.innerHTML += "<div></div>"
}

let total = 0
let bingeDays = 0

for(let d=1; d<=days; d++){

const date = formatDate(year,month,d)

let calories = 0

try{
if(typeof getFoodLogs !== "undefined"){
const foods = await getFoodLogs?.(date) || []foods.forEach(f=>{
calories += Number(f.calories || 0)
})
}
}catch(e){}

historyCalories.push(calories)

total += calories

if(calories > 2800) bingeDays++

let score = 0

try{
score = calculateHealthScore(calories,0)
}catch(e){
score = 0
}

// 🧠 AI classification
let label = "SAFE"
let color = "green"

if(calories > 3000){
label = "DANGER"
color = "red"
}
else if(calories > 2500){
label = "WARNING"
color = "yellow"
}

// 📅 day cell
const div = document.createElement("div")
div.className = "day " + color

div.innerHTML = `
<b>${d}</b><br>
${score}<br>
<small>${label}</small>
`

div.onclick = ()=>{
location.href = "day.html?date=" + date
}

grid.appendChild(div)
}

// 📊 monthly stats
let avg = total / days

let lastMonthFake = avg - 200 // simulate previous month

let trend = compareTrend(avg, lastMonthFake)

// 🧠 binge prediction
let risk = predictBingeRisk(historyCalories)

// 🧾 inject AI summary card (auto create if not exists)
let summary = document.getElementById("ai_month_summary")

if(!summary){

summary = document.createElement("div")
summary.className = "card"
summary.id = "ai_month_summary"

document.body.insertBefore(summary, grid)
}

summary.innerHTML = `
<h3>🧠 AI Monthly Analysis</h3>
<p>Avg Calories: ${avg.toFixed(0)}</p>
<p>Binge Days: ${bingeDays}</p>
<p>Trend: ${trend}</p>
<p>Risk Level: ${risk}</p>
<p>Suggestion: ${getSuggestion(avg)}</p>
`

}catch(err){
console.log(err)
grid.innerHTML = "Calendar failed to load"
}

}

// month control
function changeMonth(offset){

let m = parseInt(monthSelect.value)
let y = parseInt(yearSelect.value)

m += offset

if(m < 0){
m = 11
y--
}

if(m > 11){
m = 0
y++
}

monthSelect.value = m
yearSelect.value = y

loadCalendar()
}

monthSelect.onchange = loadCalendar
yearSelect.onchange = loadCalendar

loadCalendar()

</script>

</body>
</html>
