<h2 class="center">📅 Calendar</h2>

<div class="grid" id="grid"></div>

<script>

setActive("calendar")

const grid = document.getElementById("grid")

const year = new Date().getFullYear()
const month = new Date().getMonth()

function formatDate(d){
return `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
}

async function load(){

grid.innerHTML = ""

const firstDay = new Date(year,month,1).getDay()
const daysInMonth = new Date(year,month+1,0).getDate()

for(let i=0;i<firstDay;i++){
grid.innerHTML += "<div></div>"
}

for(let d=1; d<=daysInMonth; d++){

const date = formatDate(d)

let calories = 0

try{
const foods = await getFoodLogs(date)

foods.forEach(f=>{
calories += Number(f.calories || 0)
})
}catch(e){
calories = 0
}

let score = calculateHealthScore(calories,0)

let color = ""
if(score >= 80) color = "green"
else if(score >= 50) color = "yellow"
else color = "red"

const div = document.createElement("div")
div.className = "day " + color

div.innerHTML = `<b>${d}</b><br>${score}`

div.onclick = () => {
window.location.href = "day.html?date=" + date
}

grid.appendChild(div)
}

}

load()

</script>

</body>
</html>
