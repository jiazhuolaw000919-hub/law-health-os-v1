<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Calendar v11.3</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>

<style>
.day{
background:#fff;
border-radius:10px;
padding:10px;
min-height:70px;
font-size:12px;
cursor:pointer;
box-shadow:0 1px 3px rgba(0,0,0,.05);
transition:0.2s;
}
.day:hover{transform:scale(1.05)}

.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

.badge{
display:inline-block;
padding:4px 8px;
border-radius:6px;
font-size:12px;
margin-top:5px;
}

.green{background:#dcfce7;color:#166534}
.yellow{background:#fef9c3;color:#854d0e}
.red{background:#fee2e2;color:#991b1b}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📅 AI Calendar v11.3</h2>

<!-- PROFILE -->
<div class="card">
<p id="time"></p>
<p id="profile"></p>
<p id="bmi"></p>
</div>

<!-- AI SUMMARY -->
<div class="card">
<h3>🧠 AI Weekly Intelligence</h3>
<p id="summary">Loading...</p>
<div id="riskSummary"></div>
</div>

<!-- CALENDAR -->
<div class="card">
<div class="month-bar">
<button onclick="changeMonth(-1)">‹</button>

<select id="monthSelect"></select>
<select id="yearSelect"></select>

<button onclick="changeMonth(1)">›</button>
</div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;
background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">

<div style="background:white;padding:20px;border-radius:12px;width:360px;">

<h3 id="modalDate"></h3>
<p id="modalCalories"></p>

<div id="mealBreakdown"></div>

<p id="miniAI"></p>

<br>

<button onclick="openDayPage()">📄 View Full Day</button>
<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

const grid = document.getElementById("grid")
const monthSelect = document.getElementById("monthSelect")
const yearSelect = document.getElementById("yearSelect")

let dateObj = new Date()

/* ================= PROFILE ================= */
function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
height:170,
weight:70
}
}

/* ================= BMI ================= */
function calcBMI(h,w){
return (w / ((h/100)*(h/100))).toFixed(1)
}

/* ================= TIME ================= */
function updateTime(){
document.getElementById("time").innerText =
"🕒 " + new Date().toLocaleString()
}

/* ================= SAFE LOGS ================= */
async function safeFoodLogs(date){
if(typeof getFoodLogs === "undefined") return []
const p = getActiveProfile()
const logs = await getFoodLogs(date) || []
return logs.filter(f => !f.userId || f.userId === p.id)
}

/* ================= CALORIES ================= */
async function getCalories(date){
const foods = await safeFoodLogs(date)
return foods.reduce((s,f)=>s+Number(f.calories||0),0)
}

/* ================= WEEKLY AI SUMMARY ================= */
async function buildWeeklySummary(){

let total=0,max=0,days=7

for(let i=0;i<7;i++){
let d=new Date()
d.setDate(d.getDate()-i)
let date=d.toISOString().split("T")[0]
let cal=await getCalories(date)

total+=cal
if(cal>max)max=cal
}

let avg=total/days
let p=getActiveProfile()
let bmi=calcBMI(p.height,p.weight)

let risk =
(bmi>28 || avg>2500) ? "HIGH"
: avg>2200 ? "MEDIUM"
: "LOW"

let color =
risk==="HIGH"?"red"
:risk==="MEDIUM"?"yellow"
:"green"

document.getElementById("summary").innerText =
`Avg ${avg.toFixed(0)} kcal | Max ${max} kcal`

document.getElementById("riskSummary").innerHTML =
`<span class="badge ${color}">
${risk} RISK
</span>
<p>${
risk==="HIGH"?"Increase activity + reduce carbs"
:risk==="MEDIUM"?"Balance meals + monitor intake"
:"Stable healthy pattern"
}</p>`
}

/* ================= MEAL AI ================= */
function mealAI(foods){

let total=foods.reduce((s,f)=>s+Number(f.calories||0),0)

let protein=foods.filter(f=>/chicken|egg|beef|fish/.test((f.food||"").toLowerCase())).length
let carb=foods.filter(f=>/rice|bread|noodle/.test((f.food||"").toLowerCase())).length

let score=100
if(total>2500)score-=30
if(carb>protein)score-=20

let label =
score>80?"🟢 Good Meal"
:score>60?"🟡 Balanced"
:"🔴 Poor Balance"

return {score,label,total}
}

/* ================= LOAD GRID ================= */
async function load(){

grid.innerHTML=""

let y=+yearSelect.value
let m=+monthSelect.value

let first=new Date(y,m,1).getDay()
let days=new Date(y,m+1,0).getDate()

for(let i=0;i<first;i++)grid.innerHTML+="<div></div>"

for(let d=1;d<=days;d++){

let date=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
let cal=await getCalories(date)

let div=document.createElement("div")
div.className="day"
div.innerHTML=`<b>${d}</b><br>${cal} kcal`
div.onclick=()=>openModal(date,cal)

grid.appendChild(div)
}
}

/* ================= MODAL ================= */
async function openModal(date,cal){

document.getElementById("modal").style.display="flex"
document.getElementById("modalDate").innerText=date
document.getElementById("modalCalories").innerText=cal+" kcal"

const foods=await safeFoodLogs(date)
const box=document.getElementById("mealBreakdown")
const mini=document.getElementById("miniAI")

if(!foods.length){
box.innerHTML="<p>No data</p>"
mini.innerHTML=""
return
}

let ai=mealAI(foods)

box.innerHTML=
`<p>🍳 Meal Score: ${ai.score}</p>
<p>${ai.label}</p>
<p>Total: ${ai.total} kcal</p>`

mini.innerHTML =
ai.score>80?"🟢 Excellent day"
:ai.score>60?"🟡 Needs balance"
:"🔴 Poor nutrition"
}

/* ================= NAV ================= */
function changeMonth(v){

let m=+monthSelect.value
let y=+yearSelect.value

m+=v
if(m<0){m=11;y--}
if(m>11){m=0;y++}

monthSelect.value=m
yearSelect.value=y

load()
}

function closeModal(){
document.getElementById("modal").style.display="none"
}

function openDayPage(){
let date=document.getElementById("modalDate").innerText
window.location.href=`day.html?date=${date}`
}

/* ================= INIT ================= */
function init(){

monthSelect.innerHTML=""
yearSelect.innerHTML=""

for(let i=0;i<12;i++)
monthSelect.innerHTML+=`<option value="${i}">${i+1}</option>`

let y=new Date().getFullYear()
for(let i=y-3;i<=y+3;i++)
yearSelect.innerHTML+=`<option>${i}</option>`

monthSelect.value=new Date().getMonth()
yearSelect.value=new Date().getFullYear()
}

/* ================= BOOT ================= */
setInterval(updateTime,1000)
updateTime()

init()
buildWeeklySummary()
load()

</script>

</body>
</html>
