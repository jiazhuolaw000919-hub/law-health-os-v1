.day{

border-radius:10px;
padding:10px;
min-height:70px;
font-size:12px;
cursor:pointer;

}

padding:12px;

}

.badge{
display:inline-block;
padding:4px 8px;
border-radius:6px;
font-size:12px;
margin-top:5px;
}

.green{background:#dcfce7;color:#166534}
.yellow{background:#fef9c3;color:#854d0e}
.red{background:#fee2e2;color:#991b1b}
</style>
</head>

<body>

<h2 class="center">📅 AI Calendar v11.5 (PHASE 6 GLOBAL SYNC)</h2>

<!-- PROFILE -->
<div class="card">
<p id="time"></p>
<p id="profile"></p>
<p id="bmi"></p>
</div>

<!-- AI SUMMARY -->
<div class="card">
<h3>🧠 AI Weekly Intelligence</h3>
<p id="summary">Loading...</p>
<div id="riskSummary"></div>
</div>

<!-- CALENDAR -->
<div class="card">
<div class="month-bar">
<button onclick="changeMonth(-1)">‹</button>

<select id="monthSelect"></select>
<select id="yearSelect"></select>

<button onclick="changeMonth(1)">›</button>
</div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;
background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">

<div style="background:white;padding:20px;border-radius:12px;width:360px;">

<h3 id="modalDate"></h3>

<p id="modalCalories"></p>
<p id="modalProtein"></p>
<p id="modalCarbs"></p>
<p id="modalFat"></p>

<div id="mealBreakdown"></div>

<p id="miniAI"></p>

<br>

<button onclick="openDayPage()">📄 View Full Day</button>
<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

const grid = document.getElementById("grid")
const monthSelect = document.getElementById("monthSelect")
const yearSelect = document.getElementById("yearSelect")

/* ================= PROFILE ================= */
function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
height:170,
weight:70
}
}

/* ================= SAFE LOGS ================= */
async function safeFoodLogs(date){
if(typeof getFoodLogs === "undefined") return []
const p = getActiveProfile()
const logs = await getFoodLogs(date) || []
return logs.filter(f => !f.userId || f.userId === p.id)
}

/* ================= DAILY GLOBAL SYNC ================= */
async function getDailyMacro(date){

const foods = await safeFoodLogs(date)

let calories = 0
let protein = 0
let carbs = 0
let fat = 0

foods.forEach(f=>{
calories += Number(f.calories||0)
protein += Number(f.protein||0)
carbs += Number(f.carbs||0)
fat += Number(f.fat||0)
})

let ai = (typeof getAIInsight !== "undefined")
? getAIInsight(calories, 22)
: {score:0, risk:{level:"🟢"}}

return {
calories,
protein,
carbs,
fat,
score: ai.score,
risk: ai.risk.level
}
}

/* ================= WEEK SUMMARY (FIXED) ================= */
async function buildWeeklySummary(){

let total=0,max=0,days=7
let macroP=0, macroC=0, macroF=0

for(let i=0;i<7;i++){

let d=new Date()
d.setDate(d.getDate()-i)
let date=d.toISOString().split("T")[0]

let data = await getDailyMacro(date)

total += data.calories
macroP += data.protein
macroC += data.carbs
macroF += data.fat

if(data.calories>max) max=data.calories
}

let avg = total/days

let p = getActiveProfile()
let bmi = (p.weight / ((p.height/100)*(p.height/100))).toFixed(1)

let risk =
(bmi>28 || avg>2500) ? "HIGH"
: avg>2200 ? "MEDIUM"
: "LOW"

let color =
risk==="HIGH"?"red"
:risk==="MEDIUM"?"yellow"
:"green"

document.getElementById("summary").innerText =
`Avg ${avg.toFixed(0)} kcal | Max ${max} kcal`

document.getElementById("riskSummary").innerHTML =
`<span class="badge ${color}">
${risk} RISK
</span>
<p>Protein: ${macroP}g | Carbs: ${macroC}g | Fat: ${macroF}g</p>
<p>${
risk==="HIGH"?"Increase activity + reduce carbs"
:risk==="MEDIUM"?"Balance meals + monitor intake"
:"Stable healthy pattern"
}</p>`
}

/* ================= CALORIES ================= */
async function getCalories(date){
let data = await getDailyMacro(date)
return data.calories
}

/* ================= GRID ================= */
async function load(){

grid.innerHTML=""

let y=+yearSelect.value
let m=+monthSelect.value

let first=new Date(y,m,1).getDay()
let days=new Date(y,m+1,0).getDate()

for(let i=0;i<first;i++)grid.innerHTML+="<div></div>"

for(let d=1;d<=days;d++){

let date=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`

let data = await getDailyMacro(date)

let div=document.createElement("div")
div.className="day"

div.innerHTML=`
<b>${d}</b><br>
${data.calories} kcal<br>
<span class="badge ${data.risk==="HIGH"?"red":data.risk==="MEDIUM"?"yellow":"green"}">
${data.risk}
</span>
`

div.onclick=()=>openModal(date,data)

grid.appendChild(div)
}
}

/* ================= MODAL (FIXED MACRO DISPLAY) ================= */
async function openModal(date,data){

document.getElementById("modal").style.display="flex"
document.getElementById("modalDate").innerText=date

document.getElementById("modalCalories").innerText =
`Calories: ${data.calories} kcal`

document.getElementById("modalProtein").innerText =
`Protein: ${data.protein} g`

document.getElementById("modalCarbs").innerText =
`Carbs: ${data.carbs} g`

document.getElementById("modalFat").innerText =
`Fat: ${data.fat} g`

document.getElementById("mealBreakdown").innerHTML =
`<p>AI Score: ${data.score}/100</p>
<p>Risk: ${data.risk}</p>`

document.getElementById("miniAI").innerText =
data.score>80?"🟢 Excellent day"
:data.score>60?"🟡 Balanced day"
:"🔴 Needs improvement"
}

/* ================= INIT ================= */
function init(){

monthSelect.innerHTML=""
yearSelect.innerHTML=""

for(let i=0;i<12;i++)
monthSelect.innerHTML+=`<option value="${i}">${i+1}</option>`

let y=new Date().getFullYear()
for(let i=y-3;i<=y+3;i++)
yearSelect.innerHTML+=`<option>${i}</option>`

monthSelect.value=new Date().getMonth()
yearSelect.value=new Date().getFullYear()
}

/* ================= TIME ================= */
function updateTime(){
document.getElementById("time").innerText =
"🕒 " + new Date().toLocaleString()
}

setInterval(updateTime,1000)
updateTime()

init()
buildWeeklySummary()
load()

</script>

</body>
</html>
