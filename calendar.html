<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Calendar v11.2</title>

<script src="supabase.js"></script>
<script src="ai.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f6f7fb;
color:#111827;
}

.nav{
display:flex;
justify-content:space-around;
background:white;
padding:12px;
border-bottom:1px solid #e5e7eb;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:10px;
}

.day{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
font-size:12px;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.green{background:#dcfce7}
.yellow{background:#fef9c3}
.red{background:#fee2e2}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Dashboard</a>
<a href="calendar.html">Calendar</a>
</div>

<h2 style="text-align:center">📅 AI Calendar v11.2</h2>

<div class="grid" id="grid"></div>

<script>

let year = new Date().getFullYear()
let month = new Date().getMonth()

function dateStr(d){
return `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
}

async function render(){

const grid = document.getElementById("grid")
grid.innerHTML = ""

const first = new Date(year,month,1).getDay()
const days = new Date(year,month+1,0).getDate()

for(let i=0;i<first;i++){
grid.innerHTML += `<div></div>`
}

for(let d=1; d<=days; d++){

const date = dateStr(d)

const foods = await getFood(date)

let cal = 0
foods.forEach(f=> cal += f.calories)

let burn = 0
let score = calcScore(cal,burn)

let color =
score>=80?"green":
score>=50?"yellow":"red"

const div = document.createElement("div")
div.className="day "+color

div.innerHTML=`
<b>${d}</b><br>
${Math.round(score)} pts<br>
${cal} kcal<br>
${workoutAdvice(cal)}
`

div.onclick=()=>{
location.href="day.html?date="+date
}

grid.appendChild(div)
}

}

render()

</script>

</body>
</html>
