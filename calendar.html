<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Calendar v12.2 Stable Pro</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>

<style>
.day{
background:#fff;
border-radius:10px;
padding:10px;
min-height:70px;
font-size:12px;
cursor:pointer;
box-shadow:0 1px 3px rgba(0,0,0,.05);
transition:0.2s;
position:relative;
}
.day:hover{transform:scale(1.05)}

.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

.badge{
display:inline-block;
padding:4px 8px;
border-radius:6px;
font-size:12px;
margin-top:5px;
}

.green{background:#dcfce7;color:#166534}
.yellow{background:#fef9c3;color:#854d0e}
.red{background:#fee2e2;color:#991b1b}

.cheat{
position:absolute;
top:6px;
right:8px;
font-size:16px;
color:#ef4444;
font-weight:bold;
}

.warn{
position:absolute;
top:6px;
left:8px;
font-size:14px;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📅 AI Calendar v12.2 Stable Pro (Cheat Detection)</h2>

<div class="card">
<p id="time"></p>
<p id="profile"></p>
<p id="bmi"></p>
</div>

<div class="card">
<h3>🧠 AI Weekly Intelligence</h3>
<p id="summary">Loading...</p>
<div id="riskSummary"></div>
</div>

<div class="card">
<div class="month-bar">
<button onclick="changeMonth(-1)">‹</button>

<select id="monthSelect"></select>
<select id="yearSelect"></select>

<button onclick="changeMonth(1)">›</button>
</div>
</div>

<div class="grid" id="grid"></div>

<div id="modal" class="modal-bg">
<div style="background:white;padding:20px;border-radius:12px;width:360px;">
<h3 id="modalDate"></h3>

<p id="modalCalories"></p>
<p id="modalProtein"></p>
<p id="modalCarbs"></p>
<p id="modalFat"></p>

<div id="mealBreakdown"></div>
<p id="miniAI"></p>

<br>

<button onclick="openDayPage()">📄 View Full Day</button>
<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

const grid = document.getElementById("grid")
const monthSelect = document.getElementById("monthSelect")
const yearSelect = document.getElementById("yearSelect")

/* ================= PROFILE ================= */
function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
height:170,
weight:70
}
}

/* ================= SAFE FOOD ================= */
async function safeFoodLogs(date){
try{
if(typeof getFoodLogs !== "function") return []
const p = getActiveProfile()
const logs = await getFoodLogs(date) || []
return logs.filter(f => !f.userId || f.userId === p.id)
}catch(e){
return []
}
}

/* ================= DAILY ================= */
async function getDailyMacro(date){

let foods = await safeFoodLogs(date)

let calories=0, protein=0, carbs=0, fat=0

foods.forEach(f=>{
calories += Number(f.calories||0)
protein += Number(f.protein||0)
carbs += Number(f.carbs||0)
fat += Number(f.fat||0)
})

let ai = (typeof getAIInsight === "function")
? getAIInsight(calories, 22)
: {score:50, risk:{level:"🟢"}}

return {
calories,
protein,
carbs,
fat,
score: ai.score,
risk: ai.risk.level
}
}

/* ================= CHEAT DAY LOGIC (NEW) ================= */
function isCheatDay(calories, risk){

if(calories >= 3200) return true
if(risk === "HIGH" && calories >= 2800) return true
return false
}

/* ================= WEEK SUMMARY ================= */
async function buildWeeklySummary(){

let total=0,max=0
let macroP=0,macroC=0,macroF=0

for(let i=0;i<7;i++){
let d=new Date()
d.setDate(d.getDate()-i)
let date=d.toISOString().split("T")[0]

let data = await getDailyMacro(date)

total += data.calories
macroP += data.protein
macroC += data.carbs
macroF += data.fat

if(data.calories>max) max=data.calories
}

let avg = total/7
let p = getActiveProfile()
let bmi = (p.weight/((p.height/100)**2)).toFixed(1)

let risk =
(bmi>28 || avg>2500) ? "HIGH"
: avg>2200 ? "MEDIUM"
: "LOW"

let color =
risk==="HIGH"?"red"
:risk==="MEDIUM"?"yellow"
:"green"

document.getElementById("summary").innerText =
`Avg ${avg.toFixed(0)} kcal | Max ${max} kcal`

document.getElementById("riskSummary").innerHTML =
`<span class="badge ${color}">${risk} RISK</span>
<p>Protein: ${macroP}g | Carbs: ${macroC}g | Fat: ${macroF}g</p>`
}

/* ================= LOAD ================= */
async function load(){

grid.innerHTML=""

let y = Number(yearSelect.value || new Date().getFullYear())
let m = Number(monthSelect.value || new Date().getMonth())

let first = new Date(y,m,1).getDay()
let days = new Date(y,m+1,0).getDate()

for(let i=0;i<first;i++){
grid.innerHTML += "<div></div>"
}

for(let d=1; d<=days; d++){
let date = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
await renderDay(date,d)
}
}

/* ================= RENDER DAY (CHEAT DAY + ! MARKER) ================= */
async function renderDay(date,d){

try{

let data = await getDailyMacro(date)

let cheat = isCheatDay(data.calories, data.risk)

/* ICON SYSTEM */
let icon = ""
if(cheat){
icon = "❗"
}else if(data.risk === "HIGH"){
icon = "⚠"
}else if(data.risk === "MEDIUM"){
icon = "▲"
}

let div = document.createElement("div")
div.className="day"

div.innerHTML=`
<div class="warn">${icon}</div>
<b>${d}</b><br>
${data.calories} kcal<br>
<span class="badge ${data.risk==="HIGH"?"red":data.risk==="MEDIUM"?"yellow":"green"}">
${data.risk}
</span>
`

if(cheat){
let mark = document.createElement("div")
mark.className="cheat"
mark.innerText="!"
div.appendChild(mark)
}

div.onclick = () => openModal(date,data)

grid.appendChild(div)

}catch(e){
console.log("render error:",e)
}
}

/* ================= MODAL ================= */
function openModal(date,data){

document.getElementById("modal").style.display="flex"
document.getElementById("modalDate").innerText=date

document.getElementById("modalCalories").innerText =
`Calories: ${data.calories}`

document.getElementById("modalProtein").innerText =
`Protein: ${data.protein}`

document.getElementById("modalCarbs").innerText =
`Carbs: ${data.carbs}`

document.getElementById("modalFat").innerText =
`Fat: ${data.fat}`

document.getElementById("mealBreakdown").innerHTML =
`<p>AI Score: ${data.score}/100</p>
<p>Risk: ${data.risk}</p>`

document.getElementById("miniAI").innerText =
data.score>80?"🟢 Excellent"
:data.score>60?"🟡 Balanced"
:"🔴 Needs improvement"
}

function closeModal(){
document.getElementById("modal").style.display="none"
}

function openDayPage(){
let date=document.getElementById("modalDate").innerText
window.location.href=`day.html?date=${date}`
}

/* ================= INIT ================= */
function init(){

monthSelect.innerHTML=""
yearSelect.innerHTML=""

for(let i=0;i<12;i++){
monthSelect.innerHTML += `<option value="${i}">${i+1}</option>`
}

let y=new Date().getFullYear()

for(let i=y-3;i<=y+3;i++){
yearSelect.innerHTML += `<option value="${i}">${i}</option>`
}

monthSelect.value = new Date().getMonth()
yearSelect.value = y

monthSelect.onchange = load
yearSelect.onchange = load
}

function updateTime(){
document.getElementById("time").innerText =
"🕒 " + new Date().toLocaleString()
}

setInterval(updateTime,1000)
updateTime()

init()
buildWeeklySummary()
load()

window.openModal=openModal
window.closeModal=closeModal
window.openDayPage=openDayPage

</script>

</body>
</html>
