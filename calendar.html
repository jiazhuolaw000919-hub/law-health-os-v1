<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Calendar v11.2</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>

<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📅 AI Calendar v11.2</h2>

<!-- PROFILE -->
<div class="card">
<p id="time"></p>
<p id="profile"></p>
<p id="bmi"></p>
</div>

<!-- AI SUMMARY (UPGRADED) -->
<div class="card">
<h3>🧠 AI Weekly Intelligence</h3>
<p id="summary">Loading...</p>
<p id="riskSummary"></p>
</div>

<!-- CALENDAR -->
<div class="card">
<div class="month-bar">
<button onclick="changeMonth(-1)">‹</button>

<select id="monthSelect"></select>
<select id="yearSelect"></select>

<button onclick="changeMonth(1)">›</button>
</div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL (UPGRADED MEAL AI) -->
<div id="modal" style="display:none;position:fixed;inset:0;
background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">

<div style="background:white;padding:20px;border-radius:12px;width:360px;">

<h3 id="modalDate"></h3>
<p id="modalCalories"></p>

<div id="mealBreakdown"></div>

<p id="miniAI" style="font-weight:bold;"></p>

<br>

<button onclick="openDayPage()">📄 Open Day Page</button>
<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

const grid = document.getElementById("grid")
const monthSelect = document.getElementById("monthSelect")
const yearSelect = document.getElementById("yearSelect")

let dateObj = new Date()

/* ================= PROFILE ================= */
function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
height:170,
weight:70
}
}

/* ================= BMI ================= */
function calcBMI(h,w){
h = Number(h||170)
w = Number(w||70)
return (w / ((h/100)*(h/100))).toFixed(1)
}

/* ================= TIME ================= */
function updateTime(){
document.getElementById("time").innerText =
"🕒 " + new Date().toLocaleString()
}

/* ================= SAFE LOGS ================= */
async function safeFoodLogs(date){
if(typeof getFoodLogs === "undefined") return []
const profile = getActiveProfile()
const logs = await getFoodLogs(date) || []

return logs.filter(f =>
!f.userId || f.userId === profile.id
)
}

/* ================= CALORIES ENGINE ================= */
async function getCalories(date){
const foods = await safeFoodLogs(date)
return foods.reduce((s,f)=>s + Number(f.calories||0),0)
}

/* ================= MEAL SPLIT (AI SIMULATION) ================= */
function splitMeals(foods){

let meals = {
breakfast:[],
lunch:[],
dinner:[]
}

foods.forEach(f=>{
let name = (f.food||"").toLowerCase()

if(name.includes("breakfast") || name.includes("egg") || name.includes("bread")){
meals.breakfast.push(f)
}
else if(name.includes("rice") || name.includes("chicken") || name.includes("noodle")){
meals.lunch.push(f)
}
else{
meals.dinner.push(f)
}
})

return meals
}

/* ================= AI RISK ENGINE ================= */
function getRisk(cal,bmi){

if(cal > 2800 && bmi > 28) return "🔴 HIGH RISK"
if(cal > 2400) return "🟡 MODERATE RISK"
if(bmi > 28) return "🟡 BMI WARNING"
return "🟢 LOW RISK"
}

/* ================= WEEKLY AI SUMMARY ================= */
async function buildWeeklySummary(){

let total = 0
let days = 7
let max = 0

for(let i=0;i<7;i++){

let d = new Date()
d.setDate(d.getDate()-i)

let date = d.toISOString().split("T")[0]
let cal = await getCalories(date)

total += cal
if(cal > max) max = cal
}

let avg = total / days
let profile = getActiveProfile()
let bmi = calcBMI(profile.height,profile.weight)

let risk = getRisk(avg,bmi)

document.getElementById("summary").innerText =
`Avg: ${avg.toFixed(0)} kcal | Max: ${max} kcal`

document.getElementById("riskSummary").innerText = risk
}

/* ================= LOAD GRID ================= */
async function load(){

grid.innerHTML = ""

let y = +yearSelect.value
let m = +monthSelect.value

let first = new Date(y,m,1).getDay()
let days = new Date(y,m+1,0).getDate()

for(let i=0;i<first;i++) grid.innerHTML += "<div></div>"

for(let d=1; d<=days; d++){

let date = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
let cal = await getCalories(date)

let div = document.createElement("div")
div.className = "day"
div.innerHTML = `<b>${d}</b><br>${cal} kcal`
div.onclick = ()=>openModal(date,cal)

grid.appendChild(div)
}
}

/* ================= MODAL (MEAL AI UPGRADED) ================= */
async function openModal(date,cal){

document.getElementById("modal").style.display = "flex"
document.getElementById("modalDate").innerText = date
document.getElementById("modalCalories").innerText = cal + " kcal"

const foods = await safeFoodLogs(date)
const box = document.getElementById("mealBreakdown")

if(!foods.length){
box.innerHTML = "<p>No data</p>"
return
}

let meals = splitMeals(foods)

let render = (list,title)=>{
let total = list.reduce((s,f)=>s+Number(f.calories||0),0)
return `<p><b>${title}</b>: ${total} kcal</p>`
}

box.innerHTML =
render(meals.breakfast,"🍳 Breakfast") +
render(meals.lunch,"🍱 Lunch") +
render(meals.dinner,"🍽 Dinner")

let bmi = calcBMI(getActiveProfile().height,getActiveProfile().weight)

document.getElementById("miniAI").innerText =
getRisk(cal,bmi)
}

/* ================= DAY PAGE LINK ================= */
function openDayPage(){
let date = document.getElementById("modalDate").innerText
window.location.href = `day.html?date=${date}`
}

/* ================= CONTROL ================= */
function changeMonth(v){

let m = +monthSelect.value
let y = +yearSelect.value

m += v
if(m<0){m=11;y--}
if(m>11){m=0;y++}

monthSelect.value=m
yearSelect.value=y

load()
}

/* ================= INIT ================= */
monthSelect.onchange = load
yearSelect.onchange = load

function init(){

monthSelect.innerHTML=""
yearSelect.innerHTML=""

for(let i=0;i<12;i++){
monthSelect.innerHTML += `<option value="${i}">${i+1}</option>`
}

let y = new Date().getFullYear()
for(let i=y-3;i<=y+3;i++){
yearSelect.innerHTML += `<option>${i}</option>`
}

monthSelect.value = new Date().getMonth()
yearSelect.value = new Date().getFullYear()
}

/* ================= BOOT ================= */
setInterval(updateTime,1000)
updateTime()

init()
buildWeeklySummary()
load()

</script>

</body>
</html>
