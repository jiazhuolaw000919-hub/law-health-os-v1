<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Full Test</title>
</head>

<body style="font-family:Arial; text-align:center; padding:30px;">

  <h1>🧪 Supabase Connection Test</h1>

  <button onclick="testSupabase()" style="padding:10px 20px;">
    Test Connection
  </button>

  <p id="result">Waiting...</p>

<script>

const SUPABASE_URL = "https://jwcgamxkwzrjnepxrvzr.supabase.co"

// ⚠️ 把这里换成你的 anon public key
const SUPABASE_KEY = "PASTE_YOUR_ANON_KEY_HERE"

async function testSupabase(){

  document.getElementById("result").innerText = "Testing..."

  const url = SUPABASE_URL + "/rest/v1/food_logs?select=*"

  try {

    const res = await fetch(url, {
      method: "GET",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    })

    const text = await res.text()

    console.log("STATUS:", res.status)
    console.log("RESPONSE:", text)

    document.getElementById("result").innerText =
      "STATUS: " + res.status + "\n\n" + text

  } catch (err) {

    console.log("ERROR:", err)

    document.getElementById("result").innerText =
      "ERROR: " + err.message

  }

}

</script>

</body>
</html>
