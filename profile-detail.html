<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Detail - Edit & View (Sleep Target)</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="supabase.js"></script>

<style>
.card{
  margin:10px;
  padding:12px;
  background:#fff;
  border-radius:10px;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
input, select {
  width:100%;
  margin:6px 0;
  padding:9px;
  border-radius:6px;
  border:1px solid #ddd;
}
.row{ display:flex; gap:10px; }
.small{width:48%}
.readonly { background: #f1f5f9; color: #555; }
button {
  margin:8px 4px;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  border:1px solid #ddd;
}
@media (max-width: 480px) {
  .card { margin: 8px; padding: 10px; }
  input, select { padding: 8px; font-size: 0.9rem; }
  button { padding: 10px 14px; }
}
</style>
</head>
<body>

<div class="nav">
  <a href="profile.html">← Back to Profiles</a>
</div>

<h2 class="center">📝 Edit Profile Details</h2>

<div class="card">
  <h3>🔒 Profile ID (Immutable)</h3>
  <input id="profileId" class="readonly" readonly disabled>
  
  <h3>👤 Identity</h3>
  <input id="name" placeholder="Name / Nickname *">
  <input id="email" placeholder="Email *">
  <input id="phone" placeholder="Phone">
  
  <select id="gender">
    <option value="">Gender *</option>
    <option value="male">Male</option>
    <option value="female">Female</option>
    <option value="other">Other</option>
  </select>
  
  <input id="age" placeholder="Age">
  <input id="country" placeholder="Country">
  <input id="occupation" placeholder="Occupation">
  
  <h3>⚖ Body Metrics</h3>
  <input id="height" placeholder="Height (cm) *">
  <input id="weight" placeholder="Weight (kg) *">
  <input id="target_weight" placeholder="Target Weight (kg) *">
  
  <input id="body_fat" placeholder="Body Fat %">
  <input id="muscle_mass" placeholder="Muscle Mass (kg)">
  
  <label>Target Sleep (hours):</label>
  <input type="number" id="targetSleep" placeholder="8" min="4" max="12" step="0.5">
  
  <select id="goal">
    <option value="">Primary Goal *</option>
    <option value="fat_loss">Fat Loss</option>
    <option value="muscle_gain">Muscle Gain</option>
    <option value="maintenance">Maintenance</option>
    <option value="health_improvement">Health Improvement</option>
    <option value="rehab">Rehab</option>
  </select>
  
  <br><br>
  <button onclick="saveChanges()">💾 Save Changes</button>
  <button onclick="cancelEdit()">Cancel</button>
  <p id="saveStatus" style="color:green; display:none;">Saved successfully!</p>
</div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const profileId = urlParams.get('id');

if (!profileId) {
  alert('No profile ID specified.');
  window.location.href = 'profile.html';
}

function getProfileById(id) {
  let profiles = JSON.parse(localStorage.getItem('profiles') || '[]');
  return profiles.find(p => p.id === id);
}

let currentProfile = getProfileById(profileId);

if (!currentProfile) {
  alert('Profile not found.');
  window.location.href = 'profile.html';
}

// Populate form
document.getElementById('profileId').value = currentProfile.id || '';
document.getElementById('name').value = currentProfile.name || '';
document.getElementById('email').value = currentProfile.email || '';
document.getElementById('phone').value = currentProfile.phone || '';
document.getElementById('gender').value = currentProfile.gender || '';
document.getElementById('age').value = currentProfile.age || '';
document.getElementById('country').value = currentProfile.country || '';
document.getElementById('occupation').value = currentProfile.occupation || '';
document.getElementById('height').value = currentProfile.height || '';
document.getElementById('weight').value = currentProfile.weight || '';
document.getElementById('target_weight').value = currentProfile.target_weight || '';
document.getElementById('body_fat').value = currentProfile.body_fat_percentage || '';
document.getElementById('muscle_mass').value = currentProfile.muscle_mass || '';
document.getElementById('goal').value = currentProfile.primary_goal || '';
document.getElementById('targetSleep').value = currentProfile.targetSleep || 8;

async function saveChanges() {
  const updatedProfile = {
    ...currentProfile,
    name: document.getElementById('name').value.trim(),
    email: document.getElementById('email').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    gender: document.getElementById('gender').value,
    age: Number(document.getElementById('age').value) || 0,
    country: document.getElementById('country').value.trim(),
    occupation: document.getElementById('occupation').value.trim(),
    height: Number(document.getElementById('height').value) || 170,
    weight: Number(document.getElementById('weight').value) || 70,
    target_weight: Number(document.getElementById('target_weight').value) || 70,
    body_fat_percentage: Number(document.getElementById('body_fat').value) || 0,
    muscle_mass: Number(document.getElementById('muscle_mass').value) || 0,
    primary_goal: document.getElementById('goal').value,
    targetSleep: Number(document.getElementById('targetSleep').value) || 8,
    bmi: (() => {
      const h = Number(document.getElementById('height').value) || 170;
      const w = Number(document.getElementById('weight').value) || 70;
      return (w / ((h/100)*(h/100))).toFixed(1);
    })(),
    updated_at: new Date().toISOString()
  };

  let profiles = JSON.parse(localStorage.getItem('profiles') || '[]');
  const index = profiles.findIndex(p => p.id === profileId);
  if (index !== -1) {
    profiles[index] = updatedProfile;
    localStorage.setItem('profiles', JSON.stringify(profiles));
  }

  const active = JSON.parse(localStorage.getItem('activeProfile'));
  if (active && active.id === profileId) {
    localStorage.setItem('activeProfile', JSON.stringify(updatedProfile));
  }

  if (typeof upsertProfile === 'function') {
    try {
      await upsertProfile(updatedProfile);
      console.log('✅ Profile synced to cloud');
    } catch (e) {
      console.warn('Cloud sync failed, but local is fine:', e);
    }
  }

  window.dispatchEvent(new Event('profileSyncUpdate'));

  document.getElementById('saveStatus').style.display = 'block';
  setTimeout(() => {
    window.location.href = 'profile.html';
  }, 800);
}

function cancelEdit() {
  window.location.href = 'profile.html';
}
</script>

</body>
</html>
