<body>

<h2 class="center">👤 Profile</h2>

<div class="card">

<input id="name" placeholder="Name">
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">
<input id="job" placeholder="Job">
<input id="goal" placeholder="Goal weight">

<button onclick="save()">Save</button>

<p id="bmi"></p>

</div>

<script>

function calcBMI(h,w){
return (w/((h/100)**2)).toFixed(1)
}

async function save(){

let h=+height.value
let w=+weight.value

let bmi=calcBMI(h,w)

document.getElementById("bmi").innerText="BMI:"+bmi

let profile={
name:name.value,
gender:gender.value,
height:h,
weight:w,
bmi,
job:job.value,
goal:goal.value
}

localStorage.setItem("profile",JSON.stringify(profile))

if(typeof saveProfile==="function"){
await saveProfile(profile)
}

alert("Saved")
}

function load(){

let p = JSON.parse(localStorage.getItem("profile")||"null")
if(!p) return

name.value=p.name
gender.value=p.gender
height.value=p.height
weight.value=p.weight
job.value=p.job
goal.value=p.goal

document.getElementById("bmi").innerText="BMI:"+p.bmi
}

load()

</script>

</body>
</html>
