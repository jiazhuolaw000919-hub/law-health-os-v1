<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile v12 System (Phase 1–4 AI READY)</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="supabase.js"></script>
<script src="js/db.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}
button{margin:4px}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">👤 Profile System v12 (AI READY PHASE 1–4)</h2>

<!-- CREATE / UPDATE -->
<div class="card">
<h3>➕ Create / Update Profile</h3>

<input id="name" placeholder="Name">
<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">
<input id="goal" placeholder="Goal (cut / bulk / maintain)">

<br><br>

<button onclick="createOrUpdateProfile()">Save Profile</button>
</div>

<!-- ACTIVE PROFILE -->
<div class="card">
<h3>🔥 Active Profile</h3>
<p id="activeProfile">Loading...</p>
<p id="aiProfile"></p>
</div>

<!-- HISTORY -->
<div class="card">
<h3>📊 Weight History (AI Memory)</h3>
<div id="history"></div>
</div>

<!-- ALL PROFILES -->
<div class="card">
<h3>👥 All Profiles</h3>
<div id="profileList"></div>
</div>

<script>

/* ================= STORAGE ================= */
function getProfiles(){
return JSON.parse(localStorage.getItem("profiles")) || []
}

function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
height:170,
weight:70,
goal:"maintain",
weightHistory:[]
}
}

/* ================= SAFE NUMBER ================= */
function num(v){
return isNaN(v) ? 0 : Number(v)
}

/* ================= BMI ================= */
function calcBMI(h,w){
h = num(h || 170)
w = num(w || 70)
return (w / ((h/100)*(h/100))).toFixed(1)
}

/* ================= AI CLASSIFICATION (PHASE 4) ================= */
function classifyHealth(bmi){

if(bmi < 18.5) return {state:"UNDER", color:"yellow"}
if(bmi < 25) return {state:"NORMAL", color:"green"}
if(bmi < 30) return {state:"OVER", color:"orange"}
return {state:"OBESE", color:"red"}
}

/* ================= WEIGHT HISTORY ================= */
function updateHistory(profile){

let history = profile.weightHistory || []

history.push({
date: new Date().toISOString().split("T")[0],
weight: num(profile.weight)
})

profile.weightHistory = history.slice(-30)

return profile
}

/* ================= SAVE ================= */
function saveProfile(profile){

let list = getProfiles()

let idx = list.findIndex(p => p.id === profile.id)

if(idx >= 0){
list[idx] = profile
}else{
list.push(profile)
}

localStorage.setItem("profiles", JSON.stringify(list))
localStorage.setItem("activeProfile", JSON.stringify(profile))

window.dispatchEvent(new Event("profileUpdated"))
}

/* ================= CREATE / UPDATE ================= */
function createOrUpdateProfile(){

let name = document.getElementById("name").value.trim()
let height = num(document.getElementById("height").value)
let weight = num(document.getElementById("weight").value)
let goal = document.getElementById("goal").value.trim()

if(!name){
alert("Name required")
return
}

let p = getActiveProfile()

if(p.id === "guest"){
p.id = Date.now().toString()
}

p.name = name
p.height = height || 170
p.weight = weight || 70
p.goal = goal || "maintain"

p.bmi = calcBMI(p.height, p.weight)
p.updatedAt = new Date().toISOString()

if(!p.createdAt){
p.createdAt = p.updatedAt
}

p = updateHistory(p)

saveProfile(p)

render()
}

/* ================= SWITCH ================= */
function switchProfile(id){

let p = getProfiles().find(x => x.id === id)

if(p){
localStorage.setItem("activeProfile", JSON.stringify(p))
render()
}
}

/* ================= DELETE SAFE ================= */
function deleteProfile(id){

if(id === "guest") return

let list = getProfiles().filter(p => p.id !== id)

localStorage.setItem("profiles", JSON.stringify(list))

let active = getActiveProfile()

if(active.id === id){

let fallback = list[0] || {
id:"guest",
name:"Guest",
height:170,
weight:70,
goal:"maintain",
weightHistory:[]
}

localStorage.setItem("activeProfile", JSON.stringify(fallback))
}

render()
}

/* ================= AI PROFILE ENGINE (PHASE 4 CORE) ================= */
function generateAIProfile(p){

let bmi = calcBMI(p.height, p.weight)
let health = classifyHealth(bmi)

let trend = "stable"

if(p.weightHistory?.length > 3){
let last = p.weightHistory.slice(-3)
let diff = last[2].weight - last[0].weight
trend = diff > 1 ? "gaining"
: diff < -1 ? "losing"
: "stable"
}

return {
bmi,
state: health.state,
trend,
goal: p.goal
}
}

/* ================= RENDER HISTORY ================= */
function renderHistory(){

let p = getActiveProfile()
let box = document.getElementById("history")

if(!p.weightHistory?.length){
box.innerHTML = "<p>No history</p>"
return
}

box.innerHTML = p.weightHistory.map(h =>
`📅 ${h.date} — ${h.weight} kg`
).join("<br>")
}

/* ================= RENDER ================= */
function render(){

let p = getActiveProfile()

let bmi = calcBMI(p.height, p.weight)
let health = classifyHealth(bmi)
let ai = generateAIProfile(p)

document.getElementById("activeProfile").innerHTML =
`👤 <b>${p.name}</b><br>
Height: ${p.height} cm<br>
Weight: ${p.weight} kg<br>
BMI: ${bmi}<br>
Status: <b>${health.state}</b><br>
Goal: ${p.goal}`

document.getElementById("aiProfile").innerHTML =
`🧠 AI Insight: ${ai.trend} trend detected`

let list = document.getElementById("profileList")
list.innerHTML = ""

getProfiles().forEach(x=>{

let bmiVal = calcBMI(x.height, x.weight)

let div = document.createElement("div")
div.className="card"

div.innerHTML = `
<b>${x.name}</b><br>
BMI: ${bmiVal}<br>
Goal: ${x.goal || "none"}<br><br>

<button onclick="switchProfile('${x.id}')">Switch</button>
<button onclick="deleteProfile('${x.id}')" style="background:red;color:white">
Delete
</button>
`

list.appendChild(div)
})

renderHistory()
}

/* ================= INIT ================= */
render()

window.addEventListener("profileUpdated", render)

</script>

</body>
</html>
