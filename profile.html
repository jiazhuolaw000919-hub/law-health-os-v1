<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile v5</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="nav">
<a href="dashboard.html">Dashboard</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">👤 Profile v5</h2>

<div class="card">

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">
<input id="goal" placeholder="Goal weight">

<select id="activity">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button onclick="save()">Save</button>

<p id="bmi"></p>

</div>

<script>

function calcBMI(w,h){
return w / ((h/100)**2)
}

function save(){

let p = {
name:name.value,
age:age.value,
gender:gender.value,
height:+height.value,
weight:+weight.value,
goal:+goal.value,
activity:activity.value,
bmi:calcBMI(weight.value,height.value).toFixed(1)
}

localStorage.setItem("profile",JSON.stringify(p))

document.getElementById("bmi").innerText =
"BMI: " + p.bmi

alert("Saved")
}

function load(){

let p = JSON.parse(localStorage.getItem("profile")||"{}")

name.value = p.name||""
age.value = p.age||""
gender.value = p.gender||"Male"
height.value = p.height||""
weight.value = p.weight||""
goal.value = p.goal||""
activity.value = p.activity||"Low"

if(p.bmi){
document.getElementById("bmi").innerText = "BMI: " + p.bmi
}
}

load()

</script>

</body>
</html>
