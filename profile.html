<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile Lite v12.1 (Stable Upgrade)</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="supabase.js"></script>
<script src="js/db.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

button{
margin:4px;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.small{
font-size:13px;
opacity:0.75;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.badge{
display:inline-block;
padding:4px 8px;
border-radius:6px;
font-size:12px;
margin-top:5px;
}

.green{background:#dcfce7;color:#166534}
.yellow{background:#fef9c3;color:#854d0e}
.red{background:#fee2e2;color:#991b1b}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">👤 Profile Lite (Stable v12.1)</h2>

<!-- ACTIVE PROFILE -->
<div class="card">
<h3>🔥 Active Profile</h3>

<p id="name">Loading...</p>
<p id="heightWeight">--</p>
<p id="bmi">--</p>
<p id="bmiStatus"></p>

<div class="row">
<button onclick="goDetail()">View Full Profile →</button>
<button onclick="deleteProfile()" style="background:red;color:white">
Delete Profile
</button>
</div>

<p class="small">Lite mode: fast access only</p>
</div>

<!-- SWITCH -->
<div class="card">
<h3>👥 Profiles</h3>
<div id="list"></div>
</div>

<script>

/* ================= SAFE PROFILE ================= */
function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
height:170,
weight:70
}
}

function getProfiles(){
return JSON.parse(localStorage.getItem("profiles")) || []
}

/* ================= SAFE NUM ================= */
function num(v){
return isNaN(v) ? 0 : Number(v)
}

/* ================= BMI ================= */
function calcBMI(h,w){
h = num(h || 170)
w = num(w || 70)
return (w / ((h/100)*(h/100))).toFixed(1)
}

/* ================= BMI STATUS ================= */
function bmiStatus(bmi){

bmi = Number(bmi)

if(bmi < 18.5){
return {text:"Underweight", color:"yellow"}
}
if(bmi < 25){
return {text:"Normal", color:"green"}
}
if(bmi < 30){
return {text:"Overweight", color:"yellow"}
}
return {text:"Obese", color:"red"}
}

/* ================= SAVE ================= */
function saveProfiles(list){
localStorage.setItem("profiles", JSON.stringify(list))
}

/* ================= DELETE SAFE ================= */
function deleteProfile(){

let p = getActiveProfile()
if(p.id === "guest") return

let list = getProfiles().filter(x => x.id !== p.id)

saveProfiles(list)

let fallback = list[0] || {
id:"guest",
name:"Guest",
height:170,
weight:70
}

localStorage.setItem("activeProfile", JSON.stringify(fallback))

render()
}

/* ================= SWITCH ================= */
function switchProfile(id){

let p = getProfiles().find(x => x.id === id)
if(!p) return

localStorage.setItem("activeProfile", JSON.stringify(p))
render()
}

/* ================= DETAIL PAGE ================= */
function goDetail(){

let p = getActiveProfile()

// optional future AI usage
location.href = `profile-detail.html?id=${p.id}`
}

/* ================= RENDER ================= */
function render(){

let p = getActiveProfile()

let bmi = calcBMI(p.height, p.weight)
let status = bmiStatus(bmi)

document.getElementById("name").innerText =
`👤 ${p.name}`

document.getElementById("heightWeight").innerText =
`Height: ${p.height} cm | Weight: ${p.weight} kg`

document.getElementById("bmi").innerText =
`BMI: ${bmi}`

document.getElementById("bmiStatus").innerHTML =
`<span class="badge ${status.color}">
${status.text}
</span>`

let list = document.getElementById("list")
list.innerHTML = ""

getProfiles().forEach(x=>{

let bmiVal = calcBMI(x.height, x.weight)
let status = bmiStatus(bmiVal)

let div = document.createElement("div")
div.className = "card"

div.innerHTML = `
<b>${x.name}</b><br>
BMI: ${bmiVal} 
<span class="badge ${status.color}">
${status.text}
</span>
<br><br>

<button onclick="switchProfile('${x.id}')">Switch</button>
<button onclick="deleteProfile()" style="background:red;color:white">
Delete
</button>
`

list.appendChild(div)
})
}

/* ================= INIT ================= */
render()

</script>

</body>
</html>
