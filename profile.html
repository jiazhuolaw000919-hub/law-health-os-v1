<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile v8.2</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="supabase.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="profile.html">Profile</a>
</div>

<h2 style="text-align:center">🧬 Profile System v8.2</h2>

<div class="card">

<h3>Create / Switch Profile</h3>

<input id="name" placeholder="Name">
<input id="gender" placeholder="Gender">
<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">
<input id="goal" placeholder="Goal (cut / bulk / maintain)">

<br><br>

<button onclick="saveProfile()">Save Profile</button>
<button onclick="switchProfile()">Switch Profile</button>

</div>

<div class="card">
<h3>Active Profile</h3>
<p id="activeProfile">Loading...</p>
</div>

<button onclick="location.href='index.html'">
🏠 Back to Home
</button>

<script>

// =====================
// MULTI PROFILE STORAGE
// =====================
function getProfiles(){
return JSON.parse(localStorage.getItem("profiles") || "[]")
}

function saveProfiles(list){
localStorage.setItem("profiles", JSON.stringify(list))
}

function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile"))
}

// =====================
// SAVE PROFILE
// =====================
function saveProfile(){

let profile = {
id: "user_" + Date.now(),
name: document.getElementById("name").value,
gender: document.getElementById("gender").value,
height: Number(document.getElementById("height").value),
weight: Number(document.getElementById("weight").value),
goal: document.getElementById("goal").value
}

let profiles = getProfiles()
profiles.push(profile)

saveProfiles(profiles)
localStorage.setItem("activeProfile", JSON.stringify(profile))

render()

}

// =====================
// SWITCH PROFILE
// =====================
function switchProfile(){

let profiles = getProfiles()

if(profiles.length === 0){
alert("No profiles")
return
}

let next = profiles[Math.floor(Math.random()*profiles.length)]

localStorage.setItem("activeProfile", JSON.stringify(next))

render()

}

// =====================
// UI
// =====================
function render(){

let p = getActiveProfile()

document.getElementById("activeProfile").innerText =
p ? `${p.name} | ${p.gender} | ${p.height}cm | ${p.weight}kg | ${p.goal}` : "No active profile"

}

render()

</script>

</body>
</html>
