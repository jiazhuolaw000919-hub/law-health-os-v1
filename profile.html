<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Profile v10.5 Full Sync</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>

<script src="js/db.js"></script>

<script src="js/profile.js"></script>

<script src="js/ai-engine.js"></script>

</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 style="text-align:center">
👤 Profile v10.5 Full Sync
</h2>

<div class="card">
<h3>Current Active Profile</h3>
<p id="activeProfile">
No Profile
</p>
</div>

<div class="card">
<h3>Switch Profile</h3>

<select id="profileSelect">
</select>

<br><br>

<button onclick="switchProfile()">
Switch Profile
</button>

</div>

<div class="card">

<h3>Create New Profile</h3>

<input id="name" placeholder="Name">

<br><br>

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<br><br>

<input id="age"
type="number"
placeholder="Age">

<br><br>

<input id="height"
type="number"
placeholder="Height (cm)">

<br><br>

<input id="weight"
type="number"
placeholder="Weight (kg)">

<br><br>

<input id="goalWeight"
type="number"
placeholder="Goal Weight (kg)">

<br><br>

<button onclick="saveProfileData()">
Save Profile
</button>

</div>

<div class="card">
<h3>BMI Analysis</h3>
<p id="bmiBox">-</p>
</div>

<div class="card">
<h3>AI Recommendation</h3>
<p id="aiAdvice">-</p>
</div>

<div class="card">
<button onclick="location.href='index.html'">
🏠 Return Dashboard
</button>
</div>

<script>

function getProfiles(){
return JSON.parse(
localStorage.getItem("profiles")
) || []
}

function getActiveProfile(){
return JSON.parse(
localStorage.getItem("activeProfile")
) || null
}

function setActiveProfile(profile){
localStorage.setItem(
"activeProfile",
JSON.stringify(profile)
)
}

function calculateBMI(height, weight){

height = Number(height) / 100

if(!height || !weight){
return 0
}

return (
weight / (height * height)
).toFixed(1)

}

function getBMITag(bmi){

bmi = Number(bmi)

if(bmi < 18.5)
return "Underweight"

if(bmi < 25)
return "Healthy"

if(bmi < 30)
return "Overweight"

return "Obese"

}

function renderDropdown(){

const select =
document.getElementById(
"profileSelect"
)

select.innerHTML = ""

getProfiles().forEach(profile=>{

const opt =
document.createElement("option")

opt.value = profile.id
opt.textContent = profile.name

select.appendChild(opt)

})

const active =
getActiveProfile()

if(active){

select.value = active.id

}

}

function updateAdvice(profile){

if(!profile){
return
}

const bmi =
Number(profile.bmi)

let advice = ""

if(bmi < 18.5){

advice =
"Increase calories and protein."

}
else if(bmi < 25){

advice =
"Maintain current lifestyle."

}
else if(bmi < 30){

advice =
"Reduce calories and add exercise."

}
else{

advice =
"Focus on weight reduction."

}

document.getElementById(
"aiAdvice"
).innerText =
advice

}

function renderProfile(){

const profile =
getActiveProfile()

if(!profile){

document.getElementById(
"activeProfile"
).innerText =
"No Active Profile"

return

}

document.getElementById(
"activeProfile"
).innerHTML =

`
👤 ${profile.name}<br>
Gender: ${profile.gender}<br>
Age: ${profile.age}<br>
Height: ${profile.height} cm<br>
Weight: ${profile.weight} kg<br>
Goal Weight: ${profile.goalWeight || "-"} kg
`

document.getElementById(
"bmiBox"
).innerHTML =

`
BMI: ${profile.bmi}<br>
${getBMITag(profile.bmi)}
`

updateAdvice(profile)

}

function saveProfileData(){

const profile = {

id: Date.now().toString(),

name:
document.getElementById("name").value,

gender:
document.getElementById("gender").value,

age:
document.getElementById("age").value,

height:
document.getElementById("height").value,

weight:
document.getElementById("weight").value,

goalWeight:
document.getElementById("goalWeight").value

}

profile.bmi =
calculateBMI(
profile.height,
profile.weight
)

let profiles =
getProfiles()

profiles.push(profile)

localStorage.setItem(
"profiles",
JSON.stringify(profiles)
)

setActiveProfile(profile)

renderDropdown()
renderProfile()

alert("Profile Saved")

}

function switchProfile(){

const id =
document.getElementById(
"profileSelect"
).value

const profile =
getProfiles().find(
p => p.id === id
)

if(profile){

setActiveProfile(profile)

renderProfile()

}

}

renderDropdown()
renderProfile()

</script>

</body>
</html>
</html>
