<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile v10.6</title>

<link rel="stylesheet" href="style.css">
<script src="app.js"></script>
<script src="profile.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">👤 Profiles v10.6</h2>

<div class="card">

<!-- CREATE BUTTON -->
<button onclick="location.href='profile-create.html'">
➕ Create New Profile
</button>

</div>

<div class="card">
<h3>All Profiles</h3>
<div id="list"></div>
</div>

<script>

function render(){

  let list = document.getElementById("list")
  let profiles = getProfiles()
  let active = getActiveProfile()

  list.innerHTML = ""

  profiles.forEach(p => {

    let div = document.createElement("div")

    div.innerHTML = `
      <p>
      👤 ${p.name}
      ${active && active.id === p.id ? " (Active)" : ""}
      </p>

      <button onclick="switchProfile('${p.id}')">Switch</button>
      <button onclick="deleteProfile('${p.id}')" style="background:red;color:white">Delete</button>
      <hr>
    `

    list.appendChild(div)
  })
}

render()

</script>

</body>
</html>
