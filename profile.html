<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile v10.7 System</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="profile.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">👤 Profile System v10.7</h2>

<!-- CREATE -->
<div class="card">

<h3>Create Profile</h3>

<input id="name" placeholder="Name">
<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">

<br><br>

<button onclick="createNewProfile()">➕ Create Profile</button>

<br><br>

<button onclick="goCreatePage()">📄 Full Create Page</button>

</div>

<!-- ACTIVE -->
<div class="card">
<h3>Active Profile</h3>
<p id="activeProfile">Loading...</p>
</div>

<!-- LIST -->
<div class="card">
<h3>All Profiles</h3>
<div id="profileList"></div>
</div>

<script>

// ================= SAFE CORE =================
function getProfiles(){
return JSON.parse(localStorage.getItem("profiles")) || []
}

function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
height:170,
weight:70
}
}

// ================= BMI =================
function calcBMI(h,w){
h = Number(h || 170)
w = Number(w || 70)
return (w / ((h/100)*(h/100))).toFixed(1)
}

// ================= CREATE PROFILE (v10.7 FIXED) =================
function createNewProfile(){

const name = document.getElementById("name").value.trim()
const height = document.getElementById("height").value
const weight = document.getElementById("weight").value

if(!name){
alert("Enter name")
return
}

let profiles = getProfiles()

const bmi = calcBMI(height, weight)

const newProfile = {
id: Date.now().toString(),
name:name,
height:Number(height || 170),
weight:Number(weight || 70),
bmi:Number(bmi)
}

profiles.push(newProfile)

localStorage.setItem("profiles", JSON.stringify(profiles))
localStorage.setItem("activeProfile", JSON.stringify(newProfile))

render()
}

// ================= SWITCH =================
function switchProfile(id){

const profile = getProfiles().find(p=>p.id===id)

if(profile){
localStorage.setItem("activeProfile", JSON.stringify(profile))
render()
}
}

// ================= DELETE (SAFE FIX) =================
function deleteProfile(id){

let profiles = getProfiles().filter(p => p.id !== id)

localStorage.setItem("profiles", JSON.stringify(profiles))

let active = getActiveProfile()

if(!profiles.length){
const fallback = {
id:"guest",
name:"Guest",
height:170,
weight:70,
bmi: calcBMI(170,70)
}
localStorage.setItem("activeProfile", JSON.stringify(fallback))
}else if(active.id === id){
localStorage.setItem("activeProfile", JSON.stringify(profiles[0]))
}

render()
}

// ================= NAV =================
function goCreatePage(){
window.location.href = "create-profile.html"
}

// ================= RENDER =================
function render(){

const active = getActiveProfile()

document.getElementById("activeProfile").innerText =
`👤 ${active.name} | BMI: ${active.bmi || calcBMI(active.height, active.weight)}`

const list = document.getElementById("profileList")
list.innerHTML = ""

getProfiles().forEach(p=>{

const div = document.createElement("div")
div.className = "card"

div.innerHTML = `
<b>${p.name}</b>
<br>
BMI: ${p.bmi || calcBMI(p.height,p.weight)}

<br><br>

<button onclick="switchProfile('${p.id}')">Switch</button>
<button onclick="deleteProfile('${p.id}')" style="background:red;color:white">
Delete
</button>
`

list.appendChild(div)
})
}

// ================= INIT =================
render()

</script>

</body>
</html>
