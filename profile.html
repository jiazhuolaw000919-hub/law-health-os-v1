<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile v9</title>

<link rel="stylesheet" href="style.css">
<script src="app.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
</div>

<h2 class="center">👤 Profile System v9</h2>

<div class="card">

<input id="name" placeholder="Name">
<br><br>

<select id="gender">
  <option>Male</option>
  <option>Female</option>
</select>

<input id="age" placeholder="Age" type="number">
<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">

<br><br>

<button onclick="save()">Save Profile</button>

</div>

<div class="card">
<h3>📊 Current Profile</h3>
<div id="profileBox">Loading...</div>
</div>

<script>

function save(){

let profile = {
  id: Date.now().toString(),
  name: document.getElementById("name").value,
  gender: document.getElementById("gender").value,
  age: document.getElementById("age").value,
  height: document.getElementById("height").value,
  weight: document.getElementById("weight").value
}

profile.bmi = calculateBMI(profile.height, profile.weight)

saveProfile(profile)

load()
}

function load(){

let p = getProfile()

if(!p){
document.getElementById("profileBox").innerText = "No profile"
return
}

document.getElementById("profileBox").innerHTML =
`
<p>Name: ${p.name}</p>
<p>Gender: ${p.gender}</p>
<p>Age: ${p.age}</p>
<p>Height: ${p.height}</p>
<p>Weight: ${p.weight}</p>
<p>BMI: ${p.bmi}</p>
`
}

load()

</script>

</body>
</html>
