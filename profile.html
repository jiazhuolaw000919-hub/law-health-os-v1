<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile v10.9 System</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="supabase.js"></script>
<script src="js/db.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">👤 Profile System v10.9 (Cloud Ready)</h2>

<!-- CREATE -->
<div class="card">
<h3>Create / Update Profile</h3>

<input id="name" placeholder="Name">
<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">

<br><br>

<button onclick="createOrUpdateProfile()">➕ Save Profile</button>
</div>

<!-- ACTIVE -->
<div class="card">
<h3>Active Profile</h3>
<p id="activeProfile">Loading...</p>
</div>

<!-- HISTORY -->
<div class="card">
<h3>Weight History (Last 30 days)</h3>
<div id="history"></div>
</div>

<!-- ALL -->
<div class="card">
<h3>All Profiles</h3>
<div id="profileList"></div>
</div>

<script>

/* ================= SAFE STORAGE ================= */
function getProfiles(){
return JSON.parse(localStorage.getItem("profiles")) || []
}

function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
height:170,
weight:70,
weightHistory:[]
}
}

/* ================= BMI ENGINE ================= */
function calcBMI(h,w){
h = Number(h || 170)
w = Number(w || 70)
return (w / ((h/100)*(h/100))).toFixed(1)
}

/* ================= WEIGHT TRACKER (FIXED v10.9) ================= */
function updateWeightHistory(profile){

let history = profile.weightHistory || []

history.push({
date: new Date().toISOString().split("T")[0],
weight: Number(profile.weight || 70)
})

// keep last 30 entries only
profile.weightHistory = history.slice(-30)

return profile
}

/* ================= CORE SAVE ================= */
function saveProfileToLocal(profile){

let profiles = getProfiles()

let index = profiles.findIndex(p => p.id === profile.id)

if(index >= 0){
profiles[index] = profile
}else{
profiles.push(profile)
}

localStorage.setItem("profiles", JSON.stringify(profiles))
localStorage.setItem("activeProfile", JSON.stringify(profile))
}

/* ================= CREATE OR UPDATE ================= */
function createOrUpdateProfile(){

const name = document.getElementById("name").value.trim()
const height = Number(document.getElementById("height").value)
const weight = Number(document.getElementById("weight").value)

if(!name){
alert("Name required")
return
}

let profile = getActiveProfile()

// create new profile if guest
if(profile.id === "guest"){
profile.id = Date.now().toString()
}

profile.name = name
profile.height = height || 170
profile.weight = weight || 70

// BMI auto update
profile.bmi = calcBMI(profile.height, profile.weight)

// 🔥 critical: append weight history
profile = updateWeightHistory(profile)

saveProfileToLocal(profile)

render()
}

/* ================= SWITCH PROFILE ================= */
function switchProfile(id){

let profiles = getProfiles()
let profile = profiles.find(p => p.id === id)

if(profile){
localStorage.setItem("activeProfile", JSON.stringify(profile))
render()
}
}

/* ================= DELETE PROFILE ================= */
function deleteProfile(id){

let profiles = getProfiles().filter(p => p.id !== id)

localStorage.setItem("profiles", JSON.stringify(profiles))

if(profiles.length === 0){

let fallback = {
id:"guest",
name:"Guest",
height:170,
weight:70,
bmi:calcBMI(170,70),
weightHistory:[]
}

localStorage.setItem("activeProfile", JSON.stringify(fallback))

}else{
localStorage.setItem("activeProfile", JSON.stringify(profiles[0]))
}

render()
}

/* ================= HISTORY RENDER ================= */
function renderHistory(){

let active = getActiveProfile()
let box = document.getElementById("history")

if(!active.weightHistory || active.weightHistory.length === 0){
box.innerHTML = "<p>No history</p>"
return
}

box.innerHTML = active.weightHistory.map(h=>{
return `<p>📅 ${h.date} — ${h.weight} kg</p>`
}).join("")
}

/* ================= MAIN RENDER ================= */
function render(){

let active = getActiveProfile()

let bmi = calcBMI(active.height, active.weight)

document.getElementById("activeProfile").innerHTML =
`👤 <b>${active.name}</b><br>
Height: ${active.height} cm<br>
Weight: ${active.weight} kg<br>
BMI: ${bmi}`

let list = document.getElementById("profileList")
list.innerHTML = ""

getProfiles().forEach(p=>{

let bmiVal = calcBMI(p.height, p.weight)

let div = document.createElement("div")
div.className = "card"

div.innerHTML = `
<b>${p.name}</b><br>
Height: ${p.height} cm<br>
Weight: ${p.weight} kg<br>
BMI: ${bmiVal}
<br><br>

<button onclick="switchProfile('${p.id}')">Switch</button>
<button onclick="deleteProfile('${p.id}')" style="background:red;color:white">
Delete
</button>
`

list.appendChild(div)
})

renderHistory()
}

/* ================= INIT ================= */
render()

</script>

</body>
</html>
