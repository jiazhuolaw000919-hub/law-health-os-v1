<h2 style="text-align:center">🏋️ Workout</h2>

<div class="card">

<input id="workout" placeholder="e.g. running 30min" style="padding:10px;width:90%"><br><br>

<button onclick="logWorkout()"
style="padding:10px 15px;background:#111827;color:white;border:none;border-radius:10px">
Add Workout
</button>

</div>

<div class="card" id="wlog"></div>

<script>

setActive("workout")

function logWorkout(){

const w = document.getElementById("workout").value
if(!w) return

document.getElementById("wlog").innerHTML +=
`<p>🏃 ${w} - ~200 kcal</p>`

document.getElementById("workout").value = ""
}

</script>
