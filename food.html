<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v10.9 System (Step 1 Upgrade)</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 style="text-align:center">🍽 Food AI v10.9 (STEP 1 STABLE)</h2>

<!-- ACTIVE PROFILE -->
<div class="card">
<p id="activeProfile">Loading profile...</p>
</div>

<!-- PROFILE SWITCHER -->
<div class="card">
<select id="profileSwitcher" onchange="switchProfileUI()"></select>

<br><br>

<button onclick="goCreateProfile()">➕ Create Profile</button>

<button onclick="deleteActiveProfile()" style="background:red;color:white">
🗑 Delete Active Profile
</button>
</div>

<!-- FOOD INPUT -->
<div class="card">
<input id="foodInput" placeholder="e.g. chicken rice">
<br><br>

<button onclick="addFoodManual()">Add Food</button>

<div id="log"></div>
</div>

<!-- AI SCANNER -->
<div class="card">
<h3>📸 AI Scanner v10.9</h3>

<input type="file" id="foodImage">
<br><br>

<button onclick="scanFood()" id="scanBtn">Analyze Image</button>

<p id="aiResult">Waiting...</p>

<!-- CONFIRM BOX -->
<div id="confirmBox" style="display:none; margin-top:10px;">
  <button onclick="confirmSaveFood()">✅ Confirm Save</button>
  <button onclick="cancelSaveFood()" style="background:red;color:white;">
    ❌ Cancel
  </button>
</div>

</div>

<script>

setActive?.("food")

/* ================= STATE (FIXED STEP 1) ================= */
let pendingFood = null
let scanLock = false
let lastAIResult = null

/* ================= PROFILE CORE ================= */

function getProfiles(){
return JSON.parse(localStorage.getItem("profiles")) || []
}

function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
learning:{
proteinUser:0,
carbUser:0,
junkUser:0,
totalFoods:0
}
}
}

/* ================= INIT ================= */

function ensureProfile(){

let profiles = getProfiles()

if(profiles.length === 0){
const defaultProfile = {
id:"guest",
name:"Guest",
learning:{
proteinUser:0,
carbUser:0,
junkUser:0,
totalFoods:0
}
}

profiles.push(defaultProfile)
localStorage.setItem("profiles", JSON.stringify(profiles))
localStorage.setItem("activeProfile", JSON.stringify(defaultProfile))
}

if(!getActiveProfile()){
localStorage.setItem("activeProfile", JSON.stringify(getProfiles()[0]))
}
}

/* ================= UI ================= */

function renderProfile(){
const p = getActiveProfile()
document.getElementById("activeProfile").innerText =
`👤 Active: ${p.name}`
}

function renderSwitcher(){

const select = document.getElementById("profileSwitcher")
if(!select) return

select.innerHTML = ""

getProfiles().forEach(p=>{
const opt = document.createElement("option")
opt.value = p.id
opt.innerText = p.name
select.appendChild(opt)
})

const active = getActiveProfile()
if(active) select.value = active.id
}

function switchProfileUI(){
const id = document.getElementById("profileSwitcher").value
const profile = getProfiles().find(p=>p.id===id)

if(profile){
localStorage.setItem("activeProfile", JSON.stringify(profile))
renderProfile()
}
}

function goCreateProfile(){
window.location.href = "profile.html?mode=create"
}

function deleteActiveProfile(){

let profiles = getProfiles()
let active = getActiveProfile()

profiles = profiles.filter(p => p.id !== active.id)

localStorage.setItem("profiles", JSON.stringify(profiles))

let newActive = profiles[0] || {
id:"guest",
name:"Guest",
learning:{
proteinUser:0,
carbUser:0,
junkUser:0,
totalFoods:0
}
}

localStorage.setItem("activeProfile", JSON.stringify(newActive))

renderProfile()
renderSwitcher()
}

/* ================= LEARNING ================= */

function updateLearning(profile, food){

if(!profile.learning){
profile.learning = {
proteinUser:0,
carbUser:0,
junkUser:0,
totalFoods:0
}
}

profile.learning.totalFoods++

if(food.protein > 25) profile.learning.proteinUser++
if(food.carbs > 80) profile.learning.carbUser++
if(food.calories > 800) profile.learning.junkUser++

localStorage.setItem("activeProfile", JSON.stringify(profile))
}

/* ================= FOOD ENGINE ================= */

function calculateMealScore(food){
let score = 50
if(food.protein > 20) score += 20
if(food.carbs > 80) score -= 10
if(food.fat > 30) score -= 15
if(food.calories > 800) score -= 20
return Math.max(0, Math.min(100, score))
}

function getHealthTag(score){
if(score >= 80) return "GOOD"
if(score >= 50) return "OK"
return "BAD"
}

/* ================= MANUAL FOOD ================= */

async function addFoodManual(){

const profile = getActiveProfile()
const food = document.getElementById("foodInput").value.trim()
if(!food) return

let cal = 300
if(food.includes("chicken")) cal = 600
if(food.includes("rice")) cal = 500
if(food.includes("milo")) cal = 180

const today = new Date().toISOString().split("T")[0]

document.getElementById("log").innerHTML +=
`<p>👤 ${profile.name} - 🍽 ${food} - ${cal} kcal</p>`

updateLearning(profile, {
calories: cal,
protein: 10,
carbs: 50
})

try{
if(typeof saveFood !== "undefined"){
await saveFood({
userId: profile.id,
food,
calories: cal,
date: today
})
}
}catch(e){
console.log("offline save fallback")
}
}

/* ================= AI SCAN (STEP 1 FIXED) ================= */

async function scanFood(){

if(scanLock) return
scanLock = true

const profile = getActiveProfile()
const file = document.getElementById("foodImage").files[0]

if(!file){
alert("Upload image")
scanLock = false
return
}

document.getElementById("scanBtn").innerText = "Analyzing..."
document.getElementById("aiResult").innerText = "Processing..."

const reader = new FileReader()

reader.onload = async function(){

try{

const base64 = reader.result

const res = await fetch("/api/ai", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
image: base64,
userId: profile.id
})
})

let data = await res.json()
let raw = data.result || {}

lastAIResult = {
food: raw.food || "unknown",
calories: raw.calories || 0,
protein: raw.protein || 0,
carbs: raw.carbs || 0,
fat: raw.fat || 0,
confidence: raw.confidence || 0.5
}

lastAIResult.score = calculateMealScore(lastAIResult)
lastAIResult.healthTag = getHealthTag(lastAIResult.score)

updateLearning(profile, lastAIResult)

/* NO SAVE YET */
pendingFood = {
...lastAIResult,
userId: profile.id,
date: new Date().toISOString().split("T")[0]
}

/* SHOW CONFIRM */
document.getElementById("confirmBox").style.display = "block"

document.getElementById("aiResult").innerHTML =
`👤 ${profile.name}<br>
🍽 ${lastAIResult.food}<br>
🔥 ${lastAIResult.calories} kcal<br>
💪 Protein: ${lastAIResult.protein}<br>
🍞 Carbs: ${lastAIResult.carbs}<br>
🥑 Fat: ${lastAIResult.fat}<br>
📊 Score: ${lastAIResult.score}/100<br>
🧠 ${lastAIResult.healthTag}`

}catch(e){
console.log(e)
document.getElementById("aiResult").innerText = "AI error fallback"
}

scanLock = false
document.getElementById("scanBtn").innerText = "Analyze Image"

}

reader.readAsDataURL(file)
}

/* ================= CONFIRM ================= */

async function confirmSaveFood(){

if(!pendingFood) return

document.getElementById("confirmBox").style.display = "none"

try{
if(typeof saveFood !== "undefined"){
await saveFood(pendingFood)
}

document.getElementById("log").innerHTML +=
`<p>✅ Saved: ${pendingFood.food} - ${pendingFood.calories} kcal</p>`

pendingFood = null

}catch(e){
console.log(e)
alert("Save failed")
}
}

/* ================= CANCEL ================= */

function cancelSaveFood(){

pendingFood = null
document.getElementById("confirmBox").style.display = "none"

document.getElementById("aiResult").innerText = "Cancelled"
}

ensureProfile()
renderProfile()
renderSwitcher()

</script>

</body>
</html>
