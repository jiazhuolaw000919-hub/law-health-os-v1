<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v11 PRO</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>

<style>
.card{margin:10px;padding:12px;background:#fff;border-radius:10px}
.food-item{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #eee;
}
.btn{
padding:5px 8px;
border:none;
border-radius:6px;
cursor:pointer;
}
.del{background:#ef4444;color:#fff}
.undo{background:#22c55e;color:#fff}
</style>

</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">🍽 Food AI v11 PRO</h2>

<!-- PROFILE -->
<div class="card">
<p id="activeProfile">Loading...</p>
</div>

<!-- INPUT -->
<div class="card">
<input id="foodInput" placeholder="e.g. chicken rice">
<button onclick="addFoodManual()">Add</button>

<br><br>

<input type="file" id="foodImage">
<button onclick="scanFood()">AI Scan</button>

<p id="aiResult"></p>

<div id="confirmBox" style="display:none;">
<button onclick="confirmSaveFood()">✅ Confirm Save</button>
<button onclick="cancelSaveFood()" style="background:red;color:white;">Cancel</button>
</div>

</div>

<!-- FOOD LIST -->
<div class="card">
<h3>Today Foods</h3>
<div id="foodList"></div>
</div>

<script>

setActive?.("food")

let pendingFood = null
let undoStack = null

function getProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {id:"guest",name:"Guest"}
}

/* ================= LOAD FOOD ================= */
async function loadFood(){

const profile = getProfile()
const today = new Date().toISOString().split("T")[0]

let logs = []

if(typeof getFoodLogs !== "undefined"){
logs = await getFoodLogs(today)
}

let box = document.getElementById("foodList")
box.innerHTML = ""

logs.forEach(f=>{

let div = document.createElement("div")
div.className = "food-item"

div.innerHTML = `
<div>
<b>${f.food}</b><br>
${f.calories} kcal
</div>

<div>
<button class="btn del" onclick="deleteFoodItem('${f.id}', this)">Delete</button>
</div>
`

box.appendChild(div)
})
}

/* ================= DELETE + UNDO ================= */
async function deleteFoodItem(id, btn){

if(!id) return

// backup for undo
undoStack = {id, element: btn.parentElement.parentElement}

btn.parentElement.parentElement.remove()

// call supabase delete
if(typeof deleteFood !== "undefined"){
await deleteFood(id)
}

// show undo UI
showUndo()
}

function showUndo(){

let undo = document.createElement("div")
undo.innerHTML = `
<button class="btn undo" onclick="undoDelete()">Undo Delete</button>
`
document.body.appendChild(undo)

setTimeout(()=>{
undo.remove()
undoStack = null
}, 10000)
}

async function undoDelete(){

if(!undoStack) return

// NOTE: real restore requires re-insert
if(typeof saveFood !== "undefined"){
alert("Undo requires re-scan or re-add (v11 limitation)")
}

undoStack = null
loadFood()
}

/* ================= MANUAL FOOD ================= */
async function addFoodManual(){

const profile = getProfile()
const food = document.getElementById("foodInput").value.trim()
if(!food) return

const today = new Date().toISOString().split("T")[0]

pendingFood = {
food,
calories: food.includes("rice")?500:300,
protein:10,
carbs:50,
fat:10,
date:today,
userId:profile.id
}

document.getElementById("aiResult").innerText =
"Ready to save. Please confirm."
document.getElementById("confirmBox").style.display = "block"
}

/* ================= AI SCAN ================= */
async function scanFood(){

const file = document.getElementById("foodImage").files[0]
if(!file) return alert("upload image")

document.getElementById("aiResult").innerText = "Analyzing..."

const reader = new FileReader()

reader.onload = async function(){

const res = await fetch("/api/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({image:reader.result})
})

let data = await res.json()
let r = data.result || {}

pendingFood = {
food:r.food,
calories:r.calories,
protein:r.protein,
carbs:r.carbs,
fat:r.fat,
date:new Date().toISOString().split("T")[0],
userId:getProfile().id
}

document.getElementById("aiResult").innerHTML =
`🍽 ${r.food} | ${r.calories} kcal`

document.getElementById("confirmBox").style.display = "block"
}

reader.readAsDataURL(file)
}

/* ================= CONFIRM SAVE ================= */
async function confirmSaveFood(){

if(!pendingFood) return

if(typeof saveFood !== "undefined"){
await saveFood(pendingFood)
}

document.getElementById("confirmBox").style.display = "none"
pendingFood = null

loadFood()
}

/* ================= CANCEL ================= */
function cancelSaveFood(){
pendingFood = null
document.getElementById("confirmBox").style.display = "none"
}

/* ================= INIT ================= */
loadFood()

</script>

</body>
</html>
