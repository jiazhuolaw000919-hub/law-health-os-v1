<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v16 PRO SYSTEM (FULL FIX + DELETE + AI FOOD TYPE)</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="ai-engine.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

.modal{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:12px;
width:340px;
text-align:center;
}

.preview-box{
background:#f9fafb;
padding:10px;
border-radius:8px;
margin-top:10px;
text-align:left;
font-size:14px;
}

button{
margin:5px;
padding:6px 10px;
border-radius:8px;
border:1px solid #ddd;
cursor:pointer;
}

.active{
background:#111;
color:#fff;
}

.small-tag{
display:inline-block;
margin:2px;
padding:2px 6px;
background:#e5e7eb;
border-radius:6px;
font-size:12px;
}

.delete-btn{
background:red;
color:white;
border:none;
padding:3px 6px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2>🍽 Food AI v16 FIXED (SAVE + DELETE + AI FOOD TYPE)</h2>

<div class="card">
<p id="activeProfile">Loading...</p>
</div>

<div class="card">
<h3>📊 Today</h3>
<p id="todayCalories">Calories: --</p>
<p id="deficitInfo">Deficit: --</p>
<p id="modeStatus">Mode: normal</p>
<p id="aiStatus">AI: idle</p>
</div>

<div class="card">
<h3>⚙️ Mode</h3>
<button onclick="setMode('normal')">Normal</button>
<button onclick="setMode('deficit')">Fat Loss</button>
<button onclick="setMode('bulk')">Bulk</button>
</div>

<div class="card">
<input id="foodInput" placeholder="e.g. chicken rice + milo">

<br><br>

<button onclick="startManualFlow()">Add Food</button>
<button onclick="openAIUpload()">AI Scan</button>
<button onclick="openBarcode()">Barcode Scan</button>
<button onclick="startMultiCapture()">Multi Capture</button>
</div>

<div class="card">
<h3>AI Result</h3>
<div id="foodList"></div>
</div>

<div id="mealModal" class="modal">
<div class="modal-content">

<h3>Select Meal</h3>

<div id="previewArea"></div>

<button onclick="saveMeal('Breakfast')">Breakfast</button>
<button onclick="saveMeal('Lunch')">Lunch</button>
<button onclick="saveMeal('Dinner')">Dinner</button>
<button onclick="saveMeal('Snack')">Snack</button>

</div>
</div>

<script>

/* ================= DB FIX ================= */
let foodDB = JSON.parse(localStorage.getItem("foodDB")) || []

let pendingFood = null
let mode = "normal"
let multiList = []

/* ================= PROFILE ================= */
document.getElementById("activeProfile").innerText =
JSON.parse(localStorage.getItem("activeProfile"))?.name || "Guest"

/* ================= AI STATUS ================= */
function setAI(status){
document.getElementById("aiStatus").innerText = "AI: " + status
}

/* ================= FOOD TYPE DETECTOR (IMPROVED) ================= */
function extractComponents(text){

let t = (text || "").toLowerCase()

let c = []

if(t.includes("rice")) c.push("rice")
if(t.includes("chicken") || t.includes("meat")) c.push("meat")
if(t.includes("egg")) c.push("egg")
if(t.includes("veg")) c.push("vegetables")
if(t.includes("fish")) c.push("fish")
if(t.includes("noodle")) c.push("noodles")
if(t.includes("coffee") || t.includes("kopi")) c.push("coffee")
if(t.includes("sandwich")) c.push("bread + filling")
if(t.includes("burger")) c.push("bun + meat")

/* 🔥 NEW FOOD TYPE DETECTION */
if(t.includes("rice") && t.includes("meat") && t.includes("veg")) c.push("mixed rice (cai fan)")
if(t.includes("coffee") || t.includes("latte")) c.push("coffee drink")
if(t.includes("sandwich")) c.push("sandwich meal")

if(c.length === 0) c = ["unknown meal"]

return c
}

/* ================= AI WRAPPER ================= */
async function analyzeImage(base64){

setAI("scanning...")

try{
if(window.analyzeFoodImage){

const r = await window.analyzeFoodImage(base64)

setAI("done")

return {
food: r?.food || "Unknown meal",
calories: Number(r?.calories ?? 450),
protein: Number(r?.protein ?? 18),
carbs: Number(r?.carbs ?? 55),
fat: Number(r?.fat ?? 12)
}
}
}catch(e){
console.log(e)
}

setAI("fallback")

return {
food:"Unknown meal",
calories:450,
protein:18,
carbs:55,
fat:12
}
}

/* ================= MODE ================= */
function setMode(m){
mode = m
document.getElementById("modeStatus").innerText = "Mode: " + m
}

/* ================= NUTRITION ================= */
function estimateNutrition(food){

let base = 400
food = (food || "").toLowerCase()

if(food.includes("chicken")) base += 120
if(food.includes("rice")) base += 120
if(food.includes("milo")) base += 150
if(food.includes("burger")) base += 300
if(food.includes("egg")) base += 80

return {
calories: base,
protein: Math.round(base*0.05),
carbs: Math.round(base*0.12),
fat: Math.round(base*0.04)
}
}

/* ================= DEFICIT ================= */
function getDeficit(cal){
let maintenance = 2200
let diff = cal - maintenance
return {
status: diff > 0 ? "surplus" : "deficit",
diff
}
}

/* ================= MANUAL ================= */
function startManualFlow(){

let input = document.getElementById("foodInput").value.trim()
if(!input) return alert("Enter food")

pendingFood = {
food: input,
date: new Date().toISOString().split("T")[0],
components: extractComponents(input),
...estimateNutrition(input)
}

showPreview(pendingFood)
openMealModal()
}

/* ================= AI UPLOAD ================= */
async function openAIUpload(){

let input = document.createElement("input")
input.type = "file"
input.accept = "image/*"

input.onchange = async ()=>{

let file = input.files[0]
if(!file) return

let reader = new FileReader()

reader.onload = async ()=>{

let base64 = reader.result

let result = await analyzeImage(base64)

pendingFood = {
food: result.food,
date: new Date().toISOString().split("T")[0],
components: extractComponents(result.food),
...result,
image: base64
}

showPreview(pendingFood)
openMealModal()
}

reader.readAsDataURL(file)
}

input.click()
}

/* ================= BARCODE ================= */
function openBarcode(){

let code = prompt("barcode/name")

pendingFood = {
food: code || "Unknown",
date: new Date().toISOString().split("T")[0],
components: extractComponents(code || ""),
calories: 300,
protein: 10,
carbs: 40,
fat: 10
}

showPreview(pendingFood)
openMealModal()
}

/* ================= SAVE (FIXED + SYNC) ================= */
function saveMeal(type){

if(!pendingFood) return

pendingFood.mealType = type

if(!pendingFood.date){
pendingFood.date = new Date().toISOString().split("T")[0]
}

/* save into DB */
foodDB.push(pendingFood)
localStorage.setItem("foodDB", JSON.stringify(foodDB))

if(window.saveFood){
window.saveFood(pendingFood)
}

pendingFood = null

closeMealModal()
updateToday()
renderFoodList()

alert("Saved!")
}

/* ================= DELETE FOOD (NEW FEATURE) ================= */
function deleteFood(index){

foodDB.splice(index,1)
localStorage.setItem("foodDB", JSON.stringify(foodDB))

renderFoodList()
updateToday()
}

/* ================= RENDER SAVED LIST ================= */
function renderFoodList(){

let today = new Date().toISOString().split("T")[0]

let list = foodDB
.filter(f => f.date === today)
.map((f,i)=>`
<div class="preview-box">
<b>${f.food}</b> (${f.calories} kcal)
<br>
${(f.components||[]).map(c=>`<span class="small-tag">${c}</span>`).join("")}
<br>
<button class="delete-btn" onclick="deleteFood(${i})">Delete</button>
</div>
`).join("")

document.getElementById("foodList").innerHTML =
list || "<p>No food saved today</p>"
}

/* ================= PREVIEW ================= */
function showPreview(d){

let adj = {...d}

if(mode==="deficit") adj.calories*=0.85
if(mode==="bulk") adj.calories*=1.15

document.getElementById("previewArea").innerHTML = `
<div class="preview-box">

<b>${adj.food}</b><br>

🔥 ${Math.round(adj.calories)} kcal<br>
🥩 P:${Math.round(adj.protein)}
🍚 C:${Math.round(adj.carbs)}
🥑 F:${Math.round(adj.fat)}<br><br>

<b>Components:</b><br>
${(adj.components||[]).map(c=>`<span class="small-tag">${c}</span>`).join("")}

</div>
`
}

/* ================= TODAY FIXED ================= */
function updateToday(){

let today = new Date().toISOString().split("T")[0]

let todayFoods = foodDB.filter(f => f.date === today)

let cal = todayFoods.reduce((a,b)=>a+(b.calories||0),0)

let def = getDeficit(cal)

document.getElementById("todayCalories").innerText =
"Calories: " + cal

document.getElementById("deficitInfo").innerText =
def.status + " (" + def.diff + ")"

renderFoodList()
}

/* ================= INIT ================= */
function loadDB(){
foodDB = JSON.parse(localStorage.getItem("foodDB")) || []
updateToday()
renderFoodList()
}

loadDB()

</script>

</body>
</html>
