<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v15 PRO SYSTEM</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="ai-engine.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

.hidden{display:none !important}

.modal{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:12px;
width:340px;
text-align:center;
}

.meal-btn{
margin:5px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:#f3f4f6;
cursor:pointer;
color:#000;
font-weight:500;
}

.preview-box{
background:#f9fafb;
padding:10px;
border-radius:8px;
margin-top:10px;
text-align:left;
font-size:14px;
}

.mode-btn{
margin:5px;
padding:6px 10px;
border-radius:8px;
border:1px solid #ddd;
cursor:pointer;
}

.active-mode{
background:#111;
color:#fff;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2>🍽 Food AI v15 (DEFICIT + BARCODE + MULTI-CAPTURE)</h2>

<div class="card">
<p id="activeProfile">Loading...</p>
</div>

<div class="card">
<h3>📊 Today</h3>
<p id="todayCalories">Calories: --</p>
<p id="deficitInfo">Deficit: --</p>
<p id="modeStatus">Mode: normal</p>
</div>

<div class="card">
<h3>⚙️ Mode</h3>
<button onclick="setMode('normal')">Normal</button>
<button onclick="setMode('deficit')">Fat Loss</button>
<button onclick="setMode('bulk')">Bulk</button>
</div>

<div class="card">
<input id="foodInput" placeholder="e.g. chicken rice + milo">

<br><br>

<button onclick="startManualFlow()">Add Food</button>
<button onclick="openAIUpload()">AI Scan</button>
<button onclick="openBarcode()">Barcode Scan</button>
<button onclick="startMultiCapture()">Multi Capture</button>
</div>

<div class="card">
<h3>AI Result</h3>
<div id="foodList"></div>
</div>

<div id="mealModal" class="modal">
<div class="modal-content">

<h3>Select Meal</h3>

<div id="previewArea"></div>

<button onclick="saveMeal('Breakfast')">Breakfast</button>
<button onclick="saveMeal('Lunch')">Lunch</button>
<button onclick="saveMeal('Dinner')">Dinner</button>
<button onclick="saveMeal('Snack')">Snack</button>

</div>
</div>

<script>

let pendingFood = null
let mode = "normal"
let multiList = []

/* ================= PROFILE ================= */
function getProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {name:"Guest"}
}

document.getElementById("activeProfile").innerText = getProfile().name

/* ================= BARCODE DB ================= */
const barcodeDB = {
"milo": {food:"Milo",calories:120,protein:3,carbs:22,fat:2},
"coke": {food:"Coca Cola",calories:140,protein:0,carbs:39,fat:0},
"maggie": {food:"Maggi Mee",calories:380,protein:8,carbs:52,fat:14},
"mcd": {food:"McDonalds Meal",calories:650,protein:25,carbs:80,fat:28}
}

/* ================= DETECT FOOD ================= */
function detectFoodType(t){
t=t.toLowerCase()
if(t.includes("rice")) return "Rice Meal"
if(t.includes("burger")) return "Fast Food"
return "Mixed Food"
}

/* ================= NUTRITION ENGINE ================= */
function estimateNutrition(food){

let base = 450

if(food.includes("chicken")) base+=100
if(food.includes("rice")) base+=120
if(food.includes("milo")) base+=150
if(food.includes("burger")) base+=300

return {
calories:base,
protein:Math.round(base*0.05),
carbs:Math.round(base*0.12),
fat:Math.round(base*0.04)
}
}

/* ================= DEFICIT ENGINE ================= */
function getDeficit(cal){

let maintenance = 2200
let diff = cal - maintenance

return {
maintenance,
diff,
status: diff>0?"surplus":"deficit"
}
}

/* ================= AI CORE ================= */
async function analyzeImage(base64){

if(window.analyzeFoodImage){
const r = await window.analyzeFoodImage(base64)

return {
food:r.food,
calories:r.calories,
protein:r.protein,
carbs:r.carbs,
fat:r.fat
}
}

return {food:"Unknown",calories:450,protein:20,carbs:50,fat:10}
}

/* ================= MANUAL ================= */
function startManualFlow(){

const input=document.getElementById("foodInput").value
if(!input) return

pendingFood = {
food:detectFoodType(input),
...estimateNutrition(input)
}

showPreview(pendingFood)
openMealModal()
}

/* ================= BARCODE ================= */
function openBarcode(){

let code = prompt("Enter barcode / name")

let item = barcodeDB[code?.toLowerCase()]

pendingFood = item || {
food:"Unknown item",
calories:300,
protein:10,
carbs:40,
fat:10
}

showPreview(pendingFood)
openMealModal()
}

/* ================= MULTI CAPTURE ================= */
function startMultiCapture(){

multiList = []

for(let i=0;i<3;i++){
multiList.push({
food:"Captured Meal "+(i+1),
calories:400,
protein:20,
carbs:50,
fat:12
})
}

renderMulti()
}

/* ================= MULTI RENDER ================= */
function renderMulti(){

document.getElementById("foodList").innerHTML =
multiList.map(m=>`
<div class="preview-box">
${m.food} - ${m.calories} kcal
</div>
`).join("")
}

/* ================= PREVIEW ================= */
function showPreview(d){

let adj = {...d}

if(mode==="deficit") adj.calories*=0.85
if(mode==="bulk") adj.calories*=1.15

document.getElementById("previewArea").innerHTML = `
<div class="preview-box">
${adj.food}<br>
${Math.round(adj.calories)} kcal
</div>
`
}

/* ================= SAVE ================= */
function saveMeal(type){

if(!pendingFood) return

pendingFood.mealType = type

if(mode==="deficit") pendingFood.calories*=0.85
if(mode==="bulk") pendingFood.calories*=1.15

if(window.saveFood) window.saveFood(pendingFood)

pendingFood=null

closeMealModal()

updateToday()
}

/* ================= MODAL ================= */
function openMealModal(){
document.getElementById("mealModal").style.display="flex"
}

function closeMealModal(){
document.getElementById("mealModal").style.display="none"
document.getElementById("previewArea").innerHTML=""
}

/* ================= TODAY ================= */
function updateToday(){

let cal = pendingFood?.calories || 0

let def = getDeficit(cal)

document.getElementById("todayCalories").innerText =
"Calories: " + cal

document.getElementById("deficitInfo").innerText =
"Daily: " + def.status + " (" + def.diff + " kcal)"

document.getElementById("modeStatus").innerText =
"Mode: " + mode
}

</script>

</body>
</html>
