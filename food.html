<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food AI v16.2 PRO (Quantity + Per Piece)</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>
<script src="food-db.js"></script>

<style>
/* 原有样式 + 新增数量输入 */
.modal{ ... } /* 保留原有 */
/* ... 其他样式不变 ... */

/* 新增 quantity 样式 */
.quantity-box {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 8px 0;
}
.quantity-box input {
  width: 60px;
  text-align: center;
}
</style>
</head>
<body>

<!-- 导航栏不变 -->

<div class="card">
<p id="activeProfile">Loading...</p>
</div>

<div class="card">
<h3>📊 Today</h3>
<p id="todayCalories">Calories: --</p>
<p id="deficitInfo">Deficit: --</p>
<p id="modeStatus">Mode: normal</p>
<p id="aiStatus">AI: idle</p>
</div>

<div class="card" style="position: relative;">
<input id="foodInput" placeholder="e.g. maggie kari, oreo">
<div id="suggestionsBox" class="suggestions-box"></div>
<br><br>
<button id="addFoodBtn" onclick="startManualFlow()">🔍 Add Food (Auto Lookup)</button>
<button onclick="openAIUpload()">AI Scan</button>
<button onclick="openBarcode()">Barcode Scan</button>
<button onclick="startMultiCapture()">Multi Capture</button>
<button onclick="openCustomEntry()">✍️ Custom Entry</button>
</div>

<div class="card">
<h3>📋 Saved List</h3>
<div id="foodList"></div>
</div>

<!-- Meal Modal -->
<div id="mealModal" class="modal">
<div class="modal-content">
<h3>🍽️ Confirm & Save</h3>
<div id="modalImagePreview" style="display:none;"></div>
<label>Food Name:</label>
<input type="text" id="modalFoodName" class="editable-field">
<div id="modalDishList" class="preview-box" style="display:none;"></div>
<div id="manualHint" class="hint" style="display:none;">⚠️ AI couldn't identify. Please type manually.</div>
<div id="modalNutritionPreview" class="preview-box"></div>

<!-- ✅ 数量 -->
<div class="quantity-box">
  <span>🍪 Quantity:</span>
  <input type="number" id="modalQuantity" class="editable-field" value="1" min="1" step="1" onchange="updateModalNutritionPreview()">
</div>

<button onclick="reEstimateFromName()">🔄 Re-estimate</button>
<br><br>
<div style="display:flex; flex-wrap:wrap; justify-content:center;">
<button onclick="saveMeal('Breakfast')">🌅 Breakfast</button>
<button onclick="saveMeal('Lunch')">🌞 Lunch</button>
<button onclick="saveMeal('Dinner')">🌙 Dinner</button>
<button onclick="saveMeal('Snack')">🍪 Snack</button>
</div>
<button onclick="closeMealModal()" style="margin-top:10px;">Cancel</button>
</div>
</div>

<!-- Custom Entry Modal 保持不变，但也可以在保存时支持数量，暂不修改 -->

<script>
/* ================= GLOBAL DB ================= */
let foodDB = JSON.parse(localStorage.getItem("foodDB")) || [];
let pendingFood = null;
let mode = "normal";
let multiList = [];
let customPhotoData = null;

// ... 保留 profile, AI status, detectFoodType, extractComponents, analyzeImage, setMode, estimateNutrition, lookupFoodAPI, getDeficit ... （完全不动）

// ================= MANUAL FLOW (WITH LOCAL DB + API) =================
async function startManualFlow(){
  let input = document.getElementById("foodInput").value.trim();
  if(!input) return alert("Enter food");
  const btn = document.getElementById("addFoodBtn"); if(btn) btn.disabled=true;

  const localMatch = searchLocalFood(input);
  if(localMatch){
    pendingFood = {
      id: Date.now(),
      food: localMatch.food || input,
      type: detectFoodType(input),
      date: new Date().toISOString().split("T")[0],
      components: extractComponents(input),
      calories: localMatch.calories,        // per piece 值
      protein: localMatch.protein,
      carbs: localMatch.carbs,
      fat: localMatch.fat,
      sugar: localMatch.sugar || 0,
      grade: localMatch.grade || "",
      quantity: 1,                           // 默认数量1
      dishes: []
    };
    if(btn) btn.disabled=false; openMealModal(); return;
  }
  // API 查找... （和之前一样，但也要设置 quantity:1）
  // ... 省略，保持原来逻辑，只需在构造 pendingFood 时加入 quantity:1
}

// AI Upload, Barcode 等也加入 quantity:1

// ================= OPEN MEAL MODAL (增加数量同步) =================
function openMealModal(){
  if(!pendingFood) return;
  document.getElementById("mealModal").style.display = "flex";
  // image preview...
  document.getElementById("modalFoodName").value = pendingFood.food;
  document.getElementById("modalQuantity").value = pendingFood.quantity || 1;
  // hints, dishes...
  updateModalNutritionPreview();
}

// ================= UPDATE NUTRITION PREVIEW (乘数量) =================
function updateModalNutritionPreview(){
  if(!pendingFood) return;
  let qty = parseInt(document.getElementById("modalQuantity").value) || 1;
  pendingFood.quantity = qty;   // 更新当前数量

  let adj = {...pendingFood};
  // 乘以数量计算总营养（calories, protein, carbs, fat, sugar 均乘以 qty）
  adj.calories = (pendingFood.calories * qty) || 0;
  adj.protein = (pendingFood.protein * qty) || 0;
  adj.carbs = (pendingFood.carbs * qty) || 0;
  adj.fat = (pendingFood.fat * qty) || 0;
  adj.sugar = (pendingFood.sugar * qty) || 0;
  // 注意：grade 不变，仍然显示原始 grade

  let totalInfo = `<b>${adj.food}</b> x${qty}<br><span class="small-tag">${adj.type}</span><br><br>`;
  totalInfo += `🔥 Calories: ${Math.round(adj.calories)} kcal<br>`;
  totalInfo += `P:${Math.round(adj.protein)}g C:${Math.round(adj.carbs)}g F:${Math.round(adj.fat)}g<br>`;
  totalInfo += `🍬 Sugar: ${Math.round(adj.sugar)}g<br>`;
  if(adj.grade) totalInfo += `Nutrition Grade: <span class="grade-badge grade-${adj.grade}">${adj.grade}</span><br>`;
  totalInfo += `<br><b>Components:</b><br>${(adj.components||[]).map(c=>`<span class="small-tag">${c}</span>`).join("")}`;
  document.getElementById("modalNutritionPreview").innerHTML = totalInfo;
}

// 监听数量变化时更新预览
document.getElementById("modalQuantity").addEventListener("input", updateModalNutritionPreview);

// ================= SAVE (带数量) =================
async function saveMeal(type){
  if(!pendingFood) return;
  pendingFood.food = document.getElementById("modalFoodName").value.trim() || pendingFood.food;
  pendingFood.mealType = type;
  let qty = parseInt(document.getElementById("modalQuantity").value) || 1;
  pendingFood.quantity = qty;

  // 保存的总营养已经是乘以数量后的值（在 preview 中计算过，但为了保险，在这里重新计算）
  let savedCalories = (pendingFood.calories * qty) || 0;
  let savedProtein = (pendingFood.protein * qty) || 0;
  // ... 同样处理 carbs, fat, sugar

  // 构建用于存储的对象（保持原始 per-piece 值在 pendingFood 中不变，但存入 foodDB 的总量）
  let foodEntry = {
    ...pendingFood,
    calories: savedCalories,
    protein: savedProtein,
    carbs: (pendingFood.carbs * qty) || 0,
    fat: (pendingFood.fat * qty) || 0,
    sugar: (pendingFood.sugar * qty) || 0,
    quantity: qty,
    originalCalories: pendingFood.calories,   // 保留 per-piece 值便于显示
    originalProtein: pendingFood.protein,
    originalCarbs: pendingFood.carbs,
    originalFat: pendingFood.fat,
    originalSugar: pendingFood.sugar
  };

  foodDB.push(foodEntry);
  localStorage.setItem("foodDB", JSON.stringify(foodDB));

  if(window.saveFood){
    try{
      const cloudResult = await window.saveFood(foodEntry);  // 传入总量
      if(cloudResult && cloudResult[0] && cloudResult[0].id){
        foodEntry.cloudId = cloudResult[0].id;
        localStorage.setItem("foodDB", JSON.stringify(foodDB));
      }
    }catch(e){ console.warn("Cloud save failed", e); }
  }

  pendingFood = null;
  closeMealModal();
  renderFoodList();
  updateToday();
  alert("Saved!");
}

// ================= RENDER (显示数量) =================
function renderFoodList(){
  document.getElementById("foodList").innerHTML = foodDB.map(f=>{
    let qtyStr = f.quantity && f.quantity > 1 ? ` x${f.quantity}` : '';
    let gradeBadge = f.grade ? `<span class="grade-badge grade-${f.grade}">${f.grade}</span>` : '';
    return `<div class="preview-box">
      <b>${f.food}${qtyStr}</b><br>
      <span class="small-tag">${f.type||"unknown"}</span><br>
      ${Math.round(f.calories)} kcal | 🍬 ${Math.round(f.sugar||0)}g ${gradeBadge}
      <br><button class="delete-btn" onclick="deleteFood(${f.id})">Delete</button>
    </div>`;
  }).join("");
}

// ... 其他函数 (deleteFood, updateToday, loadDB 等) 保持不变 ...

// 自动补全部分也需要在选中时设置默认数量1，并在 modal 中显示
function selectSuggestion(food, calories, protein, carbs, fat, sugar, grade){
  pendingFood = {
    id: Date.now(),
    food: food,
    type: detectFoodType(food),
    date: new Date().toISOString().split("T")[0],
    components: extractComponents(food),
    calories: calories,
    protein: protein,
    carbs: carbs,
    fat: fat,
    sugar: sugar,
    grade: grade,
    quantity: 1,       // 默认1
    dishes: []
  };
  suggestionsBox.style.display = 'none';
  document.getElementById("foodInput").value = food;
  openMealModal();
}

// 确认自定义输入时也加上 quantity:1
function confirmCustomEntry(){
  // ... 原有逻辑，在构建 pendingFood 时加入 quantity:1
}
</script>
</body>
</html>
