/* ================= SMART FOOD TYPE DETECTOR ================= */
function detectFoodType(t){
  let tx = (t||"").toLowerCase();
  if(tx.includes("economy rice")||tx.includes("杂饭")||tx.includes("cai fan")) return "Economy Rice";
  if(tx.includes("coffee")||tx.includes("kopi")||tx.includes("milo")) return "Drink";
  if(tx.includes("sandwich")) return "Sandwich";
  if(tx.includes("burger")) return "Burger";
  if(tx.includes("noodle")) return "Noodle";
  if(tx.includes("chicken rice")) return "Chicken Rice";
  if(tx.includes("rice")) return "Rice Dish";
  if(tx.includes("salad")) return "Salad";
  return "mixed meal";
}

/* ================= COMPONENT DETECTOR ================= */
function extractComponents(t){
  let tx = (t||"").toLowerCase(), c=[];
  if(tx.includes("rice")) c.push("rice");
  if(tx.includes("chicken")||tx.includes("meat")) c.push("meat");
  if(tx.includes("egg")) c.push("egg");
  if(tx.includes("veg")) c.push("vegetables");
  if(tx.includes("fish")) c.push("fish");
  if(tx.includes("noodle")) c.push("noodles");
  if(tx.includes("coffee")||tx.includes("kopi")) c.push("coffee/milk");
  if(tx.includes("sandwich")) c.push("bread + filling");
  if(tx.includes("burger")) c.push("bun + meat");
  if(c.length===0) c=["mixed ingredients"];
  return c;
}

/* ================= MEAL MODAL ================= */
function openMealModal(){
  if(!pendingFood) return;
  document.getElementById("mealModal").style.display="flex";
  // image preview...
  document.getElementById("modalFoodName").value = pendingFood.food;
  document.getElementById("modalQuantity").value = pendingFood.quantity || 1;
  // hints, dishes...
  updateModalNutritionPreview();
}

function updateModalNutritionPreview(){
  if(!pendingFood) return;
  let qty = parseInt(document.getElementById("modalQuantity").value) || 1;
  pendingFood.quantity = qty;
  let adj = {...pendingFood};
  adj.calories = (pendingFood.calories * qty) || 0;
  adj.protein = (pendingFood.protein * qty) || 0;
  adj.carbs = (pendingFood.carbs * qty) || 0;
  adj.fat = (pendingFood.fat * qty) || 0;
  adj.sugar = (pendingFood.sugar * qty) || 0;

  let totalInfo = `<b>${adj.food}</b> x${qty}<br><span class="small-tag">${adj.type}</span><br><br>`;
  totalInfo += `🔥 Calories: ${Math.round(adj.calories)} kcal<br>`;
  totalInfo += `P:${Math.round(adj.protein)}g C:${Math.round(adj.carbs)}g F:${Math.round(adj.fat)}g<br>`;
  totalInfo += `🍬 Sugar: ${Math.round(adj.sugar)}g<br>`;
  if(adj.grade) totalInfo += `Nutrition Grade: <span class="grade-badge grade-${adj.grade}">${adj.grade}</span><br>`;
  totalInfo += `<br><b>Components:</b><br>${(adj.components||[]).map(c=>`<span class="small-tag">${c}</span>`).join("")}`;
  document.getElementById("modalNutritionPreview").innerHTML = totalInfo;
}

document.getElementById("modalQuantity").addEventListener("input", updateModalNutritionPreview);

/* ================= 自动补全 ================= */
const foodInput = document.getElementById('foodInput');
const suggestionsBox = document.getElementById('suggestionsBox');

foodInput.addEventListener('input', function(e) {
  const query = this.value.trim();
  if (query.length < 2) { suggestionsBox.style.display = 'none'; return; }
  const matches = typeof searchLocalFoods === 'function' ? searchLocalFoods(query, 6) : [];
  if (matches.length === 0) { suggestionsBox.style.display = 'none'; return; }
  renderSuggestions(matches);
  suggestionsBox.style.display = 'block';
});

function renderSuggestions(items) {
  let html = '';
  items.forEach(item => {
    const grade = item.grade || '';
    html += `
      <div class="suggestion-item" onclick="selectSuggestion('${item.food.replace(/'/g, "\\'")}', ${item.calories}, ${item.protein}, ${item.carbs}, ${item.fat}, ${item.sugar||0}, '${grade}')">
        <span class="suggestion-name">${item.food}</span>
        <span class="grade-badge grade-${grade}">${grade || '?'}</span>
      </div>
    `;
  });
  suggestionsBox.innerHTML = html;
}

function selectSuggestion(food, calories, protein, carbs, fat, sugar, grade) {
  pendingFood = {
    id: Date.now(), food: food,
    type: detectFoodType(food), date: new Date().toISOString().split("T")[0],
    components: extractComponents(food),
    calories: calories, protein: protein, carbs: carbs, fat: fat,
    sugar: sugar, grade: grade,
    quantity: 1, dishes: []
  };
  suggestionsBox.style.display = 'none';
  document.getElementById("foodInput").value = food;
  openMealModal();
}

document.addEventListener('click', function(e) {
  if (!foodInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
    suggestionsBox.style.display = 'none';
  }
});
