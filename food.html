<div class="card">
<h2>📸 AI Food Scanner</h2>

<input type="file" accept="image/*" capture="environment" id="camera">

<button onclick="analyze()">Analyze Food</button>

<p id="result"></p>
</div>

<script>

// 🧠 模拟AI识别（之后可接OpenAI Vision）
function fakeAI(image){

const foods = [
"chicken rice",
"milo",
"fried noodles",
"teh tarik"
]

return foods[Math.floor(Math.random()*foods.length)]
}

function cal(food){

if(food.includes("chicken")) return 600
if(food.includes("fried")) return 700
if(food.includes("milo")) return 180
return 300
}

async function analyze(){

const file = document.getElementById("camera").files[0]
if(!file){
alert("Please take a photo")
return
}

// 🟢 AI识别（模拟）
const food = fakeAI(file)

const calories = cal(food)

document.getElementById("result").innerHTML=
"🍽 Recognized: "+food+"<br>"+
"🔥 "+calories+" kcal<br>"+
"🧠 Ipoh advice: reduce oil & sugar"

await insertFood({
food,
calories,
meal_type:"snack",
date:new Date().toISOString().split("T")[0]
})

}

</script>
