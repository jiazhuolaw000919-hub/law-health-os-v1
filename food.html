<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v16.2 PRO SYSTEM (FIXED STABLE VERSION)</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="ai-engine.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

.modal{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.modal-content{
background:white;
padding:20px;
border-radius:12px;
width:340px;
text-align:center;
max-height:90vh;
overflow-y:auto;
}

.preview-box{
background:#f9fafb;
padding:10px;
border-radius:8px;
margin-top:10px;
text-align:left;
font-size:14px;
}

button{
margin:5px;
padding:6px 10px;
border-radius:8px;
border:1px solid #ddd;
cursor:pointer;
}

.small-tag{
display:inline-block;
margin:2px;
padding:2px 6px;
background:#e5e7eb;
border-radius:6px;
font-size:12px;
}

.delete-btn{
background:#ffdddd;
border:1px solid #ff8888;
cursor:pointer;
}

.upload-preview-img{
max-width:100%;
max-height:150px;
border-radius:8px;
margin:10px 0;
}

.editable-field{
width:100%;
padding:6px;
margin:4px 0;
box-sizing:border-box;
}
</style>
</head>

<body>

<h2>🍽 Food AI v16.2 (FIXED STABLE VERSION)</h2>

<div class="card">
<p id="activeProfile">Loading...</p>
</div>

<div class="card">
<h3>📊 Today</h3>
<p id="todayCalories">Calories: --</p>
<p id="deficitInfo">Deficit: --</p>
<p id="modeStatus">Mode: normal</p>
<p id="aiStatus">AI: idle</p>
</div>

<div class="card">
<input id="foodInput" placeholder="e.g. chicken rice + milo">

<br><br>

<button onclick="startManualFlow()">Add Food</button>
<button onclick="openAIUpload()">AI Scan</button>
<button onclick="openBarcode()">Barcode Scan</button>
<button onclick="startMultiCapture()">Multi Capture</button>
</div>

<div class="card">
<h3>AI Result (Saved List)</h3>
<div id="foodList"></div>
</div>

<!-- 重构后的 Meal Modal，支持图片预览 + 手动修正 -->
<div id="mealModal" class="modal">
<div class="modal-content">

<h3>🍽️ Confirm & Save</h3>

<!-- 图片预览区 -->
<div id="modalImagePreview" style="display:none;"></div>

<!-- 可编辑的食物名称 -->
<label>Food Name:</label>
<input type="text" id="modalFoodName" class="editable-field" placeholder="Enter food name">

<!-- 显示估算营养值 -->
<div id="modalNutritionPreview" class="preview-box"></div>

<!-- 重新估算按钮 -->
<button onclick="reEstimateFromName()">🔄 Re-estimate from name</button>

<br><br>

<div style="display:flex; flex-wrap:wrap; justify-content:center;">
<button onclick="saveMeal('Breakfast')">🌅 Breakfast</button>
<button onclick="saveMeal('Lunch')">🌞 Lunch</button>
<button onclick="saveMeal('Dinner')">🌙 Dinner</button>
<button onclick="saveMeal('Snack')">🍪 Snack</button>
</div>

<button onclick="closeMealModal()" style="margin-top:10px;">Cancel</button>

</div>
</div>

<script>

/* ================= GLOBAL DB ================= */
let foodDB = JSON.parse(localStorage.getItem("foodDB")) || []

let pendingFood = null
let mode = "normal"
let multiList = []

/* ================= PROFILE ================= */
document.getElementById("activeProfile").innerText =
JSON.parse(localStorage.getItem("activeProfile"))?.name || "Guest"

/* ================= AI STATUS ================= */
function setAI(status){
document.getElementById("aiStatus").innerText = "AI: " + status
}

/* ================= SMART FOOD TYPE DETECTOR ================= */
function detectFoodType(text){

let t = (text || "").toLowerCase()

let type = "mixed meal"

if(t.includes("economy rice") || t.includes("杂饭") || t.includes("cai fan")){
type = "Economy Rice"
}
else if(t.includes("coffee") || t.includes("kopi") || t.includes("milo")){
type = "Drink"
}
else if(t.includes("sandwich")){
type = "Sandwich"
}
else if(t.includes("burger")){
type = "Burger"
}
else if(t.includes("noodle")){
type = "Noodle"
}
else if(t.includes("chicken rice")){
type = "Chicken Rice"
}
else if(t.includes("rice")){
type = "Rice Dish"
}
else if(t.includes("salad")){
type = "Salad"
}

return type
}

/* ================= COMPONENT DETECTOR ================= */
function extractComponents(text){

let t = (text || "").toLowerCase()

let components = []

if(t.includes("rice")) components.push("rice")
if(t.includes("chicken") || t.includes("meat")) components.push("meat")
if(t.includes("egg")) components.push("egg")
if(t.includes("veg")) components.push("vegetables")
if(t.includes("fish")) components.push("fish")
if(t.includes("noodle")) components.push("noodles")
if(t.includes("coffee") || t.includes("kopi")) components.push("coffee/milk")
if(t.includes("sandwich")) components.push("bread + filling")
if(t.includes("burger")) components.push("bun + meat")

if(components.length === 0){
components = ["mixed ingredients"]
}

return components
}

/* ================= AI WRAPPER (保留原样，但即使失败我们也能手动修正) ================= */
async function analyzeImage(base64){

setAI("scanning...")

try{
if(window.analyzeFoodImage){
const r = await window.analyzeFoodImage(base64)

setAI("done")

return {
food: r?.food || "Unknown meal",
calories: Number(r?.calories ?? 450),
protein: Number(r?.protein ?? 18),
carbs: Number(r?.carbs ?? 55),
fat: Number(r?.fat ?? 12)
}
}
}catch(e){
console.log(e)
}

setAI("fallback")

return {
food:"Unknown meal",
calories:450,
protein:18,
carbs:55,
fat:12
}
}

/* ================= MODE ================= */
function setMode(m){
mode = m
document.getElementById("modeStatus").innerText = "Mode: " + m
}

/* ================= NUTRITION ================= */
function estimateNutrition(food){

let base = 400
food = (food || "").toLowerCase()

if(food.includes("chicken")) base += 120
if(food.includes("rice")) base += 120
if(food.includes("milo")) base += 150
if(food.includes("burger")) base += 300
if(food.includes("egg")) base += 80

return {
calories: base,
protein: Math.round(base*0.05),
carbs: Math.round(base*0.12),
fat: Math.round(base*0.04)
}
}

/* ================= DEFICIT ================= */
function getDeficit(cal){

let maintenance = 2200
let diff = cal - maintenance

return {
status: diff > 0 ? "surplus" : "deficit",
diff
}
}

/* ================= MANUAL ================= */
function startManualFlow(){

let input = document.getElementById("foodInput").value.trim()
if(!input) return alert("Enter food")

pendingFood = {
id: Date.now(),
food: input,
type: detectFoodType(input),
date: new Date().toISOString().split("T")[0],
components: extractComponents(input),
...estimateNutrition(input)
}

openMealModal()
}

/* ================= AI UPLOAD (现在会弹出可编辑的确认框) ================= */
async function openAIUpload(){

let input = document.createElement("input")
input.type = "file"
input.accept = "image/*"

input.onchange = async ()=>{

let file = input.files[0]
if(!file) return

let reader = new FileReader()

reader.onload = async ()=>{

let base64 = reader.result
let result = await analyzeImage(base64)

// 构建 pendingFood，但 food 名称会被放入模态框供编辑
pendingFood = {
id: Date.now(),
food: result.food,            // 可能是 Unknown meal
type: detectFoodType(result.food),
date: new Date().toISOString().split("T")[0],
components: extractComponents(result.food),
...result,
image: base64
}

openMealModal()
}

reader.readAsDataURL(file)
}

// iOS safe click
setTimeout(()=>{
input.click()
},0)
}

/* ================= BARCODE ================= */
function openBarcode(){

let code = prompt("barcode/name")

pendingFood = {
id: Date.now(),
food: code || "Unknown",
type: detectFoodType(code),
date: new Date().toISOString().split("T")[0],
components: extractComponents(code || ""),
calories: 300,
protein: 10,
carbs: 40,
fat: 10
}

openMealModal()
}

/* ================= MULTI ================= */
function startMultiCapture(){

multiList = [
{food:"Chicken rice",calories:600},
{food:"Mixed veg rice",calories:500},
{food:"Egg noodle",calories:550}
]

document.getElementById("foodList").innerHTML =
multiList.map(m=>`
<div class="preview-box">
<b>${m.food}</b><br>
${m.calories} kcal
</div>
`).join("")
}

/* ================= 新的 Meal Modal 逻辑 ================= */
function openMealModal(){
if(!pendingFood) return;

const modal = document.getElementById("mealModal")
modal.style.display = "flex"

// 图片预览
const imgDiv = document.getElementById("modalImagePreview")
if(pendingFood.image){
imgDiv.style.display = "block"
imgDiv.innerHTML = `<img src="${pendingFood.image}" class="upload-preview-img" />`
} else {
imgDiv.style.display = "none"
imgDiv.innerHTML = ""
}

// 食物名称输入框
document.getElementById("modalFoodName").value = pendingFood.food

// 显示当前营养数值
updateModalNutritionPreview()
}

function updateModalNutritionPreview(){
if(!pendingFood) return;

let adj = {...pendingFood}
if(mode==="deficit") adj.calories = Math.round(adj.calories * 0.85)
if(mode==="bulk") adj.calories = Math.round(adj.calories * 1.15)

document.getElementById("modalNutritionPreview").innerHTML = `
<b>${adj.food}</b><br>
<span class="small-tag">${adj.type}</span><br><br>
🔥 ${Math.round(adj.calories)} kcal<br>
P:${Math.round(adj.protein)} C:${Math.round(adj.carbs)} F:${Math.round(adj.fat)}<br>
<br><b>Components:</b><br>
${(adj.components||[]).map(c=>`<span class="small-tag">${c}</span>`).join("")}
`
}

// 当用户在输入框修改名字时，实时更新 pendingFood 并重算
document.getElementById("modalFoodName").addEventListener("input", function(e){
if(!pendingFood) return;
let newName = e.target.value.trim() || "Unknown meal"
pendingFood.food = newName
pendingFood.type = detectFoodType(newName)
pendingFood.components = extractComponents(newName)

// 是否自动重算营养？这里提供手动按钮，但也可以自动：
// 为了不过度覆盖AI的结果，我们只在用户点击"Re-estimate"时才重算
// 但我们可以更新预览中的 food 名称
updateModalNutritionPreview()
})

// 重新估算按钮：根据当前输入框的名字重新生成营养值（覆盖AI结果）
function reEstimateFromName(){
if(!pendingFood) return;
let name = document.getElementById("modalFoodName").value.trim() || "Unknown meal"
let est = estimateNutrition(name)
pendingFood.food = name
pendingFood.type = detectFoodType(name)
pendingFood.components = extractComponents(name)
pendingFood.calories = est.calories
pendingFood.protein = est.protein
pendingFood.carbs = est.carbs
pendingFood.fat = est.fat
updateModalNutritionPreview()
}

// 让 reEstimateFromName 全局可访问
window.reEstimateFromName = reEstimateFromName

function closeMealModal(){
document.getElementById("mealModal").style.display="none"
pendingFood = null
}

/* ================= SAVE ================= */
function saveMeal(type){

if(!pendingFood) return

// 保存前确保 food 名称是输入框里的最终值
pendingFood.food = document.getElementById("modalFoodName").value.trim() || pendingFood.food
pendingFood.mealType = type

foodDB.push(pendingFood)
localStorage.setItem("foodDB", JSON.stringify(foodDB))

if(window.saveFood){
window.saveFood(pendingFood)
}

pendingFood = null

closeMealModal()
renderFoodList()
updateToday()

alert("Saved!")
}

/* ================= DELETE ================= */
function deleteFood(id){

foodDB = foodDB.filter(f => f.id !== id)
localStorage.setItem("foodDB", JSON.stringify(foodDB))

renderFoodList()
updateToday()
}

/* ================= RENDER ================= */
function renderFoodList(){

document.getElementById("foodList").innerHTML =
foodDB.map(f=>`
<div class="preview-box">
<b>${f.food}</b><br>
<span class="small-tag">${f.type || "unknown"}</span><br>
🔥 ${f.calories} kcal

<br><button class="delete-btn" onclick="deleteFood(${f.id})">Delete</button>
</div>
`).join("")
}

/* ================= TODAY ================= */
function updateToday(){

let today = new Date().toISOString().split("T")[0]

let todayFoods = foodDB.filter(f => f.date === today)

let cal = todayFoods.reduce((a,b)=>a + (b.calories||0),0)

let def = getDeficit(cal)

document.getElementById("todayCalories").innerText = "Calories: " + cal
document.getElementById("deficitInfo").innerText =
def.status + " (" + def.diff + ")"
}

/* ================= INIT ================= */
function loadDB(){
foodDB = JSON.parse(localStorage.getItem("foodDB")) || []
renderFoodList()
updateToday()
}

loadDB()

</script>

</body>
</html>
