<body>

<h2 style="text-align:center">🍽 Food Log</h2>

<div class="card">

<input id="foodInput" placeholder="e.g. chicken rice"
style="padding:10px;width:90%">

<br><br>

<button onclick="addFood()"
style="padding:10px 15px;background:#111827;color:white;border:none;border-radius:10px">
Add Food
</button>

</div>

<div class="card" id="log"></div>

<script>

setActive("food")

let total = 0

async function addFood(){

const input = document.getElementById("foodInput")
const food = input.value.trim()

if(!food) return

// 简单AI估算卡路里
let cal = 300

if(food.includes("chicken")) cal = 600
if(food.includes("milo")) cal = 180
if(food.includes("rice")) cal = 500
if(food.includes("tea")) cal = 120

const today = new Date().toISOString().split("T")[0]

// UI更新
total += cal

document.getElementById("log").innerHTML +=
`<p>🍽 ${food} - ${cal} kcal</p>`

input.value = ""

// 🔌 Supabase写入（关键）
try{
await addFood({
food: food,
calories: cal,
date: today
})
console.log("Saved to Supabase ✔")
}catch(e){
console.log("Supabase error:", e)
}

}

</script>

</body>
</html>
