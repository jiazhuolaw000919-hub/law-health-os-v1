<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v7.1</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 style="text-align:center">🍽 Food AI v7.1</h2>

<div class="card">
<input id="foodInput" placeholder="e.g. chicken rice">
<br><br>
<button onclick="addFoodManual()">Add Food</button>
<div id="log"></div>
</div>

<div class="card">
<h3>📸 AI Scanner (v7.1)</h3>
<input type="file" id="foodImage">
<br><br>
<button onclick="scanFood()">Analyze Image</button>
<p id="aiResult">Waiting...</p>
</div>

<script>

setActive("food")

// =====================
// MOCK FALLBACK AI
// =====================
function mockAI(){

return {
food: "unknown meal",
calories: 500,
protein: 20,
carbs: 60,
fat: 15,
confidence: 0.4,
source: "mock"
}

}

// =====================
// SAFE FETCH (timeout + fallback)
// =====================
async function safeFetch(url, options, timeout = 5000){

return new Promise(async (resolve)=>{

let done = false

const timer = setTimeout(()=>{
if(!done){
done = true
resolve({ error: "timeout", result: mockAI() })
}
}, timeout)

try{

const res = await fetch(url, options)
const data = await res.json().catch(()=>null)

clearTimeout(timer)

if(!done){
done = true
resolve(data || { result: mockAI() })
}

}catch(e){

clearTimeout(timer)

if(!done){
done = true
resolve({ error: String(e), result: mockAI() })
}

}

})

}

// =====================
// MANUAL INPUT
// =====================
async function addFoodManual(){

const food = document.getElementById("foodInput").value.trim()
if(!food) return

let cal = 300
if(food.includes("chicken")) cal = 600
if(food.includes("rice")) cal = 500
if(food.includes("milo")) cal = 180
if(food.includes("tea")) cal = 120

const today = new Date().toISOString().split("T")[0]

document.getElementById("log").innerHTML +=
`<p>🍽 ${food} - ${cal} kcal</p>`

if(typeof saveFood !== "undefined"){
await saveFood({
food,
calories: cal,
protein: 0,
carbs: 0,
fat: 0,
confidence: 1,
source: "manual",
date: today
})
}

}

// =====================
// AI SCAN v7.1
// =====================
async function scanFood(){

const file = document.getElementById("foodImage").files[0]

if(!file){
alert("upload image")
return
}

document.getElementById("aiResult").innerText = "Analyzing..."

const reader = new FileReader()

reader.onload = async function(){

try{

const base64 = reader.result

const res = await safeFetch("/api/ai", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({ image: base64 })
})

// normalize
let raw = res?.result || res

if(!raw){
raw = mockAI()
}

let parsed = raw

if(typeof parsed === "string"){
try{
parsed = JSON.parse(parsed)
}catch(e){
parsed = mockAI()
}
}

// FINAL NORMALIZATION (IMPORTANT v7.1 CORE)
parsed = {
food: parsed.food || "unknown",
calories: parsed.calories || 0,
protein: parsed.protein || 0,
carbs: parsed.carbs || 0,
fat: parsed.fat || 0,
confidence: parsed.confidence ?? 0.5,
source: parsed.source || "ai"
}

// save
const today = new Date().toISOString().split("T")[0]

if(typeof saveFood !== "undefined"){
await saveFood({
...parsed,
date: today
})
}

// UI
document.getElementById("aiResult").innerHTML =
`🍽 Food: ${parsed.food}
🔥 Calories: ${parsed.calories}
💪 Protein: ${parsed.protein}
🍞 Carbs: ${parsed.carbs}
🥑 Fat: ${parsed.fat}
🧠 Confidence: ${(parsed.confidence * 100).toFixed(0)}%
📡 Source: ${parsed.source}`

}catch(err){

console.log(err)

document.getElementById("aiResult").innerText =
"AI failed (v7.1 fallback active)"

}

}

reader.readAsDataURL(file)
}

</script>

</body>
</html>
