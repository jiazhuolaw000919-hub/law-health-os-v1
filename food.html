<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v11.3 System (AI Integrated)</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="ai-engine.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 style="text-align:center">🍽 Food AI v11.3 (AI FULL)</h2>

<!-- PROFILE -->
<div class="card">
<p id="activeProfile">Loading profile...</p>
</div>

<!-- INPUT -->
<div class="card">
<input id="foodInput" placeholder="e.g. chicken rice + milo + tomyam">
<br><br>

<button onclick="addFoodManual()">Add Food</button>
</div>

<!-- AI SCANNER -->
<div class="card">
<h3>📸 AI Scanner v11.3</h3>

<input type="file" id="foodImage">
<br><br>

<button onclick="scanFood()" id="scanBtn">Analyze Image</button>

<p id="aiResult">Waiting...</p>

<div id="confirmBox" style="display:none;margin-top:10px;">
<button onclick="confirmSaveFood()">✅ Confirm Save</button>
<button onclick="cancelSaveFood()" style="background:red;color:white;">❌ Cancel</button>
</div>

</div>

<!-- RESULT LIST -->
<div class="card">
<h3>🍽 AI Food Breakdown</h3>
<div id="foodList"></div>

<p id="mealScore"></p>
<p id="riskSummary"></p>
</div>

<script>

setActive?.("food")

let pendingFood = null
let scanLock = false

/* ================= PROFILE ================= */

function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest"
}
}

/* ================= UI ================= */

function renderProfile(){
document.getElementById("activeProfile").innerText =
"👤 Active: " + getActiveProfile().name
}

/* ================= MANUAL INPUT ================= */

async function addFoodManual(){

const text = document.getElementById("foodInput").value
if(!text) return

const profile = getActiveProfile()

const ai = getAIInsight(2000, 25, [], text)

renderAI(ai)

await saveFood?.({
userId: profile.id,
food: text,
calories: 2000,
date: new Date().toISOString().split("T")[0]
})
}

/* ================= AI SCAN (NEW) ================= */

async function scanFood(){

if(scanLock) return
scanLock = true

const file = document.getElementById("foodImage").files[0]

if(!file){
alert("upload image")
scanLock = false
return
}

document.getElementById("scanBtn").innerText = "Analyzing..."

const reader = new FileReader()

reader.onload = async function(){

try{

const res = await fetch("/api/ai", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
image: reader.result
})
})

let data = await res.json()

let ai = data.result || {}

renderAI(ai)

pendingFood = ai

document.getElementById("confirmBox").style.display = "block"

}catch(e){
console.log(e)
}

scanLock = false
document.getElementById("scanBtn").innerText = "Analyze Image"

}

reader.readAsDataURL(file)
}

/* ================= RENDER AI (NEW CORE) ================= */

function renderAI(ai){

if(!ai || !ai.foods) return

let html = ""

ai.foods.forEach(f=>{
html += `
<div class="card">
🍜 ${f.food}<br>
🔥 ${f.calories} kcal<br>
🌍 ${f.cuisine}<br>
⚠️ Risk: ${f.risk}
</div>
`
})

document.getElementById("foodList").innerHTML = html

document.getElementById("mealScore").innerText =
"🍽 Meal Score: " + ai.mealScore

document.getElementById("riskSummary").innerText =
"⚠️ Risk: " + ai.risk.level + " " + ai.risk.text
}

/* ================= CONFIRM ================= */

async function confirmSaveFood(){

if(!pendingFood) return

await saveFood?.({
userId: getActiveProfile().id,
data: pendingFood,
date: new Date().toISOString().split("T")[0]
})

document.getElementById("confirmBox").style.display = "none"
pendingFood = null
}

/* ================= CANCEL ================= */

function cancelSaveFood(){
pendingFood = null
document.getElementById("confirmBox").style.display = "none"
}

renderProfile()

</script>

</body>
</html>
