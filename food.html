<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Food AI v11.4 System (Stable FIX)</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>

<script src="ai.js"></script>

<script src="ai-engine.js"></script>

<script src="supabase.js"></script>

<script src="ai-vision.js"></script>

</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 style="text-align:center">
🍽 Food AI v11.4
</h2>

<!-- PROFILE -->

<div class="card">
<p id="activeProfile">Loading profile...</p>
</div>

<!-- MANUAL INPUT -->

<div class="card">

<input
id="foodInput"
placeholder="e.g. chicken rice + milo + tomyam">

<br><br>

<button onclick="addFoodManual()">
Add Food
</button>

</div>

<!-- AI SCANNER -->

<div class="card">

<h3>📸 AI Scanner</h3>

<input
type="file"
id="foodImage"
accept="image/*">

<br><br>

<button
onclick="scanFood()"
id="scanBtn">
Analyze Image </button>

<p id="aiResult">
Waiting...
</p>

<div
id="confirmBox"
style="display:none;margin-top:10px;">

<button onclick="confirmSaveFood()">
✅ Confirm Save
</button>

<button
onclick="cancelSaveFood()"
style="background:red;color:white;">

❌ Cancel

</button>

</div>

</div>

<!-- RESULT -->

<div class="card">

<h3>🍽 AI Food Breakdown</h3>

<div id="foodList"></div>

<p id="mealScore"></p>

<p id="riskSummary"></p>

</div>

<script>

setActive?.("food")

let pendingFood = null
let scanLock = false

/* ================= PROFILE ================= */

function getActiveProfile(){

return JSON.parse(
localStorage.getItem("activeProfile")
) || {
id:"guest",
name:"Guest"
}

}

function renderProfile(){

document.getElementById("activeProfile").innerText =
"👤 Active: " +
getActiveProfile().name

}

/* ================= MANUAL INPUT ================= */

async function addFoodManual(){

const text =
document.getElementById("foodInput").value.trim()

if(!text) return

const ai = {
foods:[
{
food:text,
calories:2000,
cuisine:"Manual",
risk:"Medium"
}
],
mealScore:70,
risk:{
level:"🟡",
text:"Moderate Risk"
}
}

renderAI(ai)

await saveFood({
food:text,
calories:2000,
protein:0,
carbs:0,
fat:0,
date:new Date()
.toISOString()
.split("T")[0]
})

alert("Food Saved")

}

/* ================= AI SCAN ================= */

async function scanFood(){

if(scanLock) return

scanLock = true

const file =
document.getElementById("foodImage").files[0]

if(!file){

alert("Please upload image")

scanLock = false

return

}

document.getElementById("scanBtn").innerText =
"Analyzing..."

setTimeout(()=>{

pendingFood = {

foods:[
{
food:"Chicken Rice",
calories:650,
cuisine:"Asian",
risk:"Medium"
}
],

mealScore:78,

risk:{
level:"🟡",
text:"Moderate Risk"
}

}

renderAI(pendingFood)

document.getElementById("confirmBox").style.display =
"block"

document.getElementById("scanBtn").innerText =
"Analyze Image"

scanLock = false

},1500)

}

/* ================= AI RENDER ================= */

function renderAI(ai){

if(!ai){

document.getElementById("foodList").innerHTML =
"No AI Result"

return

}

if(!Array.isArray(ai.foods)){

document.getElementById("foodList").innerHTML =
"No food detected"

return

}

let html = ""

ai.foods.forEach(f=>{

html += `
<div class="card">

🍜 ${f.food}<br>

🔥 ${f.calories} kcal<br>

🌍 ${f.cuisine}<br>

⚠️ Risk: ${f.risk}

</div>
`

})

document.getElementById("foodList").innerHTML =
html

document.getElementById("mealScore").innerText =
"🍽 Meal Score: " +
(ai.mealScore || 0)

document.getElementById("riskSummary").innerText =
"⚠️ Risk: " +
(ai.risk?.level || "") +
" " +
(ai.risk?.text || "")

}

/* ================= SAVE ================= */

async function confirmSaveFood(){

if(!pendingFood) return

for(const item of pendingFood.foods){

await saveFood({

food:item.food,

calories:item.calories,

protein:0,

carbs:0,

fat:0,

date:new Date()
.toISOString()
.split("T")[0]

})

}

alert("Food Saved")

document.getElementById("confirmBox").style.display =
"none"

pendingFood = null

}

/* ================= CANCEL ================= */

function cancelSaveFood(){

pendingFood = null

document.getElementById("confirmBox").style.display =
"none"

}

/* ================= INIT ================= */

renderProfile()

</script>

</body>
</html>
