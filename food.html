<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v7.0</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>

<a href="workout.html">Workout</a>

<a href="profile.html">Profile</a>
</div>

<h2 style="text-align:center">🍽 Food AI System v7.0</h2>

<!-- FOOD INPUT -->
<div class="card">

<input id="foodInput" placeholder="e.g. chicken rice"
style="padding:10px;width:90%">

<br><br>

<button onclick="addFoodManual()">
Add Food
</button>

<div id="log"></div>

</div>

<!-- AI SCANNER -->
<div class="card">
<h3>📸 AI Food Scanner (v7)</h3>

<input type="file" id="foodImage">

<br><br>

<button onclick="scanFood()">Analyze Image</button>

<p id="aiResult">Waiting...</p>
</div>

<script>

setActive("food")

// =============================
// SAFE FETCH WRAPPER (v7 CORE)
// =============================
async function safeFetch(url, options){

try{
const res = await fetch(url, options)

const data = await res.json().catch(()=>null)

if(!res.ok){
throw new Error(data?.error || "API Error")
}

return data

}catch(err){
console.log("safeFetch error:", err)
return { error: String(err) }
}

}

// =============================
// 🍽 MANUAL FOOD INPUT
// =============================
async function addFoodManual(){

const input = document.getElementById("foodInput")
const food = input.value.trim()

if(!food) return

let cal = 300
if(food.includes("chicken")) cal = 600
if(food.includes("milo")) cal = 180
if(food.includes("rice")) cal = 500
if(food.includes("tea")) cal = 120

const today = new Date().toISOString().split("T")[0]

document.getElementById("log").innerHTML +=
`<p>🍽 ${food} - ${cal} kcal</p>`

input.value = ""

try{
if(typeof saveFood !== "undefined"){
await saveFood({
food,
calories: cal,
date: today,
source: "manual"
})
}
}catch(e){
console.log(e)
}

}

// =============================
// 📸 AI SCAN (v7 ENGINE)
// =============================
async function scanFood(){

const file = document.getElementById("foodImage").files[0]

if(!file){
alert("Please upload image")
return
}

document.getElementById("aiResult").innerText = "Analyzing..."

const reader = new FileReader()

reader.onload = async function(){

try{

const base64 = reader.result

// 1. CALL AI API (SAFE)
const res = await safeFetch("/api/ai", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({ image: base64 })
})

// 2. NORMALIZE RESPONSE
let raw = res?.result || res?.data || res

if(!raw){
document.getElementById("aiResult").innerText =
"⚠️ Empty AI response"
return
}

// 3. SAFE PARSE
let parsed = raw

if(typeof parsed === "string"){
try{
parsed = JSON.parse(parsed)
}catch(e){
parsed = { food:"unknown", calories:0 }
}
}

// 4. FINAL SANITIZE
parsed = {
food: parsed.food || "unknown",
calories: parsed.calories || 0,
protein: parsed.protein || 0,
carbs: parsed.carbs || 0,
fat: parsed.fat || 0
}

// 5. DUPLICATE CHECK
const today = new Date().toISOString().split("T")[0]

if(typeof getFoodLogs !== "undefined"){

const logs = await getFoodLogs(today) || []

const exists = logs.some(f =>
f.food === parsed.food &&
f.source === "ai"
)

if(exists){
document.getElementById("aiResult").innerText =
"⚠️ Duplicate detected (ignored)"
return
}
}

// 6. SAVE
if(typeof saveFood !== "undefined"){
await saveFood({
...parsed,
source: "ai",
date: today
})
}

// 7. UI OUTPUT
document.getElementById("aiResult").innerText =
`🍽 Food: ${parsed.food}
🔥 Calories: ${parsed.calories}
💪 Protein: ${parsed.protein}
🍞 Carbs: ${parsed.carbs}
🥑 Fat: ${parsed.fat}`

}catch(err){

console.log(err)

document.getElementById("aiResult").innerText =
"AI system error (v7 safe mode)"

}

}

reader.readAsDataURL(file)
}

</script>

</body>
</html>
