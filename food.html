<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white;}

.nav{display:flex;justify-content:space-around;background:#111827;padding:12px;}
.nav a{color:white;text-decoration:none;}

.card{background:#1f2937;margin:10px;padding:15px;border-radius:12px;}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Dashboard</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="calendar.html">Calendar</a>
<a href="shop.html">Shop</a>
</div>

<div class="card">
<h2>🍽 Food Logger</h2>

<input id="food" placeholder="e.g. chicken rice">
<select id="meal">
<option>breakfast</option>
<option>lunch</option>
<option>dinner</option>
<option>snack</option>
</select>

<button onclick="add()">Add</button>

<p id="out"></p>
</div>

<script>

function cal(food){
food=food.toLowerCase()

if(food.includes("chicken")) return 600
if(food.includes("milo")) return 180
if(food.includes("rice")) return 500
return 300
}

function ai(food){
if(food.includes("fried")) return "Reduce fried food (Ipoh style)"
if(food.includes("milo")) return "Less sugar recommended"
return "Balanced meal"
}

async function add(){

const food=document.getElementById("food").value
const meal=document.getElementById("meal").value

const calories=cal(food)

document.getElementById("out").innerHTML=
food+" "+calories+" kcal<br>"+ai(food)

await insertFood({
food,
calories,
meal_type:meal,
date:new Date().toISOString().split("T")[0]
})

}

</script>

</body>
</html>
