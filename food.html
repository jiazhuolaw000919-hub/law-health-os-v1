<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v3 Stable</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>

</div>

<h2 style="text-align:center">🍽 Food AI System (Stable)</h2>

<!-- FOOD INPUT -->
<div class="card">

<input id="foodInput" placeholder="e.g. chicken rice"
style="padding:10px;width:90%">

<br><br>

<button onclick="addFoodManual()"
style="padding:10px 15px;background:#111827;color:white;border:none;border-radius:10px">
Add Food
</button>

<div id="log"></div>

</div>

<!-- AI SCANNER -->
<div class="card">
<h3>📸 Food AI Scanner</h3>

<input type="file" id="foodImage">

<br><br>

<button onclick="scanFood()">Analyze Image</button>

<p id="aiResult">Waiting...</p>
</div>

<script>

setActive("food")

// =====================
// 🍽 MANUAL FOOD INPUT
// =====================
async function addFoodManual(){

const input = document.getElementById("foodInput")
const food = input.value.trim()

if(!food) return

let cal = 300
if(food.includes("chicken")) cal = 600
if(food.includes("milo")) cal = 180
if(food.includes("rice")) cal = 500
if(food.includes("tea")) cal = 120

const today = new Date().toISOString().split("T")[0]

// UI update
document.getElementById("log").innerHTML +=
`<p>🍽 ${food} - ${cal} kcal</p>`

input.value = ""

// save to DB
try{
if(typeof saveFood !== "undefined"){
await saveFood({
food,
calories: cal,
date: today
})
}
}catch(e){
console.log("saveFood error:", e)
}

}

// =====================
// 📸 AI FOOD SCAN
// =====================
async function scanFood(){

const file = document.getElementById("foodImage").files[0]

if(!file){
alert("Please upload image")
return
}

document.getElementById("aiResult").innerText = "Analyzing..."

const reader = new FileReader()

reader.onload = async function(){

const base64 = reader.result

try{

// 1. call AI
const raw = await analyzeFoodImage(base64)

// 2. parse safe
let parsed = raw

if(typeof parsed === "string"){
try{
parsed = JSON.parse(parsed)
}catch(e){
try{
parsed = Function("return " + parsed)()
}catch(e2){
parsed = { food:"unknown", calories:0 }
}
}
}

// 3. dedup AI (SAFE)
const today = new Date().toISOString().split("T")[0]

if(typeof getFoodLogs !== "undefined"){

const logs = await getFoodLogs(today) || []

const exists = logs.some(f =>
f.food === parsed.food &&
f.source === "ai"
)

if(exists){
document.getElementById("aiResult").innerText =
"⚠️ Duplicate AI food ignored"
return
}
}

// 4. save AI food
if(typeof saveFood !== "undefined"){
await saveFood({
food: parsed.food || "unknown",
calories: parsed.calories || 0,
protein: parsed.protein || 0,
carbs: parsed.carbs || 0,
fat: parsed.fat || 0,
source: "ai",
date: today
})
}

// 5. UI render
document.getElementById("aiResult").innerText =
`🍽 Food: ${parsed.food || "Unknown"}
🔥 Calories: ${parsed.calories || "-"}
💪 Protein: ${parsed.protein || "-"}
🍞 Carbs: ${parsed.carbs || "-"}
🥑 Fat: ${parsed.fat || "-"}`

}catch(e){

console.log(e)

document.getElementById("aiResult").innerText =
"AI failed or API not set"

}

}

reader.readAsDataURL(file)
}

// =====================
// AI API CALL
// =====================
async function analyzeFoodImage(imageBase64){

const res = await fetch("/api/ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
image:imageBase64
})
})

const data = await res.json()

return data.result
}

</script>

</body>
</html>
