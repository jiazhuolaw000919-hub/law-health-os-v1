<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v3</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
</div>

<h2 style="text-align:center">🍽 Food AI System</h2>

<!-- FOOD INPUT -->
<div class="card">

<input id="foodInput" placeholder="e.g. chicken rice"
style="padding:10px;width:90%">

<br><br>

<button onclick="addFood()"
style="padding:10px 15px;background:#111827;color:white;border:none;border-radius:10px">
Add Food
</button>

<div id="log"></div>

</div>

<!-- AI IMAGE SCANNER -->
<div class="card">
<h3>📸 Food AI Scanner</h3>

<input type="file" id="foodImage">

<br><br>

<button onclick="scanFood()">Analyze Image</button>

<p id="aiResult">Waiting...</p>
</div>

<script>

setActive("food")

let total = 0

// 🍽 manual food add
async function addFood(){

const input = document.getElementById("foodInput")
const food = input.value.trim()

if(!food) return

let cal = 300

if(food.includes("chicken")) cal = 600
if(food.includes("milo")) cal = 180
if(food.includes("rice")) cal = 500
if(food.includes("tea")) cal = 120

const today = new Date().toISOString().split("T")[0]

document.getElementById("log").innerHTML +=
`<p>🍽 ${food} - ${cal} kcal</p>`

input.value = ""

try{
if(typeof addFood !== "undefined"){
await addFood({food, calories:cal, date:today})
}
}catch(e){
console.log("supabase error",e)
}

}

// 📸 AI scan
async function scanFood(){

const file = document.getElementById("foodImage").files[0]

if(!file){
alert("Please upload image")
return
}

const reader = new FileReader()

reader.onload = async function(){

const base64 = reader.result

document.getElementById("aiResult").innerText =
"Analyzing..."

try{

const result = await analyzeFoodImage(base64)

document.getElementById("aiResult").innerText =
result

}catch(e){

document.getElementById("aiResult").innerText =
"AI failed or API not set"

console.log(e)

}

}

reader.readAsDataURL(file)
}

async function analyzeFoodImage(imageBase64){

const res = await fetch("/api/ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
image:imageBase64
})
})

const data = await res.json()

return data.result
}

</script>

</body>
</html>
