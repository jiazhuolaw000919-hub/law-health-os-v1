<h2 style="text-align:center">🍽 Food Log</h2>

<div class="card">

<input id="food" placeholder="e.g. chicken rice" style="padding:10px;width:90%"><br><br>

<button onclick="addFood()"
style="padding:10px 15px;background:#111827;color:white;border:none;border-radius:10px">
Add Food
</button>

</div>

<div class="card" id="log"></div>

<script>

setActive("food")

let total = 0

async function addFood(){

const food = document.getElementById("food").value
if(!food) return

const cal = food.includes("chicken") ? 600 : 300

const today = new Date().toISOString().split("T")[0]

await addFood({
food: food,
calories: cal,
date: today
})

total += cal

document.getElementById("log").innerHTML +=
`<p>🍽 ${food} - ${cal} kcal</p>`

document.getElementById("food").value = ""
}

</script>

</body>
