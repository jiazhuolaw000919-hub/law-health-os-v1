<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v10.7 System (Stable)</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 style="text-align:center">🍽 Food AI v10.7 System</h2>

<!-- ACTIVE PROFILE -->
<div class="card">
<p id="activeProfile">Loading profile...</p>
</div>

<!-- PROFILE SWITCHER -->
<div class="card">

<select id="profileSwitcher" onchange="switchProfileUI()"></select>

<br><br>

<button onclick="goCreateProfile()">➕ Create Profile</button>

<button onclick="deleteActiveProfile()" style="background:red;color:white">
🗑 Delete Active Profile
</button>

</div>

<!-- FOOD INPUT -->
<div class="card">
<input id="foodInput" placeholder="e.g. chicken rice">
<br><br>
<button onclick="addFoodManual()">Add Food</button>
<div id="log"></div>
</div>

<!-- AI SCANNER -->
<div class="card">
<h3>📸 AI Scanner (v10.7)</h3>

<input type="file" id="foodImage">
<br><br>

<button onclick="scanFood()">Analyze Image</button>
<p id="aiResult">Waiting...</p>
</div>

<script>

setActive?.("food")

/* ================= PROFILE CORE ================= */

function getProfiles(){
return JSON.parse(localStorage.getItem("profiles")) || []
}

function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
learning:{
proteinUser:0,
carbUser:0,
junkUser:0,
totalFoods:0
}
}
}

/* ================= INIT ================= */
function ensureProfile(){

let profiles = getProfiles()

if(profiles.length === 0){
const defaultProfile = {
id:"guest",
name:"Guest",
learning:{
proteinUser:0,
carbUser:0,
junkUser:0,
totalFoods:0
}
}

profiles.push(defaultProfile)
localStorage.setItem("profiles", JSON.stringify(profiles))
localStorage.setItem("activeProfile", JSON.stringify(defaultProfile))
}

if(!getActiveProfile()){
localStorage.setItem("activeProfile", JSON.stringify(getProfiles()[0]))
}
}

/* ================= PROFILE UI ================= */

function renderProfile(){
const p = getActiveProfile()
document.getElementById("activeProfile").innerText =
`👤 Active: ${p.name}`
}

function renderSwitcher(){

const select = document.getElementById("profileSwitcher")
if(!select) return

select.innerHTML = ""

getProfiles().forEach(p=>{
const opt = document.createElement("option")
opt.value = p.id
opt.innerText = p.name
select.appendChild(opt)
})

const active = getActiveProfile()
if(active) select.value = active.id
}

/* ================= SWITCH PROFILE ================= */
function switchProfileUI(){

const id = document.getElementById("profileSwitcher").value
const profile = getProfiles().find(p=>p.id===id)

if(profile){
localStorage.setItem("activeProfile", JSON.stringify(profile))
renderProfile()
}
}

/* ================= NAV ================= */
function goCreateProfile(){
window.location.href = "profile.html?mode=create"
}

/* ================= DELETE SAFE ================= */
function deleteActiveProfile(){

let profiles = getProfiles()
let active = getActiveProfile()

if(!active || active.id === "guest") return

profiles = profiles.filter(p => p.id !== active.id)

localStorage.setItem("profiles", JSON.stringify(profiles))

let newActive = profiles[0] || {
id:"guest",
name:"Guest",
learning:{
proteinUser:0,
carbUser:0,
junkUser:0,
totalFoods:0
}
}

localStorage.setItem("activeProfile", JSON.stringify(newActive))

renderProfile()
renderSwitcher()
}

/* ================= AI LEARNING HOOK (STEP 2 FIX) ================= */

function updateLearning(profile, food){

if(!profile.learning){
profile.learning = {
proteinUser:0,
carbUser:0,
junkUser:0,
totalFoods:0
}
}

profile.learning.totalFoods++

if(food.protein > 25) profile.learning.proteinUser++
if(food.carbs > 80) profile.learning.carbUser++
if(food.calories > 800) profile.learning.junkUser++

localStorage.setItem("activeProfile", JSON.stringify(profile))
}

/* ================= INIT ================= */
ensureProfile()
renderProfile()
renderSwitcher()

/* ================= FOOD ENGINE ================= */

function calculateMealScore(food){
let score = 50
if(food.protein > 20) score += 20
if(food.carbs > 80) score -= 10
if(food.fat > 30) score -= 15
if(food.calories > 800) score -= 20
return Math.max(0, Math.min(100, score))
}

function getHealthTag(score){
if(score >= 80) return "GOOD"
if(score >= 50) return "OK"
return "BAD"
}

/* ================= ADD FOOD ================= */

async function addFoodManual(){

const profile = getActiveProfile()
const food = document.getElementById("foodInput").value.trim()
if(!food) return

let cal = 300
if(food.includes("chicken")) cal = 600
if(food.includes("rice")) cal = 500
if(food.includes("milo")) cal = 180

const today = new Date().toISOString().split("T")[0]

document.getElementById("log").innerHTML +=
`<p>👤 ${profile.name} - 🍽 ${food} - ${cal} kcal</p>`

updateLearning(profile, {
calories: cal,
protein: 10,
carbs: 50
})

if(typeof saveFood !== "undefined"){
await saveFood({
userId: profile.id,
food,
calories: cal,
date: today
})
}
}

/* ================= AI SCAN ================= */

async function scanFood(){

const profile = getActiveProfile()
const file = document.getElementById("foodImage").files[0]

if(!file){
alert("Upload image")
return
}

document.getElementById("aiResult").innerText = "Analyzing..."

const reader = new FileReader()

reader.onload = async function(){

try{

const base64 = reader.result

const res = await fetch("/api/ai", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
image: base64,
userId: profile.id
})
})

let data = await res.json()
let raw = data.result || {}

let food = {
food: raw.food || "unknown",
calories: raw.calories || 0,
protein: raw.protein || 0,
carbs: raw.carbs || 0,
fat: raw.fat || 0,
confidence: raw.confidence || 0.5
}

food.score = calculateMealScore(food)
food.healthTag = getHealthTag(food.score)

updateLearning(profile, food)

const today = new Date().toISOString().split("T")[0]

if(typeof saveFood !== "undefined"){
await saveFood({
...food,
userId: profile.id,
date: today
})
}

document.getElementById("aiResult").innerHTML =
`👤 ${profile.name}
🍽 Food: ${food.food}
🔥 Calories: ${food.calories}
💪 Protein: ${food.protein}
🍞 Carbs: ${food.carbs}
🥑 Fat: ${food.fat}

📊 Score: ${food.score}/100
🧠 Status: ${food.healthTag}
🧠 Confidence: ${(food.confidence*100).toFixed(0)}%`

}catch(e){
console.log(e)
document.getElementById("aiResult").innerText =
"AI system fallback"
}

}

reader.readAsDataURL(file)
}

</script>

<!-- SAFE MODULES -->
<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>

</body>
</html>
