<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v16 PRO SYSTEM (AI COMPONENT + FOOD TYPE FIX)</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="ai-engine.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

.modal{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);

align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:12px;
width:340px;
text-align:center;
}

.preview-box{
background:#f9fafb;
padding:10px;
border-radius:8px;
margin-top:10px;
text-align:left;
font-size:14px;
}

button{
margin:5px;
padding:6px 10px;
border-radius:8px;
border:1px solid #ddd;
cursor:pointer;
}

.small-tag{
display:inline-block;
margin:2px;
padding:2px 6px;
background:#e5e7eb;
border-radius:6px;
font-size:12px;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2>🍽 Food AI v16 (SMART FOOD TYPE + COMPONENT DETECTION)</h2>

<div class="card">
<p id="activeProfile">Loading...</p>
</div>

<div class="card">
<h3>📊 Today</h3>
<p id="todayCalories">Calories: --</p>
<p id="deficitInfo">Deficit: --</p>
</div>

<div class="card">
<input id="foodInput" placeholder="e.g. chicken rice / sandwich / coffee / burger">

<br><br>

<button onclick="startManualFlow()">Add Food</button>
<button onclick="openAIUpload()">AI Scan</button>
<button onclick="openBarcode()">Barcode Scan</button>
<button onclick="startMultiCapture()">Multi Capture</button>
</div>

<div class="card">
<h3>AI Result</h3>
<div id="foodList"></div>
</div>

<div id="mealModal" class="modal">
<div class="modal-content">

<h3>Select Meal</h3>

<div id="previewArea"></div>

<button onclick="saveMeal('Breakfast')">Breakfast</button>
<button onclick="saveMeal('Lunch')">Lunch</button>
<button onclick="saveMeal('Dinner')">Dinner</button>
<button onclick="saveMeal('Snack')">Snack</button>

</div>
</div>

<script>

let pendingFood = null
let mode = "normal"
let multiList = []

/* ================= PROFILE ================= */
document.getElementById("activeProfile").innerText =
JSON.parse(localStorage.getItem("activeProfile"))?.name || "Guest"

/* ================= FOOD TYPE DETECTOR (NEW UPGRADE) ================= */
function detectFoodType(text){

text = (text || "").toLowerCase()

if(text.includes("rice") && text.includes("chicken")) return "Chicken Rice"
if(text.includes("mixed rice") || text.includes("cai png")) return "Economy Rice"
if(text.includes("sandwich")) return "Sandwich"
if(text.includes("coffee") || text.includes("kopi")) return "Coffee"
if(text.includes("burger")) return "Burger"
if(text.includes("noodle") || text.includes("mee")) return "Noodles"
if(text.includes("pizza")) return "Pizza"

return "Mixed Meal"
}

/* ================= COMPONENT DETECTION (UPGRADED) ================= */
function extractComponents(text){

text = (text || "").toLowerCase()

let components = []

if(text.includes("rice")) components.push("rice")
if(text.includes("chicken") || text.includes("meat")) components.push("meat")
if(text.includes("egg")) components.push("egg")
if(text.includes("vegetable") || text.includes("veg")) components.push("vegetables")
if(text.includes("fish")) components.push("fish")
if(text.includes("noodle")) components.push("noodles")
if(text.includes("coffee") || text.includes("kopi")) components.push("coffee/milk")

if(components.length === 0){
components = ["mixed ingredients"]
}

return components
}

/* ================= NUTRITION ENGINE ================= */
function estimateNutrition(food){

let base = 400
food = food.toLowerCase()

if(food.includes("chicken")) base += 120
if(food.includes("rice")) base += 120
if(food.includes("milo")) base += 150
if(food.includes("burger")) base += 300
if(food.includes("egg")) base += 80
if(food.includes("coffee")) base += 90
if(food.includes("sandwich")) base += 200

return {
calories: base,
protein: Math.round(base * 0.05),
carbs: Math.round(base * 0.12),
fat: Math.round(base * 0.04)
}
}

/* ================= AI WRAPPER ================= */
async function analyzeImage(base64){

try{

if(window.analyzeFoodImage){

const r = await window.analyzeFoodImage(base64)

return {
food: r?.food || "Unknown meal",
calories: Number(r?.calories ?? 450),
protein: Number(r?.protein ?? 18),
carbs: Number(r?.carbs ?? 55),
fat: Number(r?.fat ?? 12)
}
}

}catch(e){
console.log(e)
}

return {
food:"Unknown meal",
calories:450,
protein:18,
carbs:55,
fat:12
}
}

/* ================= MANUAL FLOW ================= */
function startManualFlow(){

let input = document.getElementById("foodInput").value.trim()
if(!input) return alert("Enter food")

pendingFood = {
food: detectFoodType(input),
raw: input,
components: extractComponents(input),
...estimateNutrition(input)
}

showPreview(pendingFood)
}

/* ================= AI UPLOAD ================= */
async function openAIUpload(){

let input = document.createElement("input")
input.type = "file"
input.accept = "image/*"

input.onchange = async ()=>{

let file = input.files[0]
if(!file) return

let reader = new FileReader()

reader.onload = async ()=>{

let base64 = reader.result

let result = await analyzeImage(base64)

let combinedText = (result.food || "")

pendingFood = {
food: detectFoodType(combinedText),
raw: combinedText,
components: extractComponents(combinedText),
...result,
image: base64
}

showPreview(pendingFood)
}

reader.readAsDataURL(file)
}

input.click()
}

/* ================= BARCODE ================= */
function openBarcode(){

let code = prompt("barcode/name")

let text = code || ""

pendingFood = {
food: detectFoodType(text),
raw: text,
components: extractComponents(text),
calories: 300,
protein: 10,
carbs: 40,
fat: 10
}

showPreview(pendingFood)
}

/* ================= MULTI ================= */
function startMultiCapture(){

multiList = [
{
food:"Chicken Rice",
components:["rice","meat"],
calories:600
},
{
food:"Sandwich",
components:["bread","meat","egg"],
calories:450
},
{
food:"Coffee",
components:["coffee/milk"],
calories:120
}
]

document.getElementById("foodList").innerHTML =
multiList.map(m=>`
<div class="preview-box">
<b>${m.food}</b><br>
${m.components?.map(c=>`<span class="small-tag">${c}</span>`).join(" ")}
<br>${m.calories} kcal
</div>
`).join("")
}

/* ================= PREVIEW ================= */
function showPreview(d){

document.getElementById("previewArea").innerHTML = `
<div class="preview-box">

<b>Food Type:</b> ${d.food}<br>
<b>Raw:</b> ${d.raw || "-"}<br>

<br>

🔥 ${Math.round(d.calories)} kcal<br>
🥩 Protein: ${Math.round(d.protein)}g<br>
🍚 Carbs: ${Math.round(d.carbs)}g<br>
🥑 Fat: ${Math.round(d.fat)}g<br>

<br>

<b>Components:</b><br>
${(d.components || []).map(c=>
`<span class="small-tag">${c}</span>`
).join("")}

</div>
`
}

/* ================= SAVE ================= */
function saveMeal(type){

if(!pendingFood) return

pendingFood.mealType = type

console.log("Saved:", pendingFood)

pendingFood = null

document.getElementById("mealModal").style.display="none"
updateToday()

alert("Saved!")
}

/* ================= MODAL ================= */
function openMealModal(){
document.getElementById("mealModal").style.display="flex"
}

/* ================= TODAY ================= */
function updateToday(){

document.getElementById("todayCalories").innerText =
"Calories: updating..."

}

</script>

</body>
</html>
