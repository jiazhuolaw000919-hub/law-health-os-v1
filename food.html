<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food v8.1</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white;}

.navbar{
  display:flex;
  justify-content:space-around;
  background:#111827;
  padding:12px;
  position:sticky;
  top:0;
}

.navbar a{
  color:white;
  text-decoration:none;
}

.card{
  background:#1f2937;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="index.html">Dashboard</a>
  <a href="food.html">Food</a>
  <a href="workout.html">Workout</a>
  <a href="report.html">Report</a>
</div>

<div class="card">
<h2>🍽 Food Logger</h2>

<input id="food" placeholder="e.g. chicken rice, milo, teh tarik">

<button onclick="addFood()">Add Food</button>

<p id="log"></p>
</div>

<script>
function addFood(){
const food = document.getElementById("food").value
if(!food) return

document.getElementById("log").innerHTML +=
"<p>🍽 " + food + "</p>"

document.getElementById("food").value=""
}
</script>

</body>
</html>
