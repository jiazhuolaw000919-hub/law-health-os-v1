<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v12.3 FULL FIX</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="ai-engine.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

.hidden{display:none !important}

.modal{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:12px;
width:300px;
text-align:center;
}

.meal-btn{
margin:5px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:#f3f4f6;
cursor:pointer;
color:#000;
font-weight:500;
}

.meal-btn:hover{
background:#e5e7eb;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 style="text-align:center">🍽 Food AI v12.3 FULL FIX</h2>

<div class="card">
<p id="activeProfile">Loading profile...</p>
</div>

<div class="card">
<h3>📊 Today Summary</h3>
<p id="todayCalories">Calories: --</p>
<p id="todayProtein">Protein: --</p>
<p id="todayCarbs">Carbs: --</p>
<p id="todayFat">Fat: --</p>
<p id="mealScore">Meal Score: --</p>
<p id="riskSummary">Risk: --</p>
</div>

<div class="card">
<h3>📈 7-Day Summary</h3>
<p id="weekAvg">Avg: --</p>
<p id="weekHigh">High: --</p>
<p id="weekLow">Low: --</p>
</div>

<div class="card">
<input id="foodInput" placeholder="e.g. chicken rice + milo + tomyam">
<br><br>

<button onclick="startManualFlow()">Add Food</button>
<button onclick="openAIUpload()">AI Scan</button>

</div>

<div class="card">
<h3>🍽 AI Result</h3>
<div id="foodList"></div>
</div>

<div id="mealModal" class="modal">
<div class="modal-content">

<h3 style="color:#000">Select Meal Type</h3>

<button class="meal-btn" onclick="saveMeal('Breakfast')">🍳 Breakfast</button>
<button class="meal-btn" onclick="saveMeal('Lunch')">🍱 Lunch</button>
<button class="meal-btn" onclick="saveMeal('Tea Time')">☕ Tea Time</button>
<button class="meal-btn" onclick="saveMeal('Dinner')">🍽 Dinner</button>
<button class="meal-btn" onclick="saveMeal('Supper')">🌙 Supper</button>
<button class="meal-btn" onclick="saveMeal('Snacks')">🍪 Snacks</button>
<button class="meal-btn" onclick="saveMeal('Other')">🧾 Other</button>

</div>
</div>

<script>

let pendingFood = null
let mode = null

function getProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {id:"guest",name:"Guest"}
}

function init(){
document.getElementById("activeProfile").innerText = getProfile().name
}
init()

function calculateToday(){
document.getElementById("todayCalories").innerText="Calories: --"
document.getElementById("todayProtein").innerText="Protein: --"
document.getElementById("todayCarbs").innerText="Carbs: --"
document.getElementById("todayFat").innerText="Fat: --"
document.getElementById("mealScore").innerText="Meal Score: --"
document.getElementById("riskSummary").innerText="Risk: --"
}

function calculateWeek(){
document.getElementById("weekAvg").innerText="Avg: --"
document.getElementById("weekHigh").innerText="High: --"
document.getElementById("weekLow").innerText="Low: --"
}

function startManualFlow(){

const input = document.getElementById("foodInput").value.trim()
if(!input) return alert("Enter food first")

pendingFood = {
food: input,
calories: 2000,
protein: 10,
carbs: 20,
fat: 5,
date: new Date().toISOString().split("T")[0]
}

mode = "manual"

openMealModal()
}

function openAIUpload(){

mode = "ai"

const fileInput = document.createElement("input")
fileInput.type = "file"
fileInput.accept = "image/*"

fileInput.onchange = async () => {

const file = fileInput.files[0]
if(!file) return

const reader = new FileReader()

reader.onload = async () => {

const base64 = reader.result

let result = null

if(typeof window.analyzeFoodImage === "function"){
result = await window.analyzeFoodImage(base64)
}

pendingFood = {
food: result?.food || "AI detected meal",
calories: result?.calories || 500,
protein: result?.protein || 20,
carbs: result?.carbs || 50,
fat: result?.fat || 10,
image: base64,
date: new Date().toISOString().split("T")[0]
}

renderAIResult(pendingFood)
openMealModal()
}

reader.readAsDataURL(file)
}

fileInput.click()
}

function renderAIResult(data){
document.getElementById("foodList").innerHTML = `
<div class="card">
🍜 AI Food Detected<br>
🔥 ${data.calories} kcal
</div>
`
}

function openMealModal(){
document.getElementById("mealModal").style.display="flex"
}

function closeMealModal(){
document.getElementById("mealModal").style.display="none"
}

function saveMeal(type){

if(!pendingFood) return

pendingFood.mealType = type

if(typeof saveFood === "function"){
saveFood(pendingFood)
}

pendingFood = null
mode = null

closeMealModal()

calculateToday()
calculateWeek()

alert("Saved successfully!")
}

</script>

</body>
</html>
