<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v11.8 System (STABLE FIX)</title>
<link rel="stylesheet" href="style.css">
<script src="app.js"></script>
<script src="ai.js"></script>
<script src="ai-engine.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>
<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.row{display:flex;gap:10px;flex-wrap:wrap}
.tag{padding:4px 8px;border-radius:8px;font-size:12px}
.green{background:#dcfce7;color:#166534}
.yellow{background:#fef9c3;color:#854d0e}
.red{background:#fee2e2;color:#991b1b}
.skeleton{
background: linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);
background-size: 200% 100%;
animation: shimmer 1.2s infinite;
border-radius: 8px;
}
@keyframes shimmer {
0% {background-position:-200% 0}
100% {background-position:200% 0}
}
.skeleton-text{height:14px;width:160px;margin:5px 0;}
.skeleton-box{height:18px;width:100%;margin:6px 0;}
.hidden{display:none !important}
</style>
</head>
<body>
<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>
<h2 style="text-align:center">🍽 Food AI v11.8 (Stable FIX)</h2>
<!-- PROFILE -->
<div class="card">
<div id="profileSkeleton" class="skeleton skeleton-text"></div>
<p id="activeProfile" class="hidden">Loading profile...</p>
</div>
<!-- TODAY -->
<div class="card">
<h3>📊 Today Summary</h3>
<div id="todaySkeleton">
<div class="skeleton skeleton-box"></div>
<div class="skeleton skeleton-box"></div>
<div class="skeleton skeleton-box"></div>
<div class="skeleton skeleton-box"></div>
</div>
<p id="todayCalories" class="hidden">Calories: 0 kcal</p>
<p id="todayProtein" class="hidden">Protein: 0 g</p>
<p id="todayCarbs" class="hidden">Carbs: 0 g</p>
<p id="todayFat" class="hidden">Fat: 0 g</p>
<p id="mealScore" class="hidden">Meal Score: --</p>
<p id="riskSummary" class="hidden">Risk: --</p>
<p id="aiAdvice" class="hidden"></p>
<p id="aiInsight" class="hidden"></p>
</div>
<!-- WEEK -->
<div class="card">
<h3>📈 7-Day Summary</h3>
<div id="weekSkeleton">
<div class="skeleton skeleton-box"></div>
<div class="skeleton skeleton-box"></div>
</div>
<p id="weekAvg" class="hidden">Avg: -- kcal</p>
<p id="weekHigh" class="hidden">High: -- kcal</p>
<p id="weekLow" class="hidden">Low: -- kcal</p>
</div>
<!-- INPUT -->
<div class="card">
<input id="foodInput" placeholder="e.g. chicken rice + milo + tomyam">
<br><br>
<button onclick="addFoodManual()">Add Food</button>
</div>
<!-- RESULT -->
<div class="card">
<h3>🍽 AI Food Breakdown</h3>
<div id="foodList"></div>
</div>
<script>
let pendingFood = null
/* ================= SAFE PROFILE ================= */
function getProfileSafe(){
try{
return JSON.parse(localStorage.getItem("activeProfile")) || {id:"guest",name:"Guest"}
}catch(e){
return {id:"guest",name:"Guest"}
}
}
/* ================= SAFE ENGINE WRAPPERS ================= */
function safeGetFoodLogs(date){
try{
if(typeof getFoodLogs === "function"){
return getFoodLogs(date) || []
}
return []
}catch(e){
return []
}
}
function safeSaveFood(data){
try{
if(typeof saveFood === "function"){
return saveFood(data)
}
}catch(e){}
}
/* ================= PROFILE RENDER (FIXED CRASH) ================= */
function renderProfile(){
const el = document.getElementById("activeProfile")
const sk = document.getElementById("profileSkeleton")
const p = getProfileSafe()
if(window.ProfileEngine && typeof ProfileEngine.render === "function"){
ProfileEngine.render("activeProfile")
}else{
if(el) el.innerText = p.name || "Guest"
}
if(sk) sk.classList.add("hidden")
if(el) el.classList.remove("hidden")
}
/* ================= SYNC ================= */
window.addEventListener("profileSyncUpdate", renderProfile)
window.addEventListener("focus", renderProfile)
/* ================= UI HELPERS ================= */
function showSkeleton(id){
document.getElementById(id)?.classList.remove("hidden")
}
function hideSkeleton(id){
document.getElementById(id)?.classList.add("hidden")
}
function reveal(ids){
ids.forEach(id=>{
document.getElementById(id)?.classList.remove("hidden")
})
}
/* ================= TODAY (FIXED STABLE) ================= */
async function calculateToday(){
showSkeleton("todaySkeleton")
const profile = getProfileSafe()
const today = new Date().toISOString().split("T")[0]
let foods = safeGetFoodLogs(today)
foods = foods.filter(f => !f.userId || f.userId === profile.id)
let cal=0,p=0,c=0,f=0
let text=""
foods.forEach(x=>{
cal+=Number(x.calories||0)
p+=Number(x.protein||0)
c+=Number(x.carbs||0)
f+=Number(x.fat||0)
text += (x.food||"") + " "
})
let ai = (typeof getAIInsight === "function")
? getAIInsight(cal,22,[],text)
: null
setText("todayCalories",`Calories: ${cal} kcal`)
setText("todayProtein",`Protein: ${p} g`)
setText("todayCarbs",`Carbs: ${c} g`)
setText("todayFat",`Fat: ${f} g`)
setText("mealScore",`Meal Score: ${ai?.score||0}/100`)
setText("riskSummary",`Risk: ${ai?.risk?.level||"🟢"}`)
setText("aiAdvice","AI Advice: "+(ai?.advice||""))
setText("aiInsight","AI: "+(ai?.foods?.map(f=>f.food).join(", ")||""))
hideSkeleton("todaySkeleton")
reveal([
"todayCalories","todayProtein","todayCarbs","todayFat",
"mealScore","riskSummary","aiAdvice","aiInsight"
])
}
/* ================= WEEK (FIXED SAFE) ================= */
async function calculateWeek(){
showSkeleton("weekSkeleton")
let arr=[]
for(let i=6;i>=0;i--){
let d=new Date()
d.setDate(d.getDate()-i)
let date=d.toISOString().split("T")[0]
let foods = safeGetFoodLogs(date)
let cal=0
foods.forEach(x=>{
cal+=Number(x.calories||0)
})
arr.push(cal)
}
let avg = arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0
let high = arr.length ? Math.max(...arr) : 0
let low = arr.length ? Math.min(...arr) : 0
setText("weekAvg",`Avg: ${avg.toFixed(0)} kcal`)
setText("weekHigh",`High: ${high} kcal`)
setText("weekLow",`Low: ${low} kcal`)
hideSkeleton("weekSkeleton")
reveal(["weekAvg","weekHigh","weekLow"])
}
/* ================= ADD FOOD ================= */
async function addFoodManual(){
const input = document.getElementById("foodInput").value.trim()
if(!input) return
safeSaveFood({
food:input,
calories:2000,
protein:10,
carbs:20,
fat:5,
date:new Date().toISOString().split("T")[0]
})
await calculateToday()
await calculateWeek()
}
/* ================= HELPERS ================= */
function setText(id,text){
const el=document.getElementById(id)
if(el) el.innerText=text
}
/* ================= INIT ================= */
async function init(){
renderProfile()
await calculateToday()
await calculateWeek()
setTimeout(renderProfile,500)
}
init()
</script>
</body>
</html>
