<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🍽 AI Food Analyzer</h1>

<input id="foodInput" placeholder="chicken rice / milo">

<button onclick="addFood()">Analyze</button>

<p id="result"></p>

<script src="supabase.js"></script>
<script src="app.js"></script>

<script>

async function addFood(){

const food = document.getElementById("foodInput").value

const cal = estimate(food)
const advice = ipohAI(food)

document.getElementById("result").innerHTML =
`🔥 Calories: ${cal}<br>🍜 ${advice}`

// SAVE TO SUPABASE
await sbFetch("/rest/v1/food_logs", {
method:"POST",
body: JSON.stringify({
food,
calories: cal
})
})

}

</script>

</body>
</html>
