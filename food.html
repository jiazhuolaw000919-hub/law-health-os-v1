<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food AI v10.6 System (Stable Multi Profile)</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
<script src="ai-vision.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 style="text-align:center">🍽 Food AI v10.6 System</h2>

<!-- ACTIVE PROFILE -->
<div class="card">
<p id="activeProfile">Loading profile...</p>
</div>

<!-- PROFILE CONTROLS -->
<div class="card">

<select id="profileSwitcher" onchange="switchProfile()"></select>

<br><br>

<!-- NEW: CREATE PROFILE BUTTON -->
<button onclick="goCreateProfile()">➕ Create Profile</button>

<!-- NEW: DELETE PROFILE BUTTON -->
<button onclick="deleteProfile()" style="background:red;color:white">
🗑 Delete Profile
</button>

</div>

<!-- FOOD INPUT -->
<div class="card">
<input id="foodInput" placeholder="e.g. chicken rice">
<br><br>
<button onclick="addFoodManual()">Add Food</button>
<div id="log"></div>
</div>

<!-- AI SCANNER -->
<div class="card">
<h3>📸 AI Scanner (v10.6)</h3>

<input type="file" id="foodImage">
<br><br>

<button onclick="scanFood()">Analyze Image</button>
<p id="aiResult">Waiting...</p>
</div>

<script>

setActive?.("food")

/* =========================
PROFILE CORE (v10.6 STABLE)
========================= */

function getProfiles(){
return JSON.parse(localStorage.getItem("profiles")) || []
}

function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || null
}

/* SAFE INIT */
function ensureProfile(){

let profiles = getProfiles()

if(profiles.length === 0){
const defaultProfile = {
id:"guest",
name:"Guest"
}
profiles.push(defaultProfile)
localStorage.setItem("profiles", JSON.stringify(profiles))
localStorage.setItem("activeProfile", JSON.stringify(defaultProfile))
}

if(!getActiveProfile()){
localStorage.setItem("activeProfile", JSON.stringify(getProfiles()[0]))
}
}

function renderProfile(){

const p = getActiveProfile() || {name:"Guest"}

document.getElementById("activeProfile").innerText =
`👤 Active: ${p.name}`
}

/* =========================
PROFILE SWITCHER
========================= */

function renderSwitcher(){

const select = document.getElementById("profileSwitcher")
select.innerHTML = ""

getProfiles().forEach(p=>{
const opt = document.createElement("option")
opt.value = p.id
opt.innerText = p.name
select.appendChild(opt)
})

const active = getActiveProfile()
if(active) select.value = active.id
}

function switchProfile(){

const id = document.getElementById("profileSwitcher").value
const profile = getProfiles().find(p=>p.id===id)

if(profile){
localStorage.setItem("activeProfile", JSON.stringify(profile))
renderProfile()
}
}

/* =========================
NEW v10.6 FEATURE
========================= */

// 跳去创建 profile 页面
function goCreateProfile(){
window.location.href = "profile.html?mode=create"
}

// 删除当前 profile
function deleteProfile(){

let profiles = getProfiles()
const active = getActiveProfile()

if(!active) return

if(active.id === "guest"){
alert("Cannot delete guest profile")
return
}

profiles = profiles.filter(p => p.id !== active.id)

localStorage.setItem("profiles", JSON.stringify(profiles))

const newActive = profiles[0] || {id:"guest", name:"Guest"}
localStorage.setItem("activeProfile", JSON.stringify(newActive))

renderSwitcher()
renderProfile()
}

/* =========================
INIT
========================= */

ensureProfile()
renderProfile()
renderSwitcher()

/* =========================
FOOD ENGINE (UNCHANGED CORE)
========================= */

function calculateMealScore(food){

let score = 50
if(food.protein > 20) score += 20
if(food.carbs > 80) score -= 10
if(food.fat > 30) score -= 15
if(food.calories > 800) score -= 20

return Math.max(0, Math.min(100, score))
}

function getHealthTag(score){
if(score >= 80) return "GOOD"
if(score >= 50) return "OK"
return "BAD"
}

function mockAI(){
return {
food:"unknown meal",
calories:500,
protein:15,
carbs:60,
fat:20,
confidence:0.4
}
}

async function safeFetch(url, options){
try{
const res = await fetch(url, options)
const data = await res.json()
return data || { result: mockAI() }
}catch(e){
return { result: mockAI() }
}
}

/* =========================
ADD FOOD
========================= */

async function addFoodManual(){

const profile = getActiveProfile() || {id:"guest", name:"Guest"}

const food = document.getElementById("foodInput").value.trim()
if(!food) return

let cal = 300
if(food.includes("chicken")) cal = 600
if(food.includes("rice")) cal = 500
if(food.includes("milo")) cal = 180

const today = new Date().toISOString().split("T")[0]

document.getElementById("log").innerHTML +=
`<p>👤 ${profile.name} - 🍽 ${food} - ${cal} kcal</p>`

if(typeof saveFood !== "undefined"){
await saveFood({
userId: profile.id,
food,
calories: cal,
date: today
})
}
}

/* =========================
AI SCAN
========================= */

async function scanFood(){

const profile = getActiveProfile() || {id:"guest", name:"Guest"}

const file = document.getElementById("foodImage").files[0]

if(!file){
alert("Upload image")
return
}

document.getElementById("aiResult").innerText = "Analyzing..."

const reader = new FileReader()

reader.onload = async function(){

try{

const base64 = reader.result

const res = await safeFetch("/api/ai", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
image: base64,
userId: profile.id
})
})

let raw = res?.result || mockAI()

let food = {
food: raw.food || "unknown",
calories: raw.calories || 0,
protein: raw.protein || 0,
carbs: raw.carbs || 0,
fat: raw.fat || 0,
confidence: raw.confidence || 0.5
}

food.score = calculateMealScore(food)
food.healthTag = getHealthTag(food.score)

const today = new Date().toISOString().split("T")[0]

if(typeof saveFood !== "undefined"){
await saveFood({
...food,
userId: profile.id,
date: today
})
}

document.getElementById("aiResult").innerHTML =
`👤 ${profile.name}
🍽 Food: ${food.food}
🔥 Calories: ${food.calories}
💪 Protein: ${food.protein}
🍞 Carbs: ${food.carbs}
🥑 Fat: ${food.fat}

📊 Score: ${food.score}/100
🧠 Status: ${food.healthTag}
🧠 Confidence: ${(food.confidence*100).toFixed(0)}%`

}catch(e){
console.log(e)
document.getElementById("aiResult").innerText =
"AI system fallback triggered"
}

}

reader.readAsDataURL(file)
}

</script>

<!-- SAFE MODULE LOADING -->
<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>

</body>
</html>
