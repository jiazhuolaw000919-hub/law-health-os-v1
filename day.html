<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Day Detail</title>

<script src="supabase.js"></script>

<style>
body{background:#f6f7fb;font-family:Arial;margin:0}
.card{background:white;margin:10px;padding:15px;border-radius:12px}
</style>
</head>

<body>

<h2 style="text-align:center">📅 Day Detail</h2>

<div class="card" id="content"></div>

<script>

const date = new URLSearchParams(location.search).get("date")

async function load(){

const foods = await getFood(date)

let html = ""
let total = 0

foods.forEach(f=>{
html += `<p>${f.meal_type}: ${f.food} - ${f.calories}</p>`
total += f.calories
})

document.getElementById("content").innerHTML =
html + "<hr><b>Total: " + total + " kcal</b>"
}

load()

</script>

</body>
</html>
