<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Day Analysis v11.5 (Phase 7 Upgrade)</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="supabase.js"></script>
<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

.tag{
padding:5px 10px;
border-radius:8px;
font-size:12px;
display:inline-block;
}

.green{background:#dcfce7;color:#166534}
.yellow{background:#fef9c3;color:#854d0e}
.red{background:#fecaca;color:#991b1b}

.section{
margin-top:10px;
padding-top:10px;
border-top:1px solid #eee;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<div class="card">
<button onclick="location.href='calendar.html'">⬅ Back</button>
</div>

<div class="card">
<h2 id="title">Loading...</h2>
<p id="profile">Loading profile...</p>
</div>

<!-- DAILY SUMMARY -->
<div class="card">
<h3>🔥 Daily Macro Summary</h3>

<p id="calories"></p>
<p id="protein"></p>
<p id="carbs"></p>
<p id="fat"></p>

<p id="mealScore"></p>
<p id="risk"></p>
</div>

<!-- AI FUTURE (NEW PHASE 7) -->
<div class="card">
<h3>🤖 AI Insights (Phase 7)</h3>

<p id="aiAdvice"></p>
<p id="tomorrowFood"></p>
<p id="streak"></p>
</div>

<!-- MEALS -->
<div class="card">
<h3>🍱 Meal Breakdown</h3>
<div id="meals"></div>
</div>

<!-- AI -->
<div class="card">
<h3>🧠 AI Analysis</h3>
<p id="ai"></p>
<p id="aiScore"></p>
</div>

<script>

const params = new URLSearchParams(location.search)
const date = params.get("date")

/* ================= PROFILE ================= */
function getProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
height:170,
weight:70
}
}

/* ================= SAFE LOGS ================= */
async function safeFoodLogs(date){
if(typeof getFoodLogs === "undefined") return []
const p = getProfile()
const logs = await getFoodLogs(date) || []
return logs.filter(f => !f.userId || f.userId === p.id)
}

/* ================= DAILY GLOBAL ================= */
async function getDailyMacro(date){

const foods = await safeFoodLogs(date)

let calories = 0
let protein = 0
let carbs = 0
let fat = 0

foods.forEach(f=>{
calories += Number(f.calories || 0)
protein += Number(f.protein || 0)
carbs += Number(f.carbs || 0)
fat += Number(f.fat || 0)
})

let ai = (typeof getAIInsight !== "undefined")
? getAIInsight(calories, 22)
: {score:0, mealScore:0, risk:{level:"🟢"}}

return {
calories,
protein,
carbs,
fat,
score: ai.score,
mealScore: ai.mealScore || 0,
risk: ai.risk.level
}
}

/* ================= 7 DAY LOOKBACK (PHASE 7 CORE) ================= */
async function get7DayTrend(){

let trend = []

for(let i=6;i>=0;i--){

let d = new Date()
d.setDate(d.getDate()-i)
let date = d.toISOString().split("T")[0]

let logs = await safeFoodLogs(date)

let cal=0,p=0,c=0,f=0

logs.forEach(x=>{
cal+=Number(x.calories||0)
p+=Number(x.protein||0)
c+=Number(x.carbs||0)
f+=Number(x.fat||0)
})

trend.push({date,cal,p,c,f})
}

return trend
}

/* ================= SIMPLE STREAK DETECTION ================= */
function detectStreak(trend){

let streak = 0

for(let i=trend.length-1;i>=0;i--){
if(trend[i].cal > 2500){
streak++
}else{
break
}
}

return streak
}

/* ================= AI FOOD RECOMMENDATION ================= */
function recommendFood(today){

if(today.calories > 2600){
return "🍽 Tomorrow: Eat light → salad, eggs, soup, low carbs"
}

if(today.protein < 50){
return "🍗 Tomorrow: Add protein → chicken, fish, eggs"
}

if(today.carbs > 250){
return "🍚 Tomorrow: Reduce carbs → avoid rice/noodles"
}

return "🥗 Tomorrow: Balanced diet recommended"
}

/* ================= LOAD ================= */
async function load(){

const profile = getProfile()

document.getElementById("profile").innerText =
`👤 ${profile.name}`

document.getElementById("title").innerText =
`📅 ${date}`

const today = await getDailyMacro(date)

if(today.calories === 0){
document.getElementById("meals").innerHTML = "No data"
return
}

/* ================= UI ================= */
document.getElementById("calories").innerText =
`Calories: ${today.calories} kcal`

document.getElementById("protein").innerText =
`Protein: ${today.protein} g`

document.getElementById("carbs").innerText =
`Carbs: ${today.carbs} g`

document.getElementById("fat").innerText =
`Fat: ${today.fat} g`

document.getElementById("mealScore").innerText =
`Meal Score: ${today.mealScore}/100`

document.getElementById("risk").innerHTML =
`<span class="tag ${
today.risk==="HIGH"?"red":
today.risk==="MEDIUM"?"yellow":"green"
}">
${today.risk}
</span>`

/* ================= TREND + AI LAYER ================= */
let trend = await get7DayTrend()

let streak = detectStreak(trend)

document.getElementById("streak").innerText =
`⚠ Unhealthy streak: ${streak} days over limit`

document.getElementById("tomorrowFood").innerText =
recommendFood(today)

document.getElementById("aiAdvice").innerText =
today.risk==="HIGH"
?"Reduce carbs + increase activity"
:today.risk==="MEDIUM"
?"Balance meals tomorrow"
:"Maintain current diet"

/* ================= MEALS ================= */
const foods = await safeFoodLogs(date)

let grouped = {Breakfast:[],Lunch:[],Dinner:[],Snack:[]}

foods.forEach(f=>{
let cat =
(f.food||"").toLowerCase().includes("egg") ? "Breakfast"
: (f.food||"").toLowerCase().includes("rice") ? "Lunch"
: (f.food||"").toLowerCase().includes("snack") ? "Snack"
: "Dinner"

grouped[cat].push(f)
})

let html=""

Object.keys(grouped).forEach(k=>{
if(grouped[k].length===0) return

let sum=grouped[k].reduce((s,f)=>s+Number(f.calories||0),0)

html+=`
<div class="section">
<h4>${k} (${sum} kcal)</h4>
`

grouped[k].forEach(f=>{
html+=`<p>🍽 ${f.food} - ${f.calories}</p>`
})

html+="</div>"
})

document.getElementById("meals").innerHTML=html

/* ================= AI SUMMARY ================= */
document.getElementById("ai").innerText =
today.risk==="HIGH"
?"High intake detected. Risk increasing."
:today.risk==="MEDIUM"
?"Moderate intake detected."
:"Healthy balance"

document.getElementById("aiScore").innerText =
`Score: ${today.score}/100`
}

load()

</script>

</body>
</html>
