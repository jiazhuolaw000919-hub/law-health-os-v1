<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Day Analysis v11.5 (Phase 6 Sync FIXED)</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="supabase.js"></script>
<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

.tag{
padding:5px 10px;
border-radius:8px;
font-size:12px;
display:inline-block;
}

.green{background:#dcfce7;color:#166534}
.yellow{background:#fef9c3;color:#854d0e}
.red{background:#fecaca;color:#991b1b}

.section{
margin-top:10px;
padding-top:10px;
border-top:1px solid #eee;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<!-- BACK -->
<div class="card">
<button onclick="location.href='calendar.html'">⬅ Back</button>
</div>

<!-- HEADER -->
<div class="card">
<h2 id="title">Loading...</h2>
<p id="profile">Loading profile...</p>
</div>

<!-- SUMMARY (PHASE 6 GLOBAL SYNC) -->
<div class="card">
<h3>🔥 Daily Macro Summary</h3>

<p id="calories">Calories: 0 kcal</p>
<p id="protein">Protein: 0 g</p>
<p id="carbs">Carbs: 0 g</p>
<p id="fat">Fat: 0 g</p>

<p id="mealScore">Meal Score: --</p>
<p id="risk"></p>
</div>

<!-- MEALS -->
<div class="card">
<h3>🍱 Meal Breakdown</h3>
<div id="meals"></div>
</div>

<!-- AI -->
<div class="card">
<h3>🧠 AI Analysis</h3>
<p id="ai"></p>
<p id="aiScore"></p>
</div>

<script>

const params = new URLSearchParams(location.search)
const date = params.get("date")

/* ================= PROFILE ================= */
function getProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
height:170,
weight:70
}
}

/* ================= SAFE LOGS ================= */
async function safeFoodLogs(date){
if(typeof getFoodLogs === "undefined") return []
const p = getProfile()
const logs = await getFoodLogs(date) || []
return logs.filter(f => !f.userId || f.userId === p.id)
}

/* ================= DAILY GLOBAL SYNC ================= */
async function getDailyMacro(date){

const foods = await safeFoodLogs(date)

let calories = 0
let protein = 0
let carbs = 0
let fat = 0

foods.forEach(f=>{
calories += Number(f.calories || 0)
protein += Number(f.protein || 0)
carbs += Number(f.carbs || 0)
fat += Number(f.fat || 0)
})

let ai = (typeof getAIInsight !== "undefined")
? getAIInsight(calories, 22)
: {score:0, mealScore:0, risk:{level:"🟢"}}

return {
calories,
protein,
carbs,
fat,
score: ai.score,
mealScore: ai.mealScore || 0,
risk: ai.risk.level
}
}

/* ================= LOAD ================= */
async function load(){

const profile = getProfile()

document.getElementById("profile").innerText =
`👤 ${profile.name}`

document.getElementById("title").innerText =
`📅 ${date}`

const data = await getDailyMacro(date)

if(data.calories === 0){

document.getElementById("meals").innerHTML = "No data"
document.getElementById("ai").innerText = "No analysis"
return
}

/* ================= UI MACROS ================= */
document.getElementById("calories").innerText =
`Calories: ${data.calories} kcal`

document.getElementById("protein").innerText =
`Protein: ${data.protein} g`

document.getElementById("carbs").innerText =
`Carbs: ${data.carbs} g`

document.getElementById("fat").innerText =
`Fat: ${data.fat} g`

document.getElementById("mealScore").innerText =
`Meal Score: ${data.mealScore}/100`

document.getElementById("risk").innerHTML =
`<span class="tag ${
data.risk==="HIGH"?"red":
data.risk==="MEDIUM"?"yellow":"green"
}">
${data.risk}
</span>`

/* ================= GROUP FOOD ================= */
const foods = await safeFoodLogs(date)

let grouped = {
Breakfast:[],
Lunch:[],
Dinner:[],
Snack:[]
}

foods.forEach(f=>{
let cat =
(f.food||"").toLowerCase().includes("egg") ? "Breakfast"
: (f.food||"").toLowerCase().includes("rice") ? "Lunch"
: (f.food||"").toLowerCase().includes("snack") ? "Snack"
: "Dinner"

grouped[cat].push(f)
})

let html = ""

Object.keys(grouped).forEach(k=>{
if(grouped[k].length === 0) return

let sum = grouped[k].reduce((s,f)=>s+Number(f.calories||0),0)

html += `
<div class="section">
<h4>${k} (${sum} kcal)</h4>
`

grouped[k].forEach(f=>{
html += `<p>🍽 ${f.food} - ${f.calories} kcal</p>`
})

html += `</div>`
})

document.getElementById("meals").innerHTML = html

/* ================= AI ANALYSIS ================= */
document.getElementById("ai").innerText =
data.risk==="HIGH"
?"High intake detected. Reduce carbs and processed food."
:data.risk==="MEDIUM"
?"Moderate intake. Maintain balance."
:"Healthy balance maintained."

document.getElementById("aiScore").innerText =
`Daily Health Score: ${data.score}/100`
}

load()

</script>

</body>
</html>
