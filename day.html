<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Day</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="supabase.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
</div>

<div class="card center">
<button onclick="location.href='calendar.html'">
⬅ Back
</button>
</div>

<div class="card" id="box">Loading...</div>

<script>

setActive("calendar")

const params = new URLSearchParams(location.search)
const date = params.get("date")

const box = document.getElementById("box")

async function load(){

if(!date){
box.innerHTML="No date"
return
}

let foods = []

try{
foods = await getFoodLogs(date)
}catch(e){
foods = []
}

if(!foods.length){
box.innerHTML = `<h3>${date}</h3><p>No data</p>`
return
}

let total = 0
let html = `<h3>${date}</h3>`

foods.forEach(f=>{
html += `<p>🍽 ${f.food} - ${f.calories}</p>`
total += Number(f.calories||0)
})

html += `<hr><b>Total: ${total}</b>`

box.innerHTML = html
}

load()

</script>

</body>
</html>
