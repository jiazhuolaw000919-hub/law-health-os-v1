<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Day Detail</title>

<script src="supabase.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white;}
.card{background:#1f2937;margin:10px;padding:15px;border-radius:12px;}
</style>
</head>

<body>

<h2 style="text-align:center;">📅 Day Detail</h2>

<div class="card" id="food"></div>
<div class="card" id="exercise"></div>

<script>

const date=new URLSearchParams(location.search).get("date")

async function load(){

const foods=await getFoodByDate(date)

let fhtml=""
let total=0

foods.forEach(f=>{
fhtml+=`<p>${f.meal_type}: ${f.food} - ${f.calories}</p>`
total+=f.calories
})

document.getElementById("food").innerHTML=
"<h3>🍽 Food</h3>"+fhtml+
"<p>Total: "+total+" kcal</p>"

}

load()

</script>

</body>
</html>
