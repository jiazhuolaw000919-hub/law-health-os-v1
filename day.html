<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Day Detail</title>

<script src="supabase.js"></script>

<style>
body{font-family:Arial;background:#0b0f19;color:white}
.card{background:#1f2937;margin:10px;padding:15px;border-radius:10px}
</style>
</head>

<body>

<h2 style="text-align:center">📅 Day Detail</h2>

<div class="card" id="content"></div>

<script>

const date = new URLSearchParams(location.search).get("date")

async function load(){

const foods = await getFood(date)

let total = 0
let html = ""

foods.forEach(f=>{
html += `<p>${f.meal_type}: ${f.food} - ${f.calories}</p>`
total += f.calories
})

document.getElementById("content").innerHTML =
html + "<hr>Total: " + total + " kcal"
}

load()

</script>

</body>
</html>
