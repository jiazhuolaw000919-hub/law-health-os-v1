<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Day Detail</title>

<link rel="stylesheet" href="style.css">
<script src="supabase.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Dashboard</a>
<a href="calendar.html">Calendar</a>
</div>

<div class="card" id="content"></div>

<script>

const date = new URLSearchParams(location.search).get("date")

async function load(){

const foods = await getFood(date)

if(!foods){
document.getElementById("content").innerHTML =
"⚠️ No data"
return
}

let html = ""
let total = 0

foods.forEach(f=>{
html += `<p>${f.meal_type}: ${f.food} - ${f.calories}</p>`
total += f.calories || 0
})

document.getElementById("content").innerHTML =
html + "<hr><b>Total: " + total + " kcal</b>"
}

load()

</script>

</body>
</html>
