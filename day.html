<h2 style="text-align:center">📅 Day Detail</h2>

<button onclick="history.back()"
style="margin:10px;padding:10px;background:#111827;color:white;border:none;border-radius:10px">
⬅ Back
</button>

<div class="card" id="content"></div>

<script>

const date = new URLSearchParams(location.search).get("date")

async function load(){

const foods = await getFood(date)

let html = ""
let total = 0

foods.forEach(f=>{
html += `<p>🍽 ${f.food} - ${f.calories} kcal</p>`
total += f.calories || 0
})

document.getElementById("content").innerHTML =
html + `<hr><b>Total: ${total} kcal</b>`
}

load()

</script>
