<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Day Analysis v11.1</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="supabase.js"></script>
<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

.tag{
padding:5px 10px;
border-radius:8px;
font-size:12px;
display:inline-block;
}

.green{background:#dcfce7;color:#166534}
.yellow{background:#fef9c3;color:#854d0e}
.red{background:#fecaca;color:#991b1b}

.section{
margin-top:10px;
padding-top:10px;
border-top:1px solid #eee;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<!-- BACK -->
<div class="card">
<button onclick="location.href='calendar.html'">⬅ Back</button>
</div>

<!-- HEADER -->
<div class="card">
<h2 id="title">Loading...</h2>
<p id="profile">Loading profile...</p>
</div>

<!-- SUMMARY -->
<div class="card">
<h3>🔥 Daily Summary</h3>
<p id="total">0 kcal</p>
<p id="risk"></p>
</div>

<!-- MEALS -->
<div class="card">
<h3>🍱 Meal Breakdown</h3>
<div id="meals"></div>
</div>

<!-- AI -->
<div class="card">
<h3>🧠 AI Analysis</h3>
<p id="ai"></p>
<p id="aiScore"></p>
</div>

<script>

const params = new URLSearchParams(location.search)
const date = params.get("date")

/* ================= PROFILE ================= */
function getProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
height:170,
weight:70
}
}

/* ================= RISK ENGINE ================= */
function getRisk(total,bmi){

let score = 100

if(total > 2800) score -= 40
else if(total > 2400) score -= 25
else if(total > 2000) score -= 10

if(bmi > 28) score -= 20

if(score >= 80) return {text:"🟢 LOW",cls:"green",score}
if(score >= 60) return {text:"🟡 MEDIUM",cls:"yellow",score}
return {text:"🔴 HIGH",cls:"red",score}
}

/* ================= MEAL CLASSIFY ================= */
function classify(food){

food = (food || "").toLowerCase()

if(food.includes("egg") || food.includes("bread")) return "Breakfast"
if(food.includes("rice") || food.includes("chicken") || food.includes("noodle")) return "Lunch"
if(food.includes("snack") || food.includes("chips")) return "Snack"

return "Dinner"
}

/* ================= LOAD ================= */
async function load(){

const profile = getProfile()

document.getElementById("profile").innerText =
`👤 ${profile.name}`

document.getElementById("title").innerText =
`📅 ${date}`

let foods = []

try{
foods = await getFoodLogs(date) || []
}catch(e){
foods = []
}

foods = foods.filter(f =>
!f.userId || f.userId === profile.id
)

if(!foods.length){
document.getElementById("meals").innerHTML = "No data"
document.getElementById("ai").innerText = "No analysis"
return
}

let total = 0

let grouped = {
Breakfast:[],
Lunch:[],
Dinner:[],
Snack:[]
}

foods.forEach(f=>{
total += Number(f.calories || 0)
grouped[classify(f.food)].push(f)
})

let bmi = profile.weight / ((profile.height/100)*(profile.height/100))
bmi = bmi.toFixed(1)

let risk = getRisk(total,bmi)

/* TOTAL */
document.getElementById("total").innerText =
`${total} kcal`

document.getElementById("risk").innerHTML =
`<span class="tag ${risk.cls}">
${risk.text} | Score ${risk.score}
</span>`

/* MEALS */
let html = ""

Object.keys(grouped).forEach(k=>{
if(grouped[k].length === 0) return

let sum = grouped[k].reduce((s,f)=>s+Number(f.calories||0),0)

html += `
<div class="section">
<h4>${k} (${sum} kcal)</h4>
`

grouped[k].forEach(f=>{
html += `<p>🍽 ${f.food} - ${f.calories} kcal</p>`
})

html += `</div>`
})

document.getElementById("meals").innerHTML = html

/* AI ANALYSIS */
let ai = ""

if(total > 2800){
ai = "Severe overconsumption detected. High risk for fat storage."
}
else if(total > 2400){
ai = "Above optimal intake. Reduce carbs and processed food."
}
else if(total > 2000){
ai = "Slightly high intake. Maintain balance with activity."
}
else{
ai = "Healthy intake. Good energy balance maintained."
}

document.getElementById("ai").innerText = ai
document.getElementById("aiScore").innerText =
`Daily Health Score: ${risk.score}/100`
}

load()

</script>

</body>
</html>
