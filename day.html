<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Day Detail</title>

<link rel="stylesheet" href="style.css">

<script src="supabase.js"></script>
<script src="app.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
</div>

<h2 class="center">📅 Day Detail</h2>

<div class="card" id="box">Loading...</div>

<script>

setActive("calendar")

const params = new URLSearchParams(window.location.search)
const date = params.get("date")

const box = document.getElementById("box")

if(!date){
box.innerHTML = "⚠️ No date selected"
throw new Error("no date")
}

async function load(){

let foods = []

try{
foods = await getFoodLogs(date)
}catch(e){
foods = []
}

if(!foods.length){
box.innerHTML = `<h3>${date}</h3><p>No data</p>`
return
}

let total = 0
let html = `<h3>${date}</h3>`

foods.forEach(f=>{
html += `<p>🍽 ${f.food} - ${f.calories} kcal</p>`
total += Number(f.calories || 0)
})

html += `<hr><b>Total: ${total} kcal</b>`

box.innerHTML = html
}

load()

</script>

</body>
</html>
