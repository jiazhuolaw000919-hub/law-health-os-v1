<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calendar v9.1</title>

<script src="supabase.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white;}

.navbar{
display:flex;
justify-content:space-around;
background:#111827;
padding:12px;
position:sticky;
top:0;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:10px;
}

.day{
background:#1f2937;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
font-size:12px;
}

.high{background:#ef4444;}
.mid{background:#f59e0b;}
.low{background:#22c55e;}
</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Dashboard</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="report.html">Calendar</a>
</div>

<h2 style="text-align:center;">📅 Real Calendar</h2>

<div class="calendar" id="calendar"></div>

<script>

function getDates(){

const arr=[]

for(let i=0;i<30;i++){
const d=new Date()
d.setDate(d.getDate()-i)
arr.push(d.toISOString().split("T")[0])
}

return arr
}

async function getCalories(date){

const foods = await getFoodsByDate(date)

let total = 0

foods.forEach(f=>{
total += f.calories
})

return total
}

function color(cal){

if(cal>2000) return "high"
if(cal>1200) return "mid"
return "low"
}

async function render(){

const calEl = document.getElementById("calendar")

for(const date of getDates()){

const cal = await getCalories(date)

const div=document.createElement("div")

div.className="day "+color(cal)

div.innerHTML = date+"<br>"+cal+" kcal"

div.onclick=()=>{
window.location.href="day.html?date="+date
}

calEl.appendChild(div)
}

}

render()

</script>

</body>
</html>
