<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Report v11.4</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>

<!-- PDF library -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
</div>

<h2 class="center">📊 AI Health Report</h2>

<!-- DAILY CALORIES -->
<div class="card">
<h3>🔥 Today Calories</h3>
<p id="dailyCalories">Loading...</p>
</div>

<!-- AI SUMMARY -->
<div class="card">
<h3>🧠 AI Summary</h3>
<p id="summary">Loading...</p>
</div>

<!-- INSIGHT -->
<div class="card">
<h3>💡 Weekly Insight</h3>
<p id="advice">Loading...</p>
</div>

<!-- EXPORT -->
<div class="card">
<h3>📄 Export Report</h3>
<button onclick="exportPDF()">Generate PDF</button>
</div>

<div class="bottom-nav">
<a href="index.html">🏠</a>
<a href="calendar.html">📅</a>
<a href="food.html">🍽</a>
<a href="workout.html">🏋️</a>
<a href="shopping.html">🛒</a>
<a href="report.html">📄</a>
</div>

<script>

// safe setActive
if(typeof setActive !== "undefined"){
setActive("report")
}

// =====================
// LOAD REPORT DATA
// =====================
async function loadReport(){

const today = new Date().toISOString().split("T")[0]

let foods = []

if(typeof getFoodLogs !== "undefined"){
foods = await getFoodLogs(today) || []
}

let totalCalories = 0
foods.forEach(f=>{
totalCalories += Number(f.calories || 0)
})

document.getElementById("dailyCalories").innerText =
totalCalories + " kcal"

// AI fallback
let score = typeof calculateHealthScore === "function"
? calculateHealthScore(totalCalories, 300)
: 0

document.getElementById("summary").innerText =
"Health Score: " + score

document.getElementById("advice").innerText =
typeof workoutSuggestion === "function"
? workoutSuggestion(totalCalories)
: "No suggestion available"
}

loadReport()

// =====================
// PDF EXPORT
// =====================
function exportPDF(){

const { jsPDF } = window.jspdf
const doc = new jsPDF()

doc.setFontSize(16)
doc.text("Health Report", 10, 10)

doc.setFontSize(12)
doc.text("Today's Calories: Loading...", 10, 20)
doc.text("AI Report generated from Health OS", 10, 30)

doc.save("report.pdf")
}

</script>

</body>
</html>
