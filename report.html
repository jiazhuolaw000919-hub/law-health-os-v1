<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Report v10 Stable</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📊 AI Health Report v10</h2>

<!-- ACTIVE PROFILE -->
<div class="card">
<p id="activeProfile">Loading profile...</p>
</div>

<!-- TODAY CALORIES -->
<div class="card">
<h3>🔥 Today Calories</h3>
<p id="dailyCalories">Loading...</p>
</div>

<!-- AI SUMMARY -->
<div class="card">
<h3>🧠 AI Summary</h3>
<p id="summary">Loading...</p>
</div>

<!-- INSIGHT -->
<div class="card">
<h3>💡 Weekly Insight</h3>
<p id="advice">Loading...</p>
</div>

<!-- EXPORT -->
<div class="card">
<h3>📄 Export Report</h3>
<button onclick="exportPDF()">Generate PDF</button>
</div>

<script>

// =========================
// MULTI PROFILE SYSTEM
// =========================

function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest"
}
}

function renderProfile(){
const p = getActiveProfile()
document.getElementById("activeProfile").innerText =
`👤 Active Profile: ${p.name}`
}

renderProfile()

// =========================
// SAFE DATA FUNCTIONS
// =========================

async function safeGetLogs(date){

try{
if(typeof getFoodLogs !== "undefined"){
return await getFoodLogs(date) || []
}
return []
}catch(e){
return []
}
}

// =========================
// LOAD REPORT
// =========================

async function loadReport(){

const profile = getActiveProfile()
const today = new Date().toISOString().split("T")[0]

let foods = await safeGetLogs(today)

// filter by user (IMPORTANT FOR MULTI PROFILE)
foods = foods.filter(f =>
!f.userId || f.userId === profile.id
)

let totalCalories = 0

foods.forEach(f=>{
totalCalories += Number(f.calories || 0)
})

document.getElementById("dailyCalories").innerText =
totalCalories + " kcal"

// =========================
// SAFE SCORE ENGINE
// =========================

let score = 0

if(typeof calculateHealthScore === "function"){
score = calculateHealthScore(totalCalories, 300)
}else{
score = Math.max(0, 100 - totalCalories/50)
}

document.getElementById("summary").innerText =
`Health Score: ${score}`

// =========================
// SAFE AI ADVICE
// =========================

let advice = "No suggestion available"

if(typeof workoutSuggestion === "function"){
advice = workoutSuggestion(totalCalories)
}else{
if(totalCalories > 2500) advice = "Reduce carbs + light walk"
else if(totalCalories > 1800) advice = "Balanced day"
else advice = "Eat more protein"
}

document.getElementById("advice").innerText = advice
}

loadReport()

// =========================
// PDF EXPORT (FIXED)
// =========================

function exportPDF(){

const { jsPDF } = window.jspdf
const doc = new jsPDF()

const profile = getActiveProfile()

const calories = document.getElementById("dailyCalories").innerText
const score = document.getElementById("summary").innerText
const advice = document.getElementById("advice").innerText

doc.setFontSize(16)
doc.text("AI Health Report", 10, 10)

doc.setFontSize(12)
doc.text(`Profile: ${profile.name}`, 10, 25)
doc.text(`Calories: ${calories}`, 10, 35)
doc.text(score, 10, 45)
doc.text(advice, 10, 55)

doc.save("report.pdf")
}

</script>

</body>
</html>
