<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Report v10.7 AI Advanced</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📊 AI Health Report v10.7</h2>

<!-- PROFILE -->
<div class="card">
<p id="activeProfile">Loading profile...</p>
</div>

<!-- CALORIES -->
<div class="card">
<h3>🔥 Today Calories</h3>
<p id="dailyCalories">Loading...</p>
</div>

<!-- SUMMARY -->
<div class="card">
<h3>🧠 AI Weekly Summary</h3>
<p id="summary">Loading...</p>
</div>

<!-- RISK -->
<div class="card">
<h3>⚠ Risk Analysis</h3>
<p id="risk">Loading...</p>
</div>

<!-- PROFILE COMPARE -->
<div class="card">
<h3>👤 Profile Comparison</h3>
<p id="compare">Loading...</p>
</div>

<!-- CHART -->
<div class="card">
<h3>📊 Chart Preview</h3>
<canvas id="chart" width="300" height="120"></canvas>
</div>

<!-- EXPORT -->
<div class="card">
<h3>📄 Export AI PDF 2.0</h3>
<button onclick="exportPDF()">Generate PDF</button>
</div>

<script>

/* ================= PROFILE ================= */
function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest",
height:170,
weight:70
}
}

/* ================= SAFE LOG ================= */
async function safeGetLogs(date){
try{
if(typeof getFoodLogs === "undefined") return []
const logs = await getFoodLogs(date)
return Array.isArray(logs) ? logs : []
}catch(e){
return []
}
}

/* ================= WEEK CALC ================= */
async function getWeeklyCalories(){

let total = 0
let days = 7

for(let i=0;i<7;i++){
let d = new Date()
d.setDate(d.getDate()-i)
let date = d.toISOString().split("T")[0]

let foods = await safeGetLogs(date)

const profile = getActiveProfile()

foods = foods.filter(f =>
!f.userId || f.userId === profile.id
)

foods.forEach(f=>{
total += Number(f.calories || 0)
})
}

return total / days
}

/* ================= RISK ENGINE ================= */
function getRisk(cal,bmi){

if(cal > 2500 && bmi > 28) return "🔴 HIGH RISK"
if(cal > 2200) return "🟠 MEDIUM RISK"
if(bmi > 28) return "🟡 WEIGHT WARNING"
return "🟢 LOW RISK"
}

/* ================= CHART ================= */
function drawChart(calories,bmi){

const c = document.getElementById("chart")
const ctx = c.getContext("2d")

ctx.clearRect(0,0,300,120)

ctx.fillStyle = "#f3f4f6"
ctx.fillRect(0,0,300,120)

// calories bar
ctx.fillStyle = "#60a5fa"
ctx.fillRect(20,70, calories/10, 20)

// bmi bar
ctx.fillStyle = "#34d399"
ctx.fillRect(20,40, bmi*5, 15)

ctx.fillStyle = "#111"
ctx.fillText("Calories",20,30)
ctx.fillText("BMI",20,100)
}

/* ================= LOAD ================= */
async function loadReport(){

const profile = getActiveProfile()

document.getElementById("activeProfile").innerText =
`👤 ${profile.name}`

/* TODAY */
let today = new Date().toISOString().split("T")[0]

let foods = await safeGetLogs(today)

foods = foods.filter(f =>
!f.userId || f.userId === profile.id
)

let calories = foods.reduce((s,f)=>
s + Number(f.calories || 0), 0)

/* BMI */
let bmi = (profile.weight / ((profile.height/100)*(profile.height/100))).toFixed(1)

/* WEEK AVG */
let weekly = await getWeeklyCalories()

/* SUMMARY */
document.getElementById("dailyCalories").innerText =
`${calories} kcal`

document.getElementById("summary").innerText =
`Weekly Avg: ${weekly.toFixed(0)} kcal`

/* RISK */
document.getElementById("risk").innerText =
getRisk(calories,bmi)

/* COMPARE */
let baseline = 2000
document.getElementById("compare").innerText =
`You: ${calories} kcal | Baseline: ${baseline} kcal | Diff: ${calories-baseline}`

/* CHART */
drawChart(calories,bmi)
}

/* ================= PDF EXPORT 2.0 ================= */
function exportPDF(){

const { jsPDF } = window.jspdf
const doc = new jsPDF()

const profile = getActiveProfile()

const calories = document.getElementById("dailyCalories").innerText
const summary = document.getElementById("summary").innerText
const risk = document.getElementById("risk").innerText
const compare = document.getElementById("compare").innerText

doc.setFontSize(16)
doc.text("AI Health Report v10.7",10,10)

doc.setFontSize(12)
doc.text(`Profile: ${profile.name}`,10,25)
doc.text(calories,10,35)
doc.text(summary,10,45)
doc.text(risk,10,55)
doc.text(compare,10,65)

doc.save("report-v10.7.pdf")
}

loadReport()

</script>

</body>
</html>
