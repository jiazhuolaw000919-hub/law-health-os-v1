<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Health Calendar v8.3</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f19;
color:white;
}

.navbar{
display:flex;
justify-content:space-around;
background:#111827;
padding:12px;
position:sticky;
top:0;
}

.navbar a{
color:white;
text-decoration:none;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
padding:10px;
}

.day{
background:#1f2937;
padding:10px;
border-radius:10px;
min-height:60px;
font-size:12px;
}

.high{background:#ef4444;}
.mid{background:#f59e0b;}
.low{background:#22c55e;}
</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Dashboard</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="report.html">Calendar</a>
</div>

<h2 style="text-align:center;">📅 Calorie Calendar</h2>

<div class="calendar" id="calendar"></div>

<script>

const SUPABASE_URL = "https://jwcgamxkwzrjnepxrvzr.supabase.co"
const SUPABASE_KEY = "PASTE_YOUR_KEY"

async function loadData(){

const res = await fetch(
SUPABASE_URL + "/rest/v1/food_logs?select=*",
{
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY
}
}
)

return await res.json()
}

function groupByDate(data){

const map = {}

data.forEach(item=>{

const date = item.date || "unknown"

if(!map[date]) map[date] = 0

map[date] += item.calories

})

return map
}

function getColor(cal){

if(cal > 2000) return "high"
if(cal > 1200) return "mid"
return "low"
}

async function render(){

const data = await loadData()

const grouped = groupByDate(data)

const calendar = document.getElementById("calendar")

// 最近30天
for(let i=0;i<30;i++){

const d = new Date()
d.setDate(d.getDate()-i)

const key = d.toISOString().split("T")[0]

const cal = grouped[key] || 0

const div = document.createElement("div")
div.className = "day " + getColor(cal)

div.innerHTML =
"<b>" + key + "</b><br>" +
cal + " kcal"

calendar.appendChild(div)

}

}

render()

</script>

</body>
</html>
