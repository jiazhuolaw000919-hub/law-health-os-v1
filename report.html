<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Report v9 (Multi-Profile Sync)</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📊 AI Health Report (v9 Multi-Profile)</h2>

<!-- PROFILE -->
<div class="card">
<p id="activeProfile">Loading profile...</p>
</div>

<!-- TODAY -->
<div class="card">
<h3>🔥 Today Calories</h3>
<p id="dailyCalories">Loading...</p>
</div>

<!-- AI SUMMARY -->
<div class="card">
<h3>🧠 AI Summary</h3>
<p id="summary">Loading...</p>
</div>

<!-- INSIGHT -->
<div class="card">
<h3>💡 Weekly Insight</h3>
<p id="advice">Loading...</p>
</div>

<!-- EXPORT -->
<div class="card">
<h3>📄 Export Report</h3>
<button onclick="exportPDF()">Generate PDF</button>
</div>

<div class="bottom-nav">
<a href="index.html">🏠</a>
<a href="calendar.html">📅</a>
<a href="food.html">🍽</a>
<a href="workout.html">🏋️</a>
<a href="shopping.html">🛒</a>
<a href="report.html">📄</a>
</div>

<script>

setActive?.("report")

// =====================
// PROFILE SYSTEM (SYNC FIX)
// =====================
function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest"
}
}

function renderProfile(){
const p = getActiveProfile()
document.getElementById("activeProfile").innerText =
`👤 Active Profile: ${p.name}`
}

renderProfile()

// =====================
// LOAD REPORT (v9 FIX)
// =====================
async function loadReport(){

const profile = getActiveProfile()
const today = new Date().toISOString().split("T")[0]

// 🔥 IMPORTANT: 只取当前用户数据
let foods = []

if(typeof getFoodLogs !== "undefined"){
foods = await getFoodLogs(today, profile.id) || []
}

// calories
let totalCalories = 0
foods.forEach(f=>{
totalCalories += Number(f.calories || 0)
})

document.getElementById("dailyCalories").innerText =
`${totalCalories} kcal`

// =====================
// AI SCORE ENGINE (统一规则)
// =====================
function calculateScore(cal){

let score = 100

if(cal > 3000) score -= 40
else if(cal > 2500) score -= 20
else if(cal > 2000) score -= 10

if(cal < 1500) score -= 10

return Math.max(0, score)
}

let score = calculateScore(totalCalories)

// =====================
// AI INSIGHT
// =====================
function getAdvice(cal){

if(cal > 3000) return "⚠️ Too high calories, reduce carbs + sugar"
if(cal > 2500) return "⚠️ Slightly high, consider lighter dinner"
if(cal < 1500) return "⚠️ Too low intake, increase nutrition"

return "✅ Balanced diet, keep going"
}

document.getElementById("summary").innerText =
`Health Score: ${score}/100`

document.getElementById("advice").innerText =
getAdvice(totalCalories)

}

// =====================
// PDF EXPORT (REAL DATA FIX)
// =====================
function exportPDF(){

const profile = getActiveProfile()

const { jsPDF } = window.jspdf
const doc = new jsPDF()

doc.setFontSize(16)
doc.text("Health Report", 10, 10)

doc.setFontSize(12)
doc.text(`User: ${profile.name}`, 10, 20)

doc.text("Report Type: Daily Summary", 10, 30)

doc.text("Generated by AI Health OS v9", 10, 40)

doc.save("report.pdf")
}

// start
loadReport()

</script>

</body>
</html>
