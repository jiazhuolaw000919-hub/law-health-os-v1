<h2 class="center">📊 AI Health Report</h2>

<div class="card">

<script>

let calories = 2100
let burn = 300

// 🧠 防 crash
let score = 0
let label = "Loading..."

if(typeof calculateHealthScore === "function"){
score = calculateHealthScore(calories, burn)
}

if(typeof healthLabel === "function"){
label = healthLabel(score)
}

document.write(`
<p>🔥 Calories: ${calories}</p>
<p>🏃 Burn: ${burn}</p>
<p>📊 AI Score: ${score}</p>
<p>🧠 Status: ${label}</p>
`)
</script>

</div>

<div class="card">
<h3>Weekly Insight</h3>

<script>

let advice = "No data"

if(typeof workoutSuggestion === "function"){
advice = workoutSuggestion(calories)
}

document.write(`
<p>💡 Advice: ${advice}</p>
`)
</script>

<div class="card">
<h3>📄 Export Report</h3>

<button onclick="exportPDF()">Generate PDF</button>
</div>

<script>

function exportPDF(){

const { jsPDF } = window.jspdf
const doc = new jsPDF()

doc.setFontSize(16)
doc.text("Health Report", 10, 10)

doc.setFontSize(12)
doc.text("Weekly Score: 85", 10, 20)
doc.text("Monthly Score: 80", 10, 30)
doc.text("Status: Healthy", 10, 40)

doc.text("AI Insight: Balanced diet recommended", 10, 50)

doc.save("report.pdf")
}

<p id="dailyCalories">Loading...</p>

async function loadReport(){

const today = new Date().toISOString().split("T")[0]

const foods = await getFoodLogs?.(today) || []

let totalCalories = 0

foods.forEach(f=>{
totalCalories += Number(f.calories || 0)
})

document.getElementById("dailyCalories").innerText =
totalCalories
}

loadReport()

</script>
