<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Report v10.1 Stable FIXED</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📊 AI Health Report v10.1 FIXED</h2>

<!-- PROFILE -->
<div class="card">
<p id="activeProfile">Loading profile...</p>
</div>

<!-- CALORIES -->
<div class="card">
<h3>🔥 Today Calories</h3>
<p id="dailyCalories">Loading...</p>
</div>

<!-- SUMMARY -->
<div class="card">
<h3>🧠 AI Summary</h3>
<p id="summary">Loading...</p>
</div>

<!-- ADVICE -->
<div class="card">
<h3>💡 Weekly Insight</h3>
<p id="advice">Loading...</p>
</div>

<!-- EXPORT -->
<div class="card">
<h3>📄 Export Report</h3>
<button onclick="exportPDF()">Generate PDF</button>
</div>

<script>

// ================= PROFILE SAFE =================
function getActiveProfile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
id:"guest",
name:"Guest"
}
}

function renderProfile(){
const p = getActiveProfile()
document.getElementById("activeProfile").innerText =
`👤 Active Profile: ${p.name}`
}

renderProfile()

// ================= SAFE LOGS =================
async function safeGetLogs(date){

try{
if(typeof getFoodLogs === "undefined") return []

const logs = await getFoodLogs(date)
return Array.isArray(logs) ? logs : []

}catch(e){
return []
}
}

// ================= LOAD REPORT =================
async function loadReport(){

const profile = getActiveProfile()
const today = new Date().toISOString().split("T")[0]

let foods = await safeGetLogs(today)

// ✅ MULTI PROFILE FILTER SAFE
foods = foods.filter(f =>
!f.userId || f.userId === profile.id
)

let totalCalories = foods.reduce((sum,f)=>
sum + Number(f.calories || 0), 0
)

// UI
document.getElementById("dailyCalories").innerText =
`${totalCalories} kcal`

// ================= SCORE ENGINE =================
let score

if(typeof calculateHealthScore === "function"){
score = calculateHealthScore(totalCalories, 300)
}else{
score = Math.max(0, 100 - totalCalories / 50)
}

// ================= ADVICE ENGINE =================
let advice = "No suggestion available"

if(typeof workoutSuggestion === "function"){
advice = workoutSuggestion(totalCalories)
}else{
if(totalCalories > 2500) advice = "Reduce carbs + light walk"
else if(totalCalories > 1800) advice = "Balanced intake"
else advice = "Increase protein intake"
}

// UI
document.getElementById("summary").innerText =
`Health Score: ${Math.round(score)}`

document.getElementById("advice").innerText = advice
}

loadReport()

// ================= PDF EXPORT SAFE =================
function exportPDF(){

const { jsPDF } = window.jspdf
const doc = new jsPDF()

const profile = getActiveProfile()

const calories = document.getElementById("dailyCalories").innerText
const score = document.getElementById("summary").innerText
const advice = document.getElementById("advice").innerText

function safeText(text, y){
doc.text(String(text).substring(0, 90), 10, y)
}

doc.setFontSize(16)
doc.text("AI Health Report", 10, 10)

doc.setFontSize(12)
safeText(`Profile: ${profile.name}`, 25)
safeText(`Calories: ${calories}`, 35)
safeText(score, 45)
safeText(advice, 55)

doc.save("report.pdf")
}

</script>

</body>
</html>
