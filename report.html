<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Health Calendar v9</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f19;
color:white;
}

.navbar{
display:flex;
justify-content:space-around;
background:#111827;
padding:12px;
position:sticky;
top:0;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:10px;
}

.day{
background:#1f2937;
padding:10px;
border-radius:10px;
text-align:center;
font-size:12px;
cursor:pointer;
}

.high{background:#ef4444;}
.mid{background:#f59e0b;}
.low{background:#22c55e;}
</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Dashboard</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="report.html">Calendar</a>
</div>

<h2 style="text-align:center;">📅 Monthly Calendar</h2>

<div class="calendar" id="calendar"></div>

<script>

function getDays(){

const days = []

for(let i=0;i<30;i++){

const d = new Date()
d.setDate(d.getDate()-i)

days.push(d.toISOString().split("T")[0])
}

return days
}

function getColor(cal){

if(cal>2000) return "high"
if(cal>1200) return "mid"
return "low"
}

function render(){

const calendar = document.getElementById("calendar")

getDays().forEach(date=>{

// fake calories (之后接 Supabase)
const cal = Math.floor(Math.random()*2000)

const div = document.createElement("div")

div.className = "day " + getColor(cal)

div.innerHTML =
date + "<br>" + cal + " kcal"

// ⭐ 点击进入当天详情
div.onclick = () => {
window.location.href = "day.html?date=" + date
}

calendar.appendChild(div)

})

}

render()

</script>

</body>
</html>
