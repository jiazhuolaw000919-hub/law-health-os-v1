<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Dashboard v11.5</title>

<link rel="stylesheet" href="style.css">

<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>
<script src="supabase.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

canvas{
max-width:100%;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📊 AI Dashboard v11.5 (Global Sync)</h2>

<!-- TIME -->
<div class="card">
<h3>🕒 Now</h3>
<p id="date">--</p>
<p id="time">--</p>
</div>

<!-- PROFILE -->
<div class="card">
<h3>👤 Active Profile</h3>
<p id="profile">Loading...</p>
</div>

<!-- BMI -->
<div class="card">
<h3>⚖ BMI Status</h3>
<p id="bmi">Loading...</p>
<p id="bmiTag"></p>
</div>

<!-- TODAY SUMMARY (NEW GLOBAL SYNC) -->
<div class="card">
<h3>🔥 Today Macro Summary</h3>

<p id="todayCalories">Calories: --</p>
<p id="todayProtein">Protein: --</p>
<p id="todayCarbs">Carbs: --</p>
<p id="todayFat">Fat: --</p>

<p id="mealScore">Meal Score: --</p>
<p id="riskTag">Risk: --</p>
</div>

<!-- CALORIE TREND -->
<div class="card">
<h3>📈 Calorie Trend (7 Days)</h3>
<canvas id="calChart" width="300" height="120"></canvas>
</div>

<!-- BMI TREND -->
<div class="card">
<h3>📊 BMI Trend (Real Data)</h3>
<canvas id="bmiChart" width="300" height="120"></canvas>
</div>

<script>

/* ================= TIME ================= */
function updateTime(){
const now = new Date()
document.getElementById("date").innerText = now.toLocaleDateString()
document.getElementById("time").innerText = now.toLocaleTimeString()
}
setInterval(updateTime,1000)
updateTime()

/* ================= SAFE PROFILE ================= */
function safeProfile(){
try{
const p = getActiveProfile?.()
return {
name:p?.name || "Guest",
id:p?.id || "guest",
height:p?.height || 170,
weight:p?.weight || 70,
weightHistory:p?.weightHistory || []
}
}catch(e){
return {
name:"Guest",
id:"guest",
height:170,
weight:70,
weightHistory:[]
}
}
}

/* ================= BMI ================= */
function calcBMI(h,w){
return (w / ((h/100)*(h/100))).toFixed(1)
}

/* ================= SAFE NUMBER ================= */
function num(n){
return isNaN(n) ? 0 : Number(n)
}

/* ================= 7 DAY DATA (GLOBAL FOOD_LOGS) ================= */
async function get7DayData(){

let days = []

for(let i=6;i>=0;i--){

let d = new Date()
d.setDate(d.getDate()-i)
let date = d.toISOString().split("T")[0]

let logs = []

if(typeof getFoodLogs !== "undefined"){
try{
logs = await getFoodLogs(date)
}catch(e){
logs = []
}
}

let totalCal = 0
let totalP = 0
let totalC = 0
let totalF = 0

logs.forEach(f=>{
totalCal += num(f.calories)
totalP += num(f.protein)
totalC += num(f.carbs)
totalF += num(f.fat)
})

days.push({
date,
calories: totalCal,
protein: totalP,
carbs: totalC,
fat: totalF
})
}

return days
}

/* ================= MEAL SCORE ================= */
function calculateMealScore(p, c, f, calories){

let score = 100

// protein balance
if(p < 40) score -= 20
if(p > 150) score -= 5

// carb
if(c > 300) score -= 15

// fat
if(f > 100) score -= 15

// calories
if(calories > 2800) score -= 20

return Math.max(0, Math.min(100, score))
}

/* ================= RISK ================= */
function getRisk(calories, score){

if(score < 40 || calories > 3000){
return "🔴 High Risk"
}

if(score < 70 || calories > 2400){
return "🟠 Medium Risk"
}

return "🟢 Low Risk"
}

/* ================= CHART ================= */
function drawCalorieChart(data){

const c = document.getElementById("calChart")
const ctx = c.getContext("2d")

ctx.clearRect(0,0,300,120)

ctx.beginPath()
ctx.moveTo(20,100 - data[0].calories/50)

for(let i=1;i<data.length;i++){
ctx.lineTo(20 + i*40, 100 - data[i].calories/50)
}

ctx.strokeStyle = "#3b82f6"
ctx.lineWidth = 2
ctx.stroke()
}

/* ================= BMI CHART ================= */
function drawBMIChart(profile){

const c = document.getElementById("bmiChart")
const ctx = c.getContext("2d")

ctx.clearRect(0,0,300,120)

let history = profile.weightHistory || []
let values = []

if(history.length >= 2){

values = history.slice(-7).map(h=>{
return calcBMI(profile.height, h.weight)
})

}else{

let base = calcBMI(profile.height, profile.weight)

values = [base-0.2, base, base+0.1, base-0.1, base, base+0.2, base]
}

values = values.map(v => Number(v))

ctx.beginPath()
ctx.moveTo(20,100 - values[0]*2)

for(let i=1;i<values.length;i++){
ctx.lineTo(20 + i*40, 100 - values[i]*2)
}

ctx.strokeStyle = "#22c55e"
ctx.lineWidth = 2
ctx.stroke()
}

/* ================= LOAD DASHBOARD ================= */
async function loadDashboard(){

const profile = safeProfile()

document.getElementById("profile").innerText =
`👤 ${profile.name} (${profile.id})`

let bmi = calcBMI(profile.height, profile.weight)

document.getElementById("bmi").innerText =
`⚖ BMI: ${bmi}`

document.getElementById("bmiTag").innerText =
(bmi < 18.5) ? "🟡 Underweight"
: (bmi < 25) ? "🟢 Normal"
: (bmi < 30) ? "🟠 Overweight"
: "🔴 Obese"

/* ================= GLOBAL SYNC ================= */
let data = await get7DayData()

let today = data[data.length - 1]

let score = calculateMealScore(
today.protein,
today.carbs,
today.fat,
today.calories
)

/* ================= TODAY UI ================= */
document.getElementById("todayCalories").innerText =
`Calories: ${today.calories} kcal`

document.getElementById("todayProtein").innerText =
`Protein: ${today.protein} g`

document.getElementById("todayCarbs").innerText =
`Carbs: ${today.carbs} g`

document.getElementById("todayFat").innerText =
`Fat: ${today.fat} g`

document.getElementById("mealScore").innerText =
`Meal Score: ${score}`

document.getElementById("riskTag").innerText =
getRisk(today.calories, score)

/* ================= CHARTS ================= */
drawCalorieChart(data)
drawBMIChart(profile)
}

loadDashboard()

</script>

</body>
</html>
