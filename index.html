<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Dashboard v12.0 (Phase 7 Advanced AI OS)</title>

<link rel="stylesheet" href="style.css">

<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>
<script src="supabase.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

canvas{max-width:100%}

.tag{
padding:4px 8px;
border-radius:6px;
font-size:12px;
display:inline-block;
}
.green{background:#dcfce7;color:#166534}
.yellow{background:#fef9c3;color:#854d0e}
.red{background:#fee2e2;color:#991b1b}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📊 AI Dashboard v12.0 (Phase 7 Full AI OS)</h2>

<!-- TIME -->
<div class="card">
<h3>🕒 Now</h3>
<p id="date"></p>
<p id="time"></p>
</div>

<!-- PROFILE -->
<div class="card">
<h3>👤 Profile</h3>
<p id="profile"></p>
</div>

<!-- BMI -->
<div class="card">
<h3>⚖ BMI</h3>
<p id="bmi"></p>
<p id="bmiTag"></p>
</div>

<!-- TODAY -->
<div class="card">
<h3>🔥 Today AI Summary</h3>

<p id="cal">--</p>
<p id="p">--</p>
<p id="c">--</p>
<p id="f">--</p>

<p id="mealScore"></p>
<p id="risk"></p>
</div>

<!-- AI INSIGHT -->
<div class="card">
<h3>🧠 AI Insight</h3>
<p id="insight"></p>
<p id="recommend"></p>
</div>

<!-- TREND -->
<div class="card">
<h3>📈 Macro Trend (7 Days)</h3>
<canvas id="chart"></canvas>
</div>

<!-- RISK TREND -->
<div class="card">
<h3>⚠ Risk Trend</h3>
<canvas id="riskChart"></canvas>
</div>

<script>

/* ================= 🔥 FIX: REAL TIME CLOCK ================= */
function updateClock(){

const now = new Date()

const date = now.toLocaleDateString()
const time = now.toLocaleTimeString()

const dateEl = document.getElementById("date")
const timeEl = document.getElementById("time")

if(dateEl) dateEl.innerText = date
if(timeEl) timeEl.innerText = time
}

/* ================= BASIC ================= */
function profile(){
return JSON.parse(localStorage.getItem("activeProfile")) || {
height:170,
weight:70,
id:"guest",
name:"Guest"
}
}

function bmi(h,w){
return (w/(h/100)**2).toFixed(1)
}

function num(n){return Number(n||0)}

/* ================= LOAD DATA ================= */
async function getData7(){

let out=[]

for(let i=6;i>=0;i--){
let d=new Date()
d.setDate(d.getDate()-i)
let date=d.toISOString().split("T")[0]

let logs=await getFoodLogs?.(date)||[]

let cal=0,p=0,c=0,f=0

logs.forEach(x=>{
cal+=num(x.calories)
p+=num(x.protein)
c+=num(x.carbs)
f+=num(x.fat)
})

out.push({date,cal,p,c,f})
}

return out
}

/* ================= AI ================= */
function learnPattern(data){

let proteinDays=0

data.forEach(d=>{
if(d.p>60) proteinDays++
})

return {
prefProtein: proteinDays>=4,
trend: data[data.length-1].cal > data[0].cal
}
}

/* ================= RISK ================= */
function riskLevel(cal){

if(cal>3000) return "🔴 High"
if(cal>2400) return "🟠 Medium"
return "🟢 Low"
}

/* ================= DRAW ================= */
function draw(canvasId,data,key){

let c=document.getElementById(canvasId)
let ctx=c.getContext("2d")

ctx.clearRect(0,0,400,200)

ctx.beginPath()
ctx.moveTo(20,100-data[0][key]/50)

for(let i=1;i<data.length;i++){
ctx.lineTo(20+i*40,100-data[i][key]/50)
}

ctx.stroke()
}

/* ================= MAIN ================= */
async function load(){

let p=profile()

document.getElementById("profile").innerText=p.name
document.getElementById("bmi").innerText=bmi(p.height,p.weight)

let data=await getData7()

let today=data[data.length-1] || {cal:0,p:0,c:0,f:0}

document.getElementById("cal").innerText=`Calories ${today.cal}`
document.getElementById("p").innerText=`Protein ${today.p}`
document.getElementById("c").innerText=`Carbs ${today.c}`
document.getElementById("f").innerText=`Fat ${today.f}`

let score=(today.p+today.c+today.f)/3

document.getElementById("mealScore").innerText="Score "+score
document.getElementById("risk").innerText=riskLevel(today.cal)

/* AI INSIGHT */
let learn=learnPattern(data)

document.getElementById("insight").innerText=
learn.prefProtein
?"You prefer high protein meals"
:"Balanced/low protein pattern"

let rec =
learn.prefProtein
?"Tomorrow: chicken + eggs + fish"
:"Tomorrow: balanced rice + veggies + protein"

document.getElementById("recommend").innerText=rec

/* charts */
draw("chart",data,"cal")

let riskData=data.map(d=>({
risk:d.cal>3000?3:d.cal>2400?2:1
}))

draw("riskChart",riskData,"risk")
}

/* ================= INIT ================= */
load()

/* 🔥 FIX: REAL TIME CLOCK START */
updateClock()
setInterval(updateClock, 1000)

</script>

</body>
</html>
