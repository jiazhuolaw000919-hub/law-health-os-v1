<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Dashboard v10.7</title>

<link rel="stylesheet" href="style.css">

<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

canvas{
max-width:100%;
}
</style>

</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📊 AI Dashboard v10.7</h2>

<!-- 🕒 TIME -->
<div class="card">
<h3>🕒 Now</h3>
<p id="date">--</p>
<p id="time">--</p>
</div>

<!-- PROFILE -->
<div class="card">
<h3>👤 Active Profile</h3>
<p id="profile">Loading...</p>
</div>

<!-- BMI -->
<div class="card">
<h3>⚖ BMI Status</h3>
<p id="bmi">Loading...</p>
<p id="bmiTag"></p>
</div>

<!-- TODAY -->
<div class="card">
<h3>🔥 Today Summary</h3>
<p id="today">Loading...</p>
<p id="aiTag"></p>
</div>

<!-- BMI CHART -->
<div class="card">
<h3>📊 BMI Snapshot</h3>
<canvas id="bmiChart" width="300" height="120"></canvas>
</div>

<script>

/* ================= TIME ================= */
function updateTime(){
const now = new Date()

document.getElementById("date").innerText =
now.toLocaleDateString()

document.getElementById("time").innerText =
now.toLocaleTimeString()
}
setInterval(updateTime,1000)
updateTime()

/* ================= SAFE PROFILE ================= */
function safeProfile(){
if(typeof getActiveProfile !== "undefined"){
return getActiveProfile()
}
return { name:"Guest", id:"guest", height:170, weight:70 }
}

/* ================= BMI ================= */
function calcBMI(h,w){
h = Number(h || 170)
w = Number(w || 70)
return (w / ((h/100)*(h/100))).toFixed(1)
}

function getBmiTag(bmi){
bmi = Number(bmi)

if(bmi < 18.5) return "🟡 Underweight"
if(bmi < 25) return "🟢 Normal"
if(bmi < 30) return "🟠 Overweight"
return "🔴 Obese"
}

/* ================= SCORE ================= */
function safeScore(cal){
if(typeof calculateHealthScore !== "undefined"){
return calculateHealthScore(cal)
}
return Math.max(0, 100 - cal/50)
}

/* ================= AI TAG (NEW v10.7) ================= */
function getAITag(cal, bmi){
if(cal > 2500 && bmi > 25) return "⚠ High risk day"
if(cal > 2200) return "📊 High intake"
if(bmi > 25) return "⚖ Weight management needed"
return "✅ Healthy balance"
}

/* ================= CHART ================= */
function drawBMI(bmi){

const canvas = document.getElementById("bmiChart")
const ctx = canvas.getContext("2d")

ctx.clearRect(0,0,300,120)

ctx.fillStyle = "#f3f4f6"
ctx.fillRect(0,0,300,120)

let bar = Math.min(40, bmi) * 6

ctx.fillStyle = "#22c55e"
ctx.fillRect(20, 70, bar, 20)

ctx.fillStyle = "#111"
ctx.fillText("BMI: " + bmi, 20, 40)
}

/* ================= LOAD ================= */
async function loadDashboard(){

const profile = safeProfile()

document.getElementById("profile").innerText =
`👤 ${profile.name} (${profile.id})`

/* BMI */
let bmi = calcBMI(profile.height, profile.weight)

document.getElementById("bmi").innerText =
`⚖ BMI: ${bmi}`

document.getElementById("bmiTag").innerText =
getBmiTag(bmi)

drawBMI(bmi)

/* TODAY CALORIES */
let today = new Date().toISOString().split("T")[0]

let calories = 0

if(typeof getFoodLogs !== "undefined"){
try{
const foods = await getFoodLogs(today) || []

foods.forEach(f=>{
if(!f.userId || f.userId === profile.id){
calories += Number(f.calories || 0)
}
})
}catch(e){}
}

if(calories === 0){
calories = 1800
}

/* SCORE + AI TAG */
let score = safeScore(calories)

document.getElementById("today").innerText =
`🔥 Calories: ${calories} kcal | 🧠 Score: ${score}`

document.getElementById("aiTag").innerText =
getAITag(calories, bmi)
}

loadDashboard()

</script>

</body>
</html>
