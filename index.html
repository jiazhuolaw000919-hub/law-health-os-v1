<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Dashboard v4</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.card{
background:white;
margin:12px;
padding:16px;
border-radius:14px;
box-shadow:0 2px 8px rgba(0,0,0,.06);
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.kpi{
font-size:20px;
font-weight:bold;
}

.small{
color:#6b7280;
font-size:12px;
}
</style>

</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📊 AI Dashboard v4</h2>

<!-- PROFILE -->
<div class="card">
<h3>👤 Profile</h3>
<p id="profile"></p>
</div>

<!-- KPI -->
<div class="card grid">
<div>
<p class="kpi" id="todayCal">0</p>
<p class="small">Today Calories</p>
</div>

<div>
<p class="kpi" id="weekCal">0</p>
<p class="small">7 Days</p>
</div>

<div>
<p class="kpi" id="avgCal">0</p>
<p class="small">Average</p>
</div>

<div>
<p class="kpi" id="risk">-</p>
<p class="small">AI Risk</p>
</div>
</div>

<!-- CHART -->
<div class="card">
<canvas id="chart"></canvas>
</div>

<!-- INSIGHT -->
<div class="card">
<h3>🧠 AI Insight</h3>
<p id="insight"></p>
</div>

<script>

setActive?.("dashboard")

function today(){
return new Date().toISOString().split("T")[0]
}

function last7(){
let arr=[]
for(let i=6;i>=0;i--){
let d=new Date()
d.setDate(d.getDate()-i)
arr.push(d.toISOString().split("T")[0])
}
return arr
}

async function getLogs(date){
if(typeof getFoodLogs!=="function") return []
return await getFoodLogs(date)||[]
}

async function load(){

let days = last7()

let labels=[]
let data=[]
let total=0

for(let d of days){
let logs = await getLogs(d)
let cal = logs.reduce((a,b)=>a+Number(b.calories||0),0)

labels.push(d.slice(5))
data.push(cal)
total+=cal
}

// KPI
document.getElementById("todayCal").innerText = data[6]
document.getElementById("weekCal").innerText = total
document.getElementById("avgCal").innerText = (total/7).toFixed(0)

// RISK AI
let risk="LOW"
if(total>20000) risk="HIGH"
else if(total>15000) risk="MED"

document.getElementById("risk").innerText=risk

// INSIGHT
document.getElementById("insight").innerText =
risk==="HIGH"
?"⚠️ High intake trend detected"
:"✅ Stable eating pattern"

// PROFILE
let p = null
if(typeof getProfile==="function"){
p = await getProfile()
}

document.getElementById("profile").innerText =
p ? `${p.name} | BMI ${p.bmi}` : "No profile"

// CHART
new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels,
datasets:[{
label:"Calories",
data,
borderColor:"#111827"
}]
}
})

}

load()

</script>

</body>
</html>
