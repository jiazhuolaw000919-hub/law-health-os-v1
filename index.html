<!DOCTYPE html>
<html>
<head>
  <title>Law Health OS Stable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:Arial; background:#0b0f19; color:white; text-align:center; padding:20px;">

  <h1>🧠 Law Health OS</h1>

  <h2>📊 Calories Today</h2>
  <p id="total">0 kcal</p>

  <hr>

  <h2>🍽 Food Input</h2>

  <input id="food" placeholder="chicken rice / milo / teh tarik"
    style="padding:10px; width:80%;">

  <br><br>

  <button onclick="async function addFood() {
  const food = document.getElementById("food").value
  if (!food) return

  const cal = estimate(food)
  const advice = ipohAdvice(food)

  total += cal

  document.getElementById("total").innerText = total + " kcal"

  document.getElementById("log").innerHTML +=
    "<p>🍽 " + food + " - " + cal + " kcal<br>🍜 " + advice + "</p>"

  document.getElementById("food").value = ""

  try {
    const res = await fetch(
      "https://bzhdzveuldgdpslbzqqv.supabase.co/rest/v1/food_logs",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY,
          "Prefer": "return=minimal"
        },
        body: JSON.stringify({
          food: food,
          calories: cal
        })
      }
    )

    if (!res.ok) {
      const err = await res.text()
      console.log("Supabase insert failed:", err)
    } else {
      console.log("Saved to database ✔")
    }

  } catch (e) {
    console.log("Network error:", e)
  }
}" style="padding:10px; width:85%;">
    Add Food
  </button>

  <div id="log"></div>

<script>
const SUPABASE_URL = "https://bzhdzveuldgdpslbzqqv.supabase.co"
const SUPABASE_KEY = "sb_publishable_GMM5PgeRzudbeh4aHK-1pw_lQ6TQnVe"

let total = 0

function estimate(food) {
  food = food.toLowerCase()

  if (food.includes("chicken")) return 600
  if (food.includes("milo")) return 180
  if (food.includes("teh tarik")) return 250
  if (food.includes("waffle")) return 350
  return 300
}

function ipohAdvice(food) {
  if (food.includes("chicken")) return "Ipoh: steam chicken, less soy sauce"
  if (food.includes("milo")) return "Ipoh: less sugar Milo"
  if (food.includes("teh tarik")) return "Ipoh: reduce condensed milk"
  return "Ipoh: balanced diet"
}

async function addFood() {
  try {
    const food = document.getElementById("food").value
    if (!food) return

    const cal = estimate(food)
    const advice = ipohAdvice(food)

    total += cal

    document.getElementById("total").innerText = total + " kcal"

    document.getElementById("log").innerHTML +=
      "<p>🍽 " + food + " - " + cal + " kcal<br>🍜 " + advice + "</p>"

    document.getElementById("food").value = ""

    // 🟢 SAFE FETCH (不会炸页面)
    fetch(SUPABASE_URL + "/rest/v1/food_logs", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({
        food: food,
        calories: cal
      })
    })
    .then(res => {
      if (!res.ok) {
        console.log("DB failed but UI works")
      }
    })
    .catch(err => {
      console.log("Network error:", err)
    })

  } catch (e) {
    console.log("App error:", e)
  }
}
</script>

</body>
</html>
