<div class="card">
<h3>📈 Weight Trend</h3>
<canvas id="weightChart"></canvas>
</div>

<script>
const ctx = document.getElementById("weightChart")

new Chart(ctx, {
type: "line",
data: {
labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
datasets: [{
label: "Weight",
data: [75,74.8,74.6,74.7,74.5,74.3,74.2],
borderColor: "#111827",
fill: false
}]
},
options: {
responsive: true
}
})
</script>

<script>

const sampleData = [
{calories:1800,burn:200},
{calories:2000,burn:300},
{calories:2100,burn:150},
{calories:1900,burn:250},
{calories:1700,burn:100},
{calories:2200,burn:300},
{calories:1800,burn:200}
]

document.getElementById("weeklyScore").innerText =
weeklyScore(sampleData)

document.getElementById("monthlyScore").innerText =
monthlyScore(sampleData)

</script>
