<div class="card" id="content"></div>

<script>

const date=new URLSearchParams(location.search).get("date")

async function load(){

const foods=await getFood(date)

let html=""
let total=0

foods.forEach(f=>{
html+=`<p>${f.food} - ${f.calories}</p>`
total+=f.calories||0
})

document.getElementById("content").innerHTML =
html + "<hr>Total: " + total
}

load()

</script>
