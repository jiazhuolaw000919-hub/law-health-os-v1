// =====================
// LIVE AI SUMMARY
// =====================
async function loadAI(){

const today = new Date().toISOString().split("T")[0]
const d = await getDailySummary(today)

const calories = d.calories
const burn = 250
const score = calculateHealthScore(calories,burn)

document.getElementById("aiSummary").innerText =
aiCoach(calories,burn,score) + " | " +
calorieInsight(calories) + " | " +
bingeDetect(calories)

}
loadAI()

// =====================
// FINAL AI STATUS
// =====================
async function loadFinalAI(){

const today = new Date().toISOString().split("T")[0]
const d = await getDailySummary(today)

const calories = d.calories
const burn = 250
const score = calculateHealthScore(calories,burn)

document.getElementById("risk").innerText =
"Risk: " + riskLevel(score)

document.getElementById("behavior").innerText =
behaviorAnalysis([
{calories:1800},
{calories:2500},
{calories:2600},
{calories:1700},
{calories:2300}
])

document.getElementById("prediction").innerText =
"Predicted Weight: " + predictWeight(75,calories) + " kg"

}
loadFinalAI()

// =====================
// WEEKLY LIVE CHART
// =====================
async function loadWeekly(){

const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]
let values = []

for(let i=0;i<7;i++){

const fakeDate = "2024-06-0" + (i+1)
const d = await getDailySummary(fakeDate)

values.push(d.calories)
}

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:days,
datasets:[{
label:"Calories",
data:values,
borderColor:"#111827"
}]
}
})

}

loadWeekly()

</script>
