<script>
const SUPABASE_URL = "https://bzhdzveuldgdpslbzqqv.supabase.co"
const SUPABASE_KEY = "sb_publishable_nbFvqceSb_oZWOSEdDjjzg_IQjKfumj"

let total = 0
let logs = []

function estimate(food) {
  food = food.toLowerCase()

  if (food.includes("chicken")) return 600
  if (food.includes("milo")) return 180
  if (food.includes("teh tarik")) return 250
  if (food.includes("waffle")) return 350
  if (food.includes("rice")) return 500

  return 300
}

function ipohAdvice(food) {
  food = food.toLowerCase()

  if (food.includes("chicken")) {
    return "Ipoh style: steam chicken, reduce soy sauce, less oil"
  }
  if (food.includes("milo")) {
    return "Ipoh style: less sugar Milo kosong version"
  }
  if (food.includes("teh tarik")) {
    return "Ipoh style: use less condensed milk"
  }

  return "Ipoh style: balance meal, reduce oil & sugar"
}

async function addFood() {
  const input = document.getElementById("food")
  const food = input.value
  if (!food) return

  const cal = estimate(food)
  const advice = ipohAdvice(food)

  total += cal
  logs.push({ food, cal })

  // UI更新
  document.getElementById("total").innerText = total + " kcal"

  document.getElementById("log").innerHTML +=
    "<p>🍽 " + food + " - " + cal + " kcal<br>🍜 " + advice + "</p>"

  input.value = ""

  // 🔵 Supabase同步（安全写法）
  try {
    await fetch(SUPABASE_URL + "/rest/v1/food_logs", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({
        food: food,
        calories: cal
      })
    })
  } catch (e) {
    console.log("DB sync failed but UI still works", e)
  }
}
</script>
