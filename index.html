<!DOCTYPE html><!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Dashboard v5</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>

<style>
.card{
background:white;
margin:12px;
padding:16px;
border-radius:14px;
box-shadow:0 2px 8px rgba(0,0,0,.06);
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.kpi{
font-size:20px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="dashboard.html">Dashboard</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">🧠 AI Dashboard v5</h2>

<!-- PROFILE -->
<div class="card">
<h3>👤 Profile AI Status</h3>
<p id="profile"></p>
<p id="bmi"></p>
<p id="prediction"></p>
</div>

<!-- KPI -->
<div class="card grid">

<div>
<p class="kpi" id="todayCal">0</p>
<p>Today Calories</p>
</div>

<div>
<p class="kpi" id="risk">-</p>
<p>Risk Level</p>
</div>

</div>

<!-- AI INSIGHT -->
<div class="card">
<h3>🧠 AI Coach</h3>
<p id="advice"></p>
</div>

<script>

setActive?.("dashboard")

async function getToday(){
return new Date().toISOString().split("T")[0]
}

async function load(){

let profile = JSON.parse(localStorage.getItem("profile")||"{}")

let weight = +profile.weight || 70
let height = +profile.height || 170

let bmi = getBMI(weight,height)

document.getElementById("profile").innerText =
profile.name || "No Profile"

document.getElementById("bmi").innerText =
"BMI: " + bmi.toFixed(1)

// TODAY CALORIES
let today = await getFoodLogs?.(getToday()) || []

let cal = today.reduce((a,b)=>a + Number(b.calories||0),0)

document.getElementById("todayCal").innerText = cal

// AVG SIMULATION (simple)
let avg = cal + 300

// RISK
let risk = riskLevel(cal, bmi)
document.getElementById("risk").innerText = risk

// PREDICTION
let predicted = predictWeight(weight, avg)

document.getElementById("prediction").innerText =
"Predicted Weight: " + predicted + " kg"

// ADVICE
document.getElementById("advice").innerText =
aiSuggestion(cal, bmi)

}

load()

</script>

</body>
</html>
