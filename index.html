<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard v11.4</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="ai.js"></script>
<script src="supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="nav">
<a href="index.html" id="nav-home">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="shopping.html">Shop</a>
<a href="report.html">Report</a>
</div>

<div class="card">
<h2>🧠 Health OS Dashboard</h2>
<p>System: v11.4 Stable</p>
</div>

<div class="card">
<h3>📊 Weekly Score</h3>
<p id="weekly"></p>
</div>

<div class="card">
<h3>📊 Monthly Score</h3>
<p id="monthly"></p>
</div>

<div class="card">
<h3>📈 Weight Trend</h3>
<canvas id="chart"></canvas>
</div>

<script>

setActive("home")

const data = [
{calories:1800,burn:200},
{calories:2000,burn:300},
{calories:2100,burn:150},
{calories:1900,burn:250},
{calories:1700,burn:100},
{calories:2200,burn:300},
{calories:1800,burn:200}
]

document.getElementById("weekly").innerText = weeklyScore(data)
document.getElementById("monthly").innerText = monthlyScore(data)

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
datasets:[{
label:"Weight",
data:[75,74.8,74.6,74.7,74.5,74.3,74.2],
borderColor:"#111827",
tension:0.3
}]
}
})

</script>

</body>
</html>
