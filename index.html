<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabaseUrl = "https://bzhdzveuldgdpslbzqqv.supabase.co/rest/v1"
const supabaseKey = "sb_publishable_nbFvqceSb_oZWOSEdDjjzg_IQjKfumj"

const supabase = createClient(supabaseUrl, supabaseKey)

let total = 0

window.addFood = async function () {
  let food = document.getElementById("food").value
  if (!food) return

  let cal = estimate(food)

  // 存数据库
  await supabase.from("food_logs").insert([
    { food: food, calories: cal }
  ])

  total += cal

  document.getElementById("total").innerText = total

  document.getElementById("log").innerHTML +=
    `<p>🍽 ${food} — ${cal} kcal</p>`

  document.getElementById("food").value = ""
}

function estimate(food) {
  food = food.toLowerCase()

  if (food.includes("chicken")) return 600
  if (food.includes("milo")) return 180
  if (food.includes("teh tarik")) return 250
  if (food.includes("waffle")) return 350

  return 300
}
</script>
