<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health OS v8.2</title>

<script src="supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white;}

.navbar{
display:flex;
justify-content:space-around;
background:#111827;
padding:12px;
position:sticky;
top:0;
}

.navbar a{color:white;text-decoration:none;}

.card{
background:#1f2937;
margin:10px;
padding:15px;
border-radius:12px;
}
</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Dashboard</a>
<a href="food.html">Food</a>
<a href="workout.html">Workout</a>
<a href="report.html">Report</a>
</div>

<div class="card">
<h2>🧠 Dashboard</h2>
<p>Age: 25</p>
<p>Height: 167cm</p>
<p>Weight: 82kg</p>
<p>BMI: 29.4</p>
</div>

<div class="card">
<h3>📊 Calories Chart</h3>
<canvas id="chart"></canvas>
</div>

<script>

async function loadChart(){

const data = await fetchFoods()

let labels = []
let calories = []

data.forEach(item=>{
labels.push(item.food)
calories.push(item.calories)
})

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Calories",
data:calories,
borderColor:"blue"
}]
}
})

}

loadChart()

</script>

</body>
</html>
