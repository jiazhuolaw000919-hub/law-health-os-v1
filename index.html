<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Law Health OS v8.1</title>

<style>
body{
  font-family:Arial;
  background:#0b0f19;
  color:white;
  padding:20px;
}

.card{
  background:#1c2230;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-size:16px;
}

.food-item{
  border-bottom:1px solid #333;
  padding:8px 0;
}

.small{
  font-size:13px;
  opacity:0.8;
}
</style>
</head>

<body>

<h1>🧠 Law Health OS v8.1</h1>

<div class="card">

<h2>📊 Dashboard</h2>

<p>Height: 167 cm</p>
<p>Weight: 82 kg → 68 kg</p>

<p id="calories">Today's Calories: 0 kcal</p>

</div>

<div class="card">

<h2>🍽 Food Input</h2>

<input id="food" placeholder="e.g. chicken rice / milo / teh tarik">

<button onclick="addFood()">
Add Food
</button>

<p class="small">AI will estimate calories + save to Supabase</p>

</div>

<div class="card">

<h2>🍜 Ipoh AI Advice</h2>

<p id="advice">Waiting for input...</p>

</div>

<div class="card">

<h2>📝 Food Log</h2>

<div id="log"></div>

</div>

<script>

let totalCalories = 0

const SUPABASE_URL =
"https://jwcgamxkwzrjnepxrvzr.supabase.co"

// ⚠️ REPLACE THIS
const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxZXZjZnlobmx0dHpkaXlsZnJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MjgzNTIsImV4cCI6MjA5NzQwNDM1Mn0.RNWddp1TuYwVAHZlWfdq4iGdgiqNU9DKgAi8pnC6ULs"

function estimateCalories(food){

food = food.toLowerCase()

if(food.includes("chicken")) return 600
if(food.includes("milo")) return 180
if(food.includes("teh tarik")) return 250
if(food.includes("waffle")) return 350
if(food.includes("rice")) return 500
if(food.includes("bread")) return 150

return 300
}

function ipohAdvice(food){

food = food.toLowerCase()

if(food.includes("milo"))
return "Ipoh style: reduce sugar, use Milo kosong"

if(food.includes("teh tarik"))
return "Ipoh style: less condensed milk"

if(food.includes("chicken"))
return "Ipoh style: steam or roast, avoid fried"

if(food.includes("rice"))
return "Ipoh style: reduce rice portion, add vegetables"

return "Ipoh style: balanced meal"

}

async function addFood(){

const foodInput = document.getElementById("food")
const food = foodInput.value.trim()

if(food === ""){
alert("Please enter food")
return
}

const calories = estimateCalories(food)
const advice = ipohAdvice(food)

totalCalories += calories

document.getElementById("calories").innerText =
"Today's Calories: " + totalCalories + " kcal"

document.getElementById("advice").innerText = advice

document.getElementById("log").innerHTML +=
`<div class="food-item">
🍽 ${food}<br>
🔥 ${calories} kcal
</div>`

foodInput.value = ""

try{

const res = await fetch(
SUPABASE_URL + "/rest/v1/food_logs",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY,
"Prefer":"return=minimal"
},
body:JSON.stringify({
food:food,
calories:calories
})
}
)

if(!res.ok){
const err = await res.text()
console.log("Supabase error:", err)
}else{
console.log("Saved to Supabase ✔")
}

}catch(e){
console.log("Network error:", e)
}

}

</script>

</body>
</html>
