<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Dashboard v12.1 (Unified Profile Engine)</title>

<link rel="stylesheet" href="style.css">

<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>
<script src="supabase.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

canvas{max-width:100%}

.tag{
padding:4px 8px;
border-radius:6px;
font-size:12px;
display:inline-block;
}
.green{background:#dcfce7;color:#166534}
.yellow{background:#fef9c3;color:#854d0e}
.red{background:#fee2e2;color:#991b1b}

/* ================= SKELETON ================= */
.skeleton{
background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);
background-size:200% 100%;
animation:shimmer 1.2s infinite;
border-radius:6px;
}

@keyframes shimmer{
0%{background-position:-200% 0}
100%{background-position:200% 0}
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📊 AI Dashboard v12.1 (Unified Profile Engine)</h2>

<!-- TIME -->
<div class="card">
<h3>🕒 Now</h3>
<p id="date"></p>
<p id="time"></p>
</div>

<!-- PROFILE -->
<div class="card">
<h3>👤 Profile</h3>

<div id="profileSkeleton" class="skeleton" style="height:18px;width:120px;"></div>
<p id="profile" style="display:none"></p>
</div>

<!-- BMI -->
<div class="card">
<h3>⚖ BMI</h3>
<p id="bmi"></p>
<p id="bmiTag"></p>
</div>

<!-- TODAY -->
<div class="card">
<h3>🔥 Today AI Summary</h3>

<p id="cal">--</p>
<p id="p">--</p>
<p id="c">--</p>
<p id="f">--</p>

<p id="mealScore"></p>
<p id="risk"></p>
</div>

<!-- AI INSIGHT -->
<div class="card">
<h3>🧠 AI Insight</h3>
<p id="insight"></p>
<p id="recommend"></p>
</div>

<!-- TREND -->
<div class="card">
<h3>📈 Macro Trend (7 Days)</h3>
<canvas id="chart"></canvas>
</div>

<!-- RISK TREND -->
<div class="card">
<h3>⚠ Risk Trend</h3>
<canvas id="riskChart"></canvas>
</div>

<script>

/* ================= 🔥 UNIFIED PROFILE ENGINE ================= */
function getProfile(){

try{
const raw = localStorage.getItem("activeProfile")
if(!raw || raw==="undefined" || raw==="null"){
return {id:"guest",name:"Guest",height:170,weight:70}
}

const p = JSON.parse(raw)
return p?.id ? p : {id:"guest",name:"Guest"}

}catch(e){
return {id:"guest",name:"Guest"}
}
}

/* ================= REAL-TIME SYNC ================= */
window.addEventListener("profileSyncUpdate", renderProfile)
window.addEventListener("focus", renderProfile)

/* ================= PROFILE RENDER ================= */
function renderProfile(){

const sk = document.getElementById("profileSkeleton")
const el = document.getElementById("profile")

const p = getProfile()

if(sk) sk.style.display="none"
if(el){
el.style.display="block"
el.innerText = p.name || "Guest"
}
}

/* ================= BASIC ================= */
function bmi(h,w){
return (w/(h/100)**2).toFixed(1)
}

function num(n){return Number(n||0)}

/* ================= CLOCK ================= */
function updateClock(){
const now = new Date()

document.getElementById("date").innerText = now.toLocaleDateString()
document.getElementById("time").innerText = now.toLocaleTimeString()
}

/* ================= DATA ================= */
async function getData7(){

let out=[]

for(let i=6;i>=0;i--){
let d=new Date()
d.setDate(d.getDate()-i)
let date=d.toISOString().split("T")[0]

let logs=[]
try{
logs = await getFoodLogs?.(date) || []
}catch(e){
logs=[]
}

let cal=0,p=0,c=0,f=0

logs.forEach(x=>{
cal+=num(x.calories)
p+=num(x.protein)
c+=num(x.carbs)
f+=num(x.fat)
})

out.push({date,cal,p,c,f})
}

return out
}

/* ================= AI ================= */
function learnPattern(data){

let proteinDays=0

data.forEach(d=>{
if(d.p>60) proteinDays++
})

return {
prefProtein: proteinDays>=4,
trend: data.length>1 && data[data.length-1].cal > data[0].cal
}
}

/* ================= RISK ================= */
function riskLevel(cal){

if(cal>3000) return "🔴 High"
if(cal>2400) return "🟠 Medium"
return "🟢 Low"
}

/* ================= SAFE CHART ================= */
function draw(canvasId,data,key){

let c=document.getElementById(canvasId)
if(!c) return

let ctx=c.getContext("2d")
if(!ctx) return

ctx.clearRect(0,0,c.width,c.height || 200)

ctx.beginPath()

if(!data.length) return

ctx.moveTo(20,100-data[0][key]/50)

for(let i=1;i<data.length;i++){
ctx.lineTo(20+i*40,100-data[i][key]/50)
}

ctx.stroke()
}

/* ================= MAIN ================= */
async function load(){

let p=getProfile()

document.getElementById("bmi").innerText =
bmi(p.height,p.weight)

let data = await getData7()

let today = data[data.length-1] || {cal:0,p:0,c:0,f:0}

document.getElementById("cal").innerText=`Calories ${today.cal}`
document.getElementById("p").innerText=`Protein ${today.p}`
document.getElementById("c").innerText=`Carbs ${today.c}`
document.getElementById("f").innerText=`Fat ${today.f}`

let score=(today.p+today.c+today.f)/3
document.getElementById("mealScore").innerText="Score "+score
document.getElementById("risk").innerText=riskLevel(today.cal)

/* AI */
let learn=learnPattern(data)

document.getElementById("insight").innerText =
learn.prefProtein
?"You prefer high protein meals"
:"Balanced/low protein pattern"

document.getElementById("recommend").innerText =
learn.prefProtein
?"Tomorrow: chicken + eggs + fish"
:"Tomorrow: balanced rice + veggies + protein"

/* charts safe */
draw("chart",data,"cal")

let riskData=data.map(d=>({
risk:d.cal>3000?3:d.cal>2400?2:1
}))

draw("riskChart",riskData,"risk")
}

/* ================= INIT ================= */
updateClock()
setInterval(updateClock,1000)

renderProfile()
load()

</script>

</body>
</html>
