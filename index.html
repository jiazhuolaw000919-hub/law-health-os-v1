<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Dashboard v11.2</title>

<link rel="stylesheet" href="style.css">

<script src="js/db.js"></script>
<script src="js/profile.js"></script>
<script src="js/ai-engine.js"></script>

<style>
.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:10px;
box-shadow:0 1px 4px rgba(0,0,0,.05);
}

canvas{
max-width:100%;
}
</style>
</head>

<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">📊 AI Dashboard v11.2</h2>

<!-- TIME -->
<div class="card">
<h3>🕒 Now</h3>
<p id="date">--</p>
<p id="time">--</p>
</div>

<!-- PROFILE -->
<div class="card">
<h3>👤 Active Profile</h3>
<p id="profile">Loading...</p>
</div>

<!-- BMI -->
<div class="card">
<h3>⚖ BMI Status</h3>
<p id="bmi">Loading...</p>
<p id="bmiTag"></p>
</div>

<!-- TODAY -->
<div class="card">
<h3>🔥 Today Summary</h3>
<p id="today">Loading...</p>
<p id="aiTag"></p>
</div>

<!-- CALORIE TREND -->
<div class="card">
<h3>📈 Calorie Trend (7 Days)</h3>
<canvas id="calChart" width="300" height="120"></canvas>
</div>

<!-- BMI TREND -->
<div class="card">
<h3>📊 BMI Trend (Real Data)</h3>
<canvas id="bmiChart" width="300" height="120"></canvas>
</div>

<script>

/* ================= TIME ================= */
function updateTime(){
const now = new Date()
document.getElementById("date").innerText = now.toLocaleDateString()
document.getElementById("time").innerText = now.toLocaleTimeString()
}
setInterval(updateTime,1000)
updateTime()

/* ================= SAFE PROFILE ================= */
function safeProfile(){
try{
const p = getActiveProfile?.()
return {
name:p?.name || "Guest",
id:p?.id || "guest",
height:p?.height || 170,
weight:p?.weight || 70,
weightHistory:p?.weightHistory || []
}
}catch(e){
return {
name:"Guest",
id:"guest",
height:170,
weight:70,
weightHistory:[]
}
}
}

/* ================= BMI ================= */
function calcBMI(h,w){
return (w / ((h/100)*(h/100))).toFixed(1)
}

/* ================= TAG ================= */
function getBmiTag(bmi){
bmi = Number(bmi)
if(bmi < 18.5) return "🟡 Underweight"
if(bmi < 25) return "🟢 Normal"
if(bmi < 30) return "🟠 Overweight"
return "🔴 Obese"
}

function getRiskTag(cal,bmi){
if(cal > 2500 && bmi > 28) return "🔴 High Risk"
if(cal > 2200) return "🟠 Medium Risk"
return "🟢 Low Risk"
}

/* ================= SAFE CALORIE ================= */
function safeNumber(n){
return isNaN(n) ? 0 : Number(n)
}

/* ================= 7 DAY CALORIES ================= */
async function get7DayCalories(){

let arr = []

for(let i=6;i>=0;i--){
let d = new Date()
d.setDate(d.getDate()-i)
let date = d.toISOString().split("T")[0]

let total = 0

if(typeof getFoodLogs !== "undefined"){
try{
let foods = await getFoodLogs(date)

foods.forEach(f=>{
if(!f.userId || f.userId === safeProfile().id){
total += safeNumber(f.calories)
}
})
}catch(e){
total = 0
}
}

arr.push(total)
}

return arr
}

/* ================= CALORIE CHART ================= */
function drawCalorieChart(data){

if(!data || !data.length) return

const c = document.getElementById("calChart")
const ctx = c.getContext("2d")

ctx.clearRect(0,0,300,120)

ctx.beginPath()
ctx.moveTo(20,100 - data[0]/50)

for(let i=1;i<data.length;i++){
ctx.lineTo(20 + i*40, 100 - data[i]/50)
}

ctx.strokeStyle = "#3b82f6"
ctx.lineWidth = 2
ctx.stroke()
}

/* ================= BMI CHART ================= */
function drawBMIChart(profile){

const c = document.getElementById("bmiChart")
const ctx = c.getContext("2d")

ctx.clearRect(0,0,300,120)

let history = profile.weightHistory || []
let values = []

if(history.length >= 2){

values = history.slice(-7).map(h=>{
return calcBMI(profile.height, h.weight)
})

}else{

let base = calcBMI(profile.height, profile.weight)

values = [
base-0.2,
base,
base+0.1,
base-0.1,
base,
base+0.2,
base
]
}

values = values.map(v => Number(v))

ctx.beginPath()
ctx.moveTo(20,100 - values[0]*2)

for(let i=1;i<values.length;i++){
ctx.lineTo(20 + i*40, 100 - values[i]*2)
}

ctx.strokeStyle = "#22c55e"
ctx.lineWidth = 2
ctx.stroke()
}

/* ================= LOAD DASHBOARD ================= */
async function loadDashboard(){

const profile = safeProfile()

document.getElementById("profile").innerText =
`👤 ${profile.name} (${profile.id})`

let bmi = calcBMI(profile.height, profile.weight)

document.getElementById("bmi").innerText =
`⚖ BMI: ${bmi}`

document.getElementById("bmiTag").innerText =
getBmiTag(bmi)

/* TODAY */
let today = new Date().toISOString().split("T")[0]

let calories = 0

if(typeof getFoodLogs !== "undefined"){
try{
const foods = await getFoodLogs(today)

foods.forEach(f=>{
if(!f.userId || f.userId === profile.id){
calories += safeNumber(f.calories)
}
})
}catch(e){
calories = 0
}
}

document.getElementById("today").innerText =
`🔥 Calories: ${calories} kcal | BMI: ${bmi}`

document.getElementById("aiTag").innerText =
getRiskTag(calories,bmi)

/* CHARTS */
let cal7 = await get7DayCalories()
drawCalorieChart(cal7)

drawBMIChart(profile)
}

loadDashboard()

</script>

</body>
</html>
