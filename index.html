<!DOCTYPE html>
<html>
<head>
  <title>Law Health OS Phase 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:Arial; background:#0b0f19; color:white; text-align:center; padding:20px;">

  <h1>🧠 Law Health OS</h1>

  <h2>Dashboard</h2>
  <p>Weight: 82kg</p>
  <p>BMI: 29.4</p>

  <hr>

  <h2>🍽 Food Analyzer</h2>

  <input id="food" placeholder="Enter food (e.g. chicken rice)" style="padding:10px; width:80%;">

  <br><br>

  <button onclick="analyze()" style="padding:10px; width:85%;">Analyze</button>

  <div id="result" style="margin-top:20px;"></div>

  <script>
    function analyze() {
      let food = document.getElementById("food").value.toLowerCase()

      let calories = 300
      let ipoh = ""

      if (food.includes("chicken")) {
        calories = 600
        ipoh = "Ipoh style: steamed chicken, less oil"
      }

      if (food.includes("milo")) {
        calories = 180
        ipoh = "Ipoh style: less sugar Milo kosong"
      }

      document.getElementById("result").innerHTML =
        "🔥 Calories: " + calories + "<br>" +
        "🍜 Ipoh Advice: " + ipoh
    }
  </script>

</body>
</html>
