<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Dashboard v12.3 (Score Ring)</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="supabase.js"></script>

<style>
.card{ margin:10px; padding:12px; background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.05); }
canvas{ max-width:100%; min-width:280px; }
.tag{ padding:4px 8px; border-radius:6px; font-size:12px; display:inline-block; }
.green{ background:#dcfce7; color:#166534; }
.yellow{ background:#fef9c3; color:#854d0e; }
.red{ background:#fee2e2; color:#991b1b; }
.skeleton{ background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%); background-size:200% 100%; animation:shimmer 1.2s infinite; border-radius:6px; }
@keyframes shimmer{ 0%{background-position:-200% 0} 100%{background-position:200% 0} }
.hide{ display:none; }
.sleep-summary { display:flex; justify-content:space-around; margin:8px 0; }
.sleep-stat { text-align:center; }
.sleep-stat .value { font-size:22px; font-weight:bold; color:#3b82f6; }
.sleep-stat .label { font-size:11px; color:#6b7280; }

/* 圆形分数环 */
.score-ring-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 8px auto;
  width: 90px;
  height: 90px;
}
.score-ring {
  position: relative;
  width: 90px;
  height: 90px;
}
.score-ring svg {
  transform: rotate(-90deg);
}
.score-ring .bg-circle {
  fill: none;
  stroke: #e5e7eb;
  stroke-width: 8;
}
.score-ring .fg-circle {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.8s ease;
}
.score-ring .score-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 20px;
  font-weight: bold;
  color: #3b82f6;
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="calendar.html">Calendar</a>
  <a href="food.html">Food</a>
  <a href="report.html">Report</a>
  <a href="profile.html">Profile</a>
</div>

<h2 class="center">📊 AI Dashboard v12.3 (Score Ring)</h2>

<div class="card"><h3>🕒 Now</h3><p id="date"></p><p id="time"></p></div>
<div class="card"><h3>👤 Profile</h3><div id="profileSkeleton" class="skeleton" style="height:18px;width:120px;"></div><p id="profile" class="hide"></p></div>
<div class="card"><h3>⚖ BMI</h3><p id="bmi"></p><p id="bmiTag"></p></div>
<div class="card"><h3>🔥 Today AI Summary</h3><p id="cal">--</p><p id="p">--</p><p id="c">--</p><p id="f">--</p><p id="mealScore"></p><p id="risk"></p></div>
<div class="card"><h3>🧠 AI Insight</h3><p id="insight"></p><p id="recommend"></p></div>

<!-- SLEEP -->
<div class="card">
  <h3>😴 Sleep (7-Day)</h3>
  <canvas id="sleepChart" width="320" height="140"></canvas>
  <div class="sleep-summary">
    <div class="sleep-stat"><div class="value" id="avgSleep">--</div><div class="label">Avg hrs</div></div>
    <div class="sleep-stat"><div class="label">AI Score</div><div id="sleepScore"></div></div>
    <div class="sleep-stat"><div class="value" id="sleepQuality">--</div><div class="label">Quality</div></div>
  </div>
  <button onclick="location.href='sleep.html'" style="margin-top:8px;">📝 Log Sleep</button>
</div>

<div class="card"><h3>📈 Macro Trend (7 Days)</h3><canvas id="chart"></canvas></div>
<div class="card"><h3>⚠ Risk Trend</h3><canvas id="riskChart"></canvas></div>

<script>
/* ================= PROFILE ================= */
function safeProfileRender(){
  try { if(window.ProfileEngine && typeof ProfileEngine.render === "function") ProfileEngine.render("profile"); } catch(e){}
}
function getProfile(){
  try {
    const raw = localStorage.getItem("activeProfile");
    if(!raw || raw==="undefined" || raw==="null") return {id:"guest",name:"Guest",height:170,weight:70};
    const p = JSON.parse(raw);
    return p?.id ? p : {id:"guest",name:"Guest",height:170,weight:70};
  } catch(e) { return {id:"guest",name:"Guest",height:170,weight:70}; }
}
window.addEventListener("profileSyncUpdate", safeProfileRender);
window.addEventListener("focus", safeProfileRender);
window.addEventListener("storage", safeProfileRender);

/* ================= CLOCK ================= */
function updateClock(){
  document.getElementById("date").innerText = new Date().toLocaleDateString();
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
}

/* ================= HELPERS ================= */
function num(n){ n = Number(n); return isNaN(n) ? 0 : n; }
function bmi(h,w){ h=num(h); w=num(w); if(h<=0) return "0.0"; return (w/(h/100)**2).toFixed(1); }

/* ================= FOOD DATA ================= */
async function getData7(){
  let out=[];
  for(let i=6;i>=0;i--){
    let d=new Date(); d.setDate(d.getDate()-i); let date=d.toISOString().split("T")[0];
    let logs=[];
    try { logs = await getFoodLogs?.(date) || []; } catch(e){ logs=[]; }
    let cal=0,p=0,c=0,f=0;
    logs.forEach(x=>{ cal+=num(x?.calories); p+=num(x?.protein); c+=num(x?.carbs); f+=num(x?.fat); });
    out.push({date,cal,p,c,f});
  }
  return out;
}
function learnPattern(data){
  let proteinDays=0;
  data.forEach(d=>{ if(d.p>60) proteinDays++; });
  return { prefProtein: proteinDays>=4, trend: data.length>1 && data[data.length-1].cal > data[0].cal };
}
function riskLevel(cal){ cal=num(cal); if(cal>3000) return "🔴 High"; if(cal>2400) return "🟠 Medium"; return "🟢 Low"; }
function draw(canvasId,data,key){
  let c=document.getElementById(canvasId); if(!c) return;
  let ctx=c.getContext("2d"); if(!ctx) return;
  ctx.clearRect(0,0,c.width,c.height||200);
  if(!data||!data.length) return;
  let max = Math.max(...data.map(d=>num(d[key]))); if(max<=0) max=1;
  ctx.beginPath(); let startX=20, startY=120;
  ctx.moveTo(startX, startY - (num(data[0][key])/max)*100);
  for(let i=1;i<data.length;i++){ let x = startX + i*40; let y = startY - (num(data[i][key])/max)*100; ctx.lineTo(x,y); }
  ctx.stroke();
}

/* ================= SKELETON ================= */
function showSkeleton(){ document.getElementById("profileSkeleton").style.display="block"; document.getElementById("profile").classList.add("hide"); }
function hideSkeleton(){ document.getElementById("profileSkeleton").style.display="none"; document.getElementById("profile").classList.remove("hide"); }

/* ================= SLEEP ================= */
async function getSleepLogs() {
  const profile = getProfile();
  const key = `sleep_${profile.id}`;
  let local = JSON.parse(localStorage.getItem(key) || '[]');
  if (window.loadSleepLogs) {
    try {
      const cloud = await window.loadSleepLogs();
      if (cloud && cloud.length > 0) {
        const merged = [...local];
        cloud.forEach(c => {
          if (!merged.find(m => m.date === c.date && m.bedTime === c.bed_time && m.wakeTime === c.wake_time)) {
            merged.push({ date: c.date, bedTime: c.bed_time, wakeTime: c.wake_time });
          }
        });
        merged.sort((a, b) => new Date(b.bedTime) - new Date(a.bedTime));
        localStorage.setItem(key, JSON.stringify(merged));
        return merged;
      }
    } catch(e) { console.warn("Cloud sleep load failed:", e); }
  }
  return local;
}

function analyzeSleep(sleepLogs) {
  if (!sleepLogs || sleepLogs.length === 0) return { avgHrs: "0.0", score: 0, quality: "No data" };
  const targetHrs = getProfile().targetSleep || 8;
  let totalHrs = 0, consistencyScore = 0, prevWake = null;
  sleepLogs.forEach(log => {
    const bed = new Date(log.bedTime), wake = new Date(log.wakeTime);
    let hrs = (wake - bed) / (1000*60*60); if (hrs < 0) hrs += 24;
    totalHrs += hrs;
    if (prevWake) {
      const diff = Math.abs((bed - prevWake) / (1000*60*60));
      if (diff <= 1) consistencyScore += 10; else if (diff <= 2) consistencyScore += 5;
    }
    prevWake = wake;
  });
  const avg = totalHrs / sleepLogs.length;
  const deviation = Math.abs(avg - targetHrs);
  let score = Math.max(0, 100 - Math.round(deviation * 12));
  if (avg >= targetHrs - 0.5 && avg <= targetHrs + 0.5) score = Math.min(100, score + 15);
  let quality = deviation <= 0.5 ? "Perfect" : deviation <= 1 ? "Good" : deviation <= 2 ? "Fair" : "Poor";
  return { avgHrs: avg.toFixed(1), score, quality };
}

function drawSleepChart(logs) {
  const canvas = document.getElementById("sleepChart"); if(!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,140);
  const days = [];
  for(let i=6;i>=0;i--){ let d=new Date(); d.setDate(d.getDate()-i); days.push(d.toISOString().split("T")[0]); }
  const data = days.map(day => {
    const log = logs.find(l => l.date === day);
    if(!log) return 0;
    const bed = new Date(log.bedTime), wake = new Date(log.wakeTime);
    let hrs = (wake - bed)/(1000*60*60); if(hrs<0) hrs+=24;
    return hrs;
  });
  ctx.fillStyle = "#f3f4f6"; ctx.fillRect(0,0,canvas.width,140);
  const maxHrs = 12;
  data.forEach((hrs,i) => {
    ctx.fillStyle = "#818cf8";
    const height = (hrs/maxHrs)*120;
    ctx.fillRect(20 + i*40, 130 - height, 20, height);
    ctx.fillStyle = "#111827";
    ctx.fillText(hrs ? hrs.toFixed(1)+"h" : "0", 18+i*40, 125-height);
  });
}

/* ================= 圆形分数环 ================= */
function drawScoreRing(containerId, score) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const radius = 38;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (score / 100) * circumference;

  let color = "#ef4444";
  if (score >= 80) color = "#22c55e";
  else if (score >= 60) color = "#facc15";
  else if (score >= 40) color = "#fb923c";

  container.innerHTML = `
    <div class="score-ring-container">
      <div class="score-ring">
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle class="bg-circle" cx="45" cy="45" r="${radius}"/>
          <circle class="fg-circle" cx="45" cy="45" r="${radius}"
            stroke="${color}"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <div class="score-text">${score}/100</div>
      </div>
    </div>
  `;
}

/* ================= MAIN ================= */
async function load(){
  showSkeleton();
  let p = getProfile();
  let bmiVal = bmi(p.height, p.weight);
  document.getElementById("bmi").innerText = bmiVal;
  let bmiTag = document.getElementById("bmiTag");
  if(bmiTag) bmiTag.innerHTML = `<span class="tag ${bmiVal<18.5?"yellow":bmiVal<25?"green":bmiVal<30?"yellow":"red"}">${bmiVal<18.5?"Underweight":bmiVal<25?"Normal":bmiVal<30?"Overweight":"Obese"}</span>`;

  let data = await getData7();
  let today = data[data.length-1] || {cal:0,p:0,c:0,f:0};
  document.getElementById("cal").innerText = `Calories ${num(today.cal)}`;
  document.getElementById("p").innerText = `Protein ${num(today.p)}`;
  document.getElementById("c").innerText = `Carbs ${num(today.c)}`;
  document.getElementById("f").innerText = `Fat ${num(today.f)}`;
  document.getElementById("mealScore").innerText = "Score " + ((num(today.p)+num(today.c)+num(today.f))/3);
  document.getElementById("risk").innerText = riskLevel(today.cal);

  let learn = learnPattern(data);
  document.getElementById("insight").innerText = learn.prefProtein ? "You prefer high protein meals" : "Balanced/low protein pattern";
  document.getElementById("recommend").innerText = learn.prefProtein ? "Tomorrow: chicken + eggs + fish" : "Tomorrow: balanced rice + veggies + protein";

  draw("chart", data, "cal");
  draw("riskChart", data.map(d=>({cal:d.cal})), "cal");

  // Sleep
  const sleepLogs = await getSleepLogs();
  const analysis = analyzeSleep(sleepLogs);
  document.getElementById("avgSleep").innerText = analysis.avgHrs + "h";
  document.getElementById("sleepQuality").innerText = analysis.quality;
  drawSleepChart(sleepLogs);
  drawScoreRing("sleepScore", analysis.score);  // ✅ 圆形分数环

  hideSkeleton();
  safeProfileRender();
}

function init(){
  updateClock(); setInterval(updateClock, 1000);
  setTimeout(() => { safeProfileRender(); load(); }, 50);
}
init();
</script>
</body>
</html>
