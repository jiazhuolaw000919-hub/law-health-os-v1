<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Logger</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="supabase.js"></script>

<style>
.card{ margin:10px; padding:12px; background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.05); }
button{ margin:5px; padding:8px 14px; border-radius:8px; border:1px solid #ddd; cursor:pointer; background:#111827; color:white; }
input{ width:100%; padding:10px; margin:6px 0; border-radius:8px; border:1px solid #ddd; }
.delete-btn{ background:#ef4444; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:12px; }
</style>
</head>
<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">😴 Log Sleep</h2>

<div class="card">
<label>Bed Time:</label>
<input type="datetime-local" id="bedTime">
<label>Wake Time:</label>
<input type="datetime-local" id="wakeTime">
<br><br>
<button onclick="saveSleep()">💾 Save Sleep</button>
<button onclick="location.href='index.html'" style="background:#4b5563;">← Back to Dashboard</button>
</div>

<div class="card">
<h3>📋 Recent Sleep Logs</h3>
<div id="sleepList"></div>
</div>

<script>
const profile = JSON.parse(localStorage.getItem("activeProfile")) || { id: "guest" };
const STORAGE_KEY = `sleep_${profile.id}`;

function getLogs() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
}

function saveLogs(logs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
}

async function saveSleep() {
  const bed = document.getElementById("bedTime").value;
  const wake = document.getElementById("wakeTime").value;
  if (!bed || !wake) return alert("Please fill both times.");

  const sleepEntry = {
    date: new Date(bed).toISOString().split("T")[0],
    bedTime: bed,
    wakeTime: wake,
    timestamp: new Date().toISOString()
  };

  // 保存到本地
  const logs = getLogs();
  logs.push(sleepEntry);
  saveLogs(logs);

  // ✅ 同步到 Supabase
  if (window.saveSleep) {
    try {
      await window.saveSleep(sleepEntry);
      console.log("✅ Sleep synced to cloud");
    } catch (e) {
      console.warn("Cloud sync failed, but local is fine:", e);
    }
  }

  // 清空输入框
  document.getElementById("bedTime").value = "";
  document.getElementById("wakeTime").value = "";

  alert("Sleep logged!");
  renderLogs();
}

function deleteSleep(index) {
  const logs = getLogs();
  logs.splice(index, 1);
  saveLogs(logs);
  renderLogs();
}

async function loadCloudLogs() {
  if (!window.loadSleepLogs) return;
  try {
    const cloudLogs = await window.loadSleepLogs();
    if (cloudLogs && cloudLogs.length > 0) {
      const localLogs = getLogs();
      // 合并去重
      const merged = [...localLogs];
      cloudLogs.forEach(c => {
        if (!merged.find(m => m.date === c.date && m.bedTime === c.bed_time && m.wakeTime === c.wake_time)) {
          merged.push({
            date: c.date,
            bedTime: c.bed_time,
            wakeTime: c.wake_time,
            timestamp: c.created_at
          });
        }
      });
      // 按日期排序
      merged.sort((a, b) => new Date(b.bedTime) - new Date(a.bedTime));
      saveLogs(merged);
    }
  } catch (e) {
    console.warn("Failed to load cloud sleep logs:", e);
  }
}

async function renderLogs() {
  // 先从云端拉取最新数据
  await loadCloudLogs();

  const logs = getLogs();
  const container = document.getElementById("sleepList");
  if (logs.length === 0) {
    container.innerHTML = "<p>No sleep records yet.</p>";
    return;
  }
  container.innerHTML = logs.map((log, index) => {
    const bed = new Date(log.bedTime);
    const wake = new Date(log.wakeTime);
    const hrs = ((wake - bed) / (1000 * 60 * 60)).toFixed(1);
    return `<p>🛏 ${log.date} — ${hrs}h (${bed.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} → ${wake.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}) <button class="delete-btn" onclick="deleteSleep(${index})">✕</button></p>`;
  }).join("");
}

// 初始渲染
renderLogs();
</script>
</body>
</html>
