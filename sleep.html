<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Logger</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="supabase.js"></script>

<style>
.card{ margin:10px; padding:12px; background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.05); }
button{ margin:5px; padding:8px 14px; border-radius:8px; border:1px solid #ddd; cursor:pointer; background:#111827; color:white; }
input{ width:100%; padding:10px; margin:6px 0; border-radius:8px; border:1px solid #ddd; }
.delete-btn{ background:#ef4444; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:12px; }
</style>
</head>
<body>

<div class="nav">
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="food.html">Food</a>
<a href="report.html">Report</a>
<a href="profile.html">Profile</a>
</div>

<h2 class="center">😴 Log Sleep</h2>

<div class="card">
<label>📅 Date:</label>
<input type="date" id="sleepDate">
<label>🛏 Bed Time:</label>
<input type="time" id="bedTime">
<label>⏰ Wake Time:</label>
<input type="time" id="wakeTime">
<br><br>
<button onclick="saveSleep()">💾 Save Sleep</button>
<button onclick="location.href='index.html'" style="background:#4b5563;">← Back to Dashboard</button>
</div>

<div class="card">
<h3>📋 Recent Sleep Logs</h3>
<div id="sleepList"></div>
</div>

<script>
const profile = JSON.parse(localStorage.getItem("activeProfile")) || { id: "guest" };
const STORAGE_KEY = `sleep_${profile.id}`;

document.getElementById("sleepDate").value = new Date().toISOString().split("T")[0];

function getLogs() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch(e) {
    return [];
  }
}

function saveLogs(logs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
}

function saveSleep() {
  var bedTime = document.getElementById("bedTime").value;
  var wakeTime = document.getElementById("wakeTime").value;

  if (!bedTime || !wakeTime) {
    alert("Please fill both bed and wake times.");
    return;
  }

  var date = document.getElementById("sleepDate").value || new Date().toISOString().split("T")[0];
  var bedDateTime = date + "T" + bedTime + ":00";
  var wakeDateTime = date + "T" + wakeTime + ":00";

  var wakeDate = new Date(wakeDateTime);
  if (wakeDate <= new Date(bedDateTime)) {
    wakeDate.setDate(wakeDate.getDate() + 1);
  }

  var entry = {
    date: date,
    bedTime: bedDateTime,
    wakeTime: wakeDate.toISOString(),
    timestamp: new Date().toISOString()
  };

  var logs = getLogs();
  logs.push(entry);
  saveLogs(logs);

  document.getElementById("bedTime").value = "";
  document.getElementById("wakeTime").value = "";

  alert("Saved!");
  renderLogs();
}

function deleteSleep(index) {
  if (!confirm("Delete this record?")) return;
  var logs = getLogs();
  logs.splice(index, 1);
  saveLogs(logs);
  renderLogs();
}

function renderLogs() {
  var logs = getLogs();
  var container = document.getElementById("sleepList");
  if (logs.length === 0) {
    container.innerHTML = "<p>No records yet.</p>";
    return;
  }
  var html = "";
  for (var i = 0; i < logs.length; i++) {
    var log = logs[i];
    var bed = new Date(log.bedTime);
    var wake = new Date(log.wakeTime);
    var hrs = ((wake - bed) / 3600000).toFixed(1);
    html += "<p>🛏 " + log.date + " — " + hrs + "h (" +
            bed.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + " → " +
            wake.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) +
            ") <button class='delete-btn' onclick='deleteSleep(" + i + ")'>✕</button></p>";
  }
  container.innerHTML = html;
}

renderLogs();
</script>
</body>
</html>
